<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Studio Scène FIX</title>
<style>
body{font-family:sans-serif;background:#0b0f1a;color:#fff;padding:40px}
button{padding:12px 20px;margin:10px;border:none;border-radius:8px;cursor:pointer}
.card{border:1px solid #333;padding:20px;border-radius:12px;margin-bottom:20px}
img{max-width:200px;display:block;margin-top:10px}
</style>
</head>
<body>

<h1>Studio Scène (version clean)</h1>

<input type="file" id="upload" accept="image/*">
<div id="preview"></div>

<button onclick="analyze()">Analyser</button>
<button onclick="generate()">Générer scènes</button>

<div id="scenes"></div>

<script>
const MODEL_ANALYSIS = 'gemini-2.5-flash';
const MODEL_IMAGE = 'gemini-3.1-flash-image-preview';

let API_KEY = '';
let base64 = '';
let mime = '';
let scenes = [];
let images = {};

document.getElementById('upload').addEventListener('change', e=>{
  const file = e.target.files[0];
  const reader = new FileReader();
  reader.onload = ev=>{
    const res = ev.target.result;
    mime = res.match(/^data:(.*);base64,/)[1];
    base64 = res.split(',')[1];
    document.getElementById('preview').innerHTML = `<img src="${res}">`;
  };
  reader.readAsDataURL(file);
});

async function callText(prompt){
  const res = await fetch(`https://aiplatform.googleapis.com/v1/publishers/google/models/${MODEL_ANALYSIS}:generateContent?key=${API_KEY}`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      contents:[{role:'user',parts:[{text:prompt}]}]
    })
  });
  const data = await res.json();
  return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
}

async function callImage(prompt){
  const res = await fetch(`https://aiplatform.googleapis.com/v1/publishers/google/models/${MODEL_IMAGE}:generateContent?key=${API_KEY}`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      contents:[{
        role:'user',
        parts:[
          {inlineData:{data:base64,mimeType:mime}},
          {text:prompt}
        ]
      }],
      generationConfig:{
        responseModalities:['IMAGE'],
        imageConfig:{imageSize:'4K'}
      }
    })
  });

  const data = await res.json();
  return "data:image/png;base64," + data.candidates[0].content.parts[0].inlineData.data;
}

async function analyze(){
  API_KEY = prompt("Ta clé Vertex ?");
  alert("Analyse ok");
}

async function generate(){
  const txt = await callText(`donne 3 scènes en JSON {"scenes":["..."]}`);
  const json = JSON.parse(txt.match(/\{[\s\S]*\}/)[0]);
  scenes = json.scenes;
  render();
}

function render(){
  const div = document.getElementById('scenes');

  div.innerHTML = scenes.map((s,i)=>`
    <div class="card">
      <p>${s}</p>

      ${images[i] ? `<img src="${images[i]}">` : `
        <button onclick="generateImage(${i})">Générer le moment</button>
      `}
    </div>
  `).join('');
}

async function generateImage(i){
  const img = await callImage(scenes[i]);
  images[i] = img;
  render();
}
</script>

</body>
</html>
