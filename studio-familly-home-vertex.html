<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio Family Home — Vertex AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root{
  --bg:#050505;
  --bg2:#0d0d0d;
  --glass:rgba(255,255,255,0.04);
  --border:rgba(255,255,255,0.08);
  --border2:rgba(255,255,255,0.12);
  --text:#ffffff;
  --text2:rgba(255,255,255,0.65);
  --text3:rgba(255,255,255,0.35);
  --accent:#C97A63;
  --accent2:#a0522d;
  --indigo:#6366f1;
  --purple:#a855f7;
  --red:#ef4444;
  --green:#22c55e;
  --blue:#60a5fa;
  --orange:#fb923c;
  --pink:#f472b6;
  --cyan:#22d3ee;
}

html,body{
  min-height:100vh;
  background:var(--bg);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  overflow-x:hidden;
}
body{
  background:radial-gradient(ellipse at top right,#1a0a00 0%,var(--bg) 60%);
}

/* SPLASH */
#splash{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:32px;
  text-align:center;
  position:relative;
}
.splash-bg{
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
  opacity:0.04;
}
.splash-bg img{
  width:100%;
  height:100%;
  object-fit:cover;
  filter:grayscale(1) blur(2px);
}
.splash-content{
  position:relative;
  z-index:10;
  max-width:520px;
  width:100%;
}
.splash-logo{
  font-family:'Syne',sans-serif;
  font-size:clamp(48px,10vw,80px);
  font-weight:800;
  text-transform:uppercase;
  letter-spacing:-0.03em;
  line-height:0.9;
  margin-bottom:8px;
  color:var(--accent);
}
.splash-sub{
  font-size:12px;
  font-weight:300;
  color:var(--text3);
  letter-spacing:0.4em;
  text-transform:uppercase;
  margin-bottom:48px;
}
.api-box{
  background:rgba(255,255,255,0.04);
  border:1px solid var(--border);
  border-radius:24px;
  padding:28px;
  margin-bottom:24px;
}
.api-label{
  font-size:10px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.3em;
  color:var(--text3);
  margin-bottom:10px;
  text-align:left;
  display:block;
}
.api-input{
  width:100%;
  background:rgba(255,255,255,0.06);
  border:1px solid var(--border);
  border-radius:12px;
  padding:14px 16px;
  font-size:13px;
  font-family:monospace;
  color:var(--text);
  outline:none;
  transition:border-color 0.2s;
}
.api-input::placeholder{
  color:rgba(255,255,255,0.15);
}
.api-input:focus{
  border-color:var(--accent);
}
.mode-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
  margin-top:16px;
}
.mode-card{
  position:relative;
  overflow:hidden;
  border-radius:24px;
  border:1px solid var(--border2);
  cursor:pointer;
  transition:all 0.3s;
  aspect-ratio:3/4;
}
.mode-card:hover{
  border-color:var(--accent);
  transform:scale(1.02);
}
.mode-card img{
  width:100%;
  height:100%;
  object-fit:cover;
  filter:grayscale(0.5);
  transition:filter 0.5s;
}
.mode-card:hover img{
  filter:grayscale(0);
}
.mode-card-overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to top,rgba(0,0,0,0.85),rgba(0,0,0,0.2));
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  padding:24px;
}
.mode-card h2{
  font-family:'Syne',sans-serif;
  font-size:28px;
  font-weight:800;
  text-transform:uppercase;
  margin-bottom:12px;
}
.mode-card-btn{
  padding:12px;
  background:var(--accent);
  border:none;
  border-radius:12px;
  color:white;
  font-family:'Syne',sans-serif;
  font-weight:700;
  font-size:11px;
  letter-spacing:0.2em;
  text-transform:uppercase;
  cursor:pointer;
  width:100%;
}
#splashError{
  color:#fca5a5;
  font-size:11px;
  font-weight:700;
  margin-top:12px;
  display:none;
}

/* SETUP */
#setup{
  display:none;
  min-height:100vh;
  padding:24px;
  background:var(--bg);
}
.setup-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:32px;
  max-width:900px;
  margin-left:auto;
  margin-right:auto;
}
.back-btn{
  background:rgba(255,255,255,0.05);
  border:1px solid var(--border);
  border-radius:12px;
  padding:10px 20px;
  color:var(--text);
  cursor:pointer;
  font-size:13px;
  font-family:'DM Sans',sans-serif;
  transition:background 0.2s;
}
.back-btn:hover{
  background:rgba(255,255,255,0.1);
}
.setup-title{
  font-family:'Syne',sans-serif;
  font-size:14px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.3em;
  color:var(--accent);
}
.setup-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:24px;
  max-width:900px;
  margin:0 auto;
}
@media(max-width:640px){
  .setup-grid{grid-template-columns:1fr}
}
.setup-card{
  background:var(--glass);
  border:1px solid var(--border);
  border-radius:32px;
  padding:28px;
}
.setup-card h3{
  font-size:10px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.3em;
  color:var(--accent);
  margin-bottom:20px;
}
.validate-btn{
  display:block;
  width:100%;
  max-width:900px;
  margin:24px auto 0;
  padding:20px;
  background:var(--accent);
  border:none;
  border-radius:20px;
  color:white;
  font-family:'Syne',sans-serif;
  font-weight:800;
  font-size:14px;
  text-transform:uppercase;
  letter-spacing:0.3em;
  cursor:pointer;
  transition:all 0.2s;
}
.validate-btn:hover{
  background:var(--accent2);
}
.validate-btn:disabled{
  opacity:0.3;
  cursor:not-allowed;
}
#setupError{
  max-width:900px;
  margin:12px auto 0;
  text-align:center;
  color:#fca5a5;
  font-size:11px;
  font-weight:700;
  display:none;
}
.participant-controls{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:12px;
}
.participant-label{
  font-size:10px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.2em;
  color:var(--text3);
  flex:1;
}
.cnt-btn{
  width:28px;
  height:28px;
  border-radius:50%;
  background:rgba(255,255,255,0.08);
  border:1px solid var(--border);
  color:var(--text);
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
  transition:background 0.2s;
}
.cnt-btn:hover{
  background:rgba(255,255,255,0.15);
}
.toggle-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:12px;
}
.toggle-label{
  font-size:10px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.2em;
  color:var(--text3);
}
.toggle-sw{
  width:40px;
  height:22px;
  border-radius:11px;
  background:rgba(255,255,255,0.1);
  position:relative;
  cursor:pointer;
  transition:background 0.3s;
  flex-shrink:0;
}
.toggle-sw.on{
  background:var(--accent);
}
.toggle-sw-thumb{
  position:absolute;
  top:3px;
  left:3px;
  width:16px;
  height:16px;
  background:white;
  border-radius:50%;
  transition:transform 0.3s;
  box-shadow:0 1px 4px rgba(0,0,0,0.3);
}
.toggle-sw.on .toggle-sw-thumb{
  transform:translateX(18px);
}
.upload-slots{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:8px;
}

/* UPLOADER */
.uploader{
  border:2px dashed var(--border);
  border-radius:16px;
  min-height:100px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  transition:border-color 0.2s;
  background:rgba(255,255,255,0.02);
}
.uploader:hover{
  border-color:var(--accent);
}
.uploader.has-img{
  border-style:solid;
  border-color:var(--border2);
}
.uploader img{
  width:100%;
  height:100%;
  object-fit:cover;
  position:absolute;
  inset:0;
}
.uploader-label{
  font-size:9px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.2em;
  color:var(--text3);
  text-align:center;
  padding:8px;
  position:relative;
  z-index:1;
}
.uploader-icon{
  font-size:20px;
  margin-bottom:4px;
  position:relative;
  z-index:1;
}
.uploader input[type=file]{
  position:absolute;
  inset:0;
  opacity:0;
  cursor:pointer;
}
.uploader-overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.5);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  transition:opacity 0.2s;
  z-index:2;
}
.uploader:hover .uploader-overlay{
  opacity:1;
}
.remove-img-btn{
  background:var(--red);
  border:none;
  border-radius:50%;
  width:28px;
  height:28px;
  color:white;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
}

/* APP */
#app{
  display:none;
  min-height:100vh;
  flex-direction:column;
}
#app.visible{
  display:flex;
}
.app-nav{
  border-bottom:1px solid var(--border);
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(20px);
  position:sticky;
  top:0;
  z-index:50;
  padding:16px 24px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.brand{
  font-family:'Syne',sans-serif;
  font-size:18px;
  font-weight:800;
  text-transform:uppercase;
  letter-spacing:-0.02em;
  color:var(--accent);
  cursor:pointer;
}
.nav-badges{
  display:flex;
  gap:8px;
  align-items:center;
}
.energy-btn{
  padding:8px 16px;
  border-radius:999px;
  font-size:9px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.15em;
  cursor:pointer;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.04);
  color:var(--text3);
  transition:all 0.2s;
}
.energy-btn.active-calm{
  background:rgba(34,197,94,0.15);
  border-color:var(--green);
  color:var(--green);
}
.energy-btn.active-chaos{
  background:rgba(239,68,68,0.15);
  border-color:var(--red);
  color:var(--red);
}

.studio-main{
  flex:1;
  max-width:1600px;
  margin:0 auto;
  width:100%;
  padding:16px;
  display:grid;
  grid-template-columns:320px 1fr 360px;
  gap:20px;
}
@media(max-width:1300px){
  .studio-main{grid-template-columns:300px 1fr}
}
@media(max-width:900px){
  .studio-main{grid-template-columns:1fr}
}
.output-col{
  display:block;
}
@media(max-width:1300px){
  .output-col{grid-column:1/-1}
}

.s-card{
  background:var(--glass);
  border:1px solid var(--border);
  border-radius:28px;
  padding:24px;
  margin-bottom:16px;
}
.s-card-title{
  font-size:9px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.35em;
  color:var(--accent);
  margin-bottom:16px;
  display:flex;
  align-items:center;
  gap:8px;
}

.room-cats{
  display:flex;
  overflow-x:auto;
  gap:8px;
  padding-bottom:8px;
  margin-bottom:12px;
  scrollbar-width:none;
}
.room-cats::-webkit-scrollbar{display:none}
.cat-btn{
  flex-shrink:0;
  padding:8px 14px;
  border-radius:999px;
  font-size:9px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.15em;
  cursor:pointer;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.04);
  color:var(--text3);
  transition:all 0.2s;
  white-space:nowrap;
}
.cat-btn.active{
  background:var(--accent);
  border-color:var(--accent);
  color:white;
}
.room-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
}
.room-btn{
  padding:10px 4px;
  border-radius:16px;
  text-align:center;
  cursor:pointer;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.03);
  transition:all 0.2s;
  opacity:0.7;
}
.room-btn:hover{
  opacity:1;
  border-color:var(--border2);
}
.room-btn.active{
  background:var(--indigo);
  border-color:var(--indigo);
  opacity:1;
  transform:scale(1.05);
}
.room-btn .icon{
  font-size:20px;
  margin-bottom:4px;
  display:block;
}
.room-btn .rlabel{
  font-size:7px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.1em;
  color:var(--text2);
}

select.s-select{
  width:100%;
  background:#111;
  border:1px solid var(--border);
  border-radius:12px;
  padding:12px 14px;
  font-size:11px;
  font-family:'DM Sans',sans-serif;
  color:var(--text);
  outline:none;
  cursor:pointer;
  margin-bottom:12px;
  appearance:none;
}
select.s-select option{
  background:#111;
}

.mode-toggle-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:8px 0;
  border-bottom:1px solid var(--border);
}
.mode-toggle-row:last-child{
  border-bottom:none;
}
.mode-toggle-label{
  font-size:9px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.15em;
  color:var(--text3);
}

.gen-btn{
  width:100%;
  padding:24px;
  border:none;
  border-radius:20px;
  background:var(--accent);
  color:white;
  font-family:'Syne',sans-serif;
  font-weight:800;
  font-size:13px;
  text-transform:uppercase;
  letter-spacing:0.3em;
  cursor:pointer;
  transition:all 0.2s;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  box-shadow:0 20px 50px rgba(201,122,99,0.3);
}
.gen-btn:hover:not(:disabled){
  transform:scale(1.02);
  box-shadow:0 24px 60px rgba(201,122,99,0.4);
}
.gen-btn:disabled{
  opacity:0.4;
  cursor:not-allowed;
  box-shadow:none;
}
.gen-btn.loading svg{
  animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

.output-panel{
  background:var(--glass);
  border:1px solid var(--border);
  border-radius:28px;
  min-height:600px;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  position:relative;
}
.output-empty{
  text-align:center;
  opacity:0.15;
}
.output-empty p{
  font-family:'Syne',sans-serif;
  font-size:64px;
  font-weight:800;
  text-transform:uppercase;
  letter-spacing:-0.03em;
  line-height:1;
}
.output-img{
  width:100%;
  height:100%;
  object-fit:contain;
  border-radius:28px;
}
.dl-btn{
  position:absolute;
  bottom:20px;
  right:20px;
  background:rgba(0,0,0,0.7);
  border:1px solid var(--border2);
  border-radius:12px;
  padding:10px 20px;
  color:white;
  font-size:10px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.15em;
  cursor:pointer;
  transition:background 0.2s;
}
.dl-btn:hover{
  background:rgba(0,0,0,0.9);
}

.error-box{
  padding:16px;
  background:rgba(239,68,68,0.1);
  border:1px solid rgba(239,68,68,0.3);
  border-radius:14px;
  font-size:11px;
  font-weight:700;
  color:#fca5a5;
  margin-top:12px;
  display:none;
}
.error-box.show{
  display:block;
}

.loading-overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.8);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:24px;
  border-radius:28px;
  z-index:10;
}
.loading-spinner{
  width:60px;
  height:60px;
  border:3px solid rgba(201,122,99,0.2);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:spin 1s linear infinite;
}
.loading-step{
  font-size:10px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.3em;
  color:var(--text3);
  text-align:center;
  animation:pulse 2s infinite;
}
@keyframes pulse{
  0%,100%{opacity:1}
  50%{opacity:0.4}
}

textarea.s-textarea{
  width:100%;
  background:rgba(255,255,255,0.04);
  border:1px solid var(--border);
  border-radius:16px;
  padding:16px;
  font-size:13px;
  font-family:'DM Sans',sans-serif;
  color:var(--text);
  outline:none;
  resize:vertical;
  min-height:80px;
  transition:border-color 0.2s;
}
textarea.s-textarea::placeholder{
  color:var(--text3);
}
textarea.s-textarea:focus{
  border-color:var(--accent);
}

.ar-btns{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:8px;
  margin-bottom:12px;
}
.ar-btn{
  padding:10px 4px;
  border-radius:12px;
  font-size:9px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.1em;
  cursor:pointer;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.04);
  color:var(--text3);
  transition:all 0.2s;
  text-align:center;
}
.ar-btn.active{
  background:var(--indigo);
  border-color:var(--indigo);
  color:white;
}

.subtype-row{
  display:none;
  margin-bottom:12px;
}
.subtype-row.show{
  display:block;
}
.helper-note{
  font-size:10px;
  color:var(--text3);
  line-height:1.5;
  margin-top:10px;
}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-bg">
    <img src="https://images.unsplash.com/photo-1511895426328-dc8714191300?auto=format&fit=crop&q=80&w=1600" alt="">
  </div>
  <div class="splash-content">
    <div class="splash-logo">Studio<br>Family Home</div>
    <div class="splash-sub">Scènes de vie ultra-réalistes 4K</div>

    <div class="api-box">
      <span class="api-label">🔑 Clé API Vertex AI Express Mode</span>
      <input type="password" id="apiKeyInput" class="api-input" placeholder="AIza..." autocomplete="off">
    </div>

    <div class="mode-grid" id="modeGrid" style="display:none">
      <div class="mode-card" onclick="selectMode('SOLO')">
        <img src="https://images.unsplash.com/photo-1517841905240-472988babdf9?auto=format&fit=crop&q=80&w=600" alt="Solo">
        <div class="mode-card-overlay">
          <h2>Solo</h2>
          <button class="mode-card-btn">Entrer</button>
        </div>
      </div>

      <div class="mode-card" onclick="selectMode('FAMILY')">
        <img src="https://images.unsplash.com/photo-1511895426328-dc8714191300?auto=format&fit=crop&q=80&w=600" alt="Famille">
        <div class="mode-card-overlay">
          <h2>Famille</h2>
          <button class="mode-card-btn">Entrer</button>
        </div>
      </div>
    </div>

    <div id="splashError"></div>
  </div>
</div>

<!-- SETUP -->
<div id="setup">
  <div class="setup-header">
    <button class="back-btn" onclick="goSplash()">← Retour</button>
    <div class="setup-title" id="setupTitle">Configuration</div>
    <div style="width:80px"></div>
