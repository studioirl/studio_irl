/* ------------------------- STOCKAGE SÉCURISÉ ----------------------------- */
/* Certains aperçus sandboxés (ex: prévisualisation intégrée d'un chat) bloquent
   l'accès à localStorage et lèvent une exception. On protège chaque accès
   et on retombe sur une variable mémoire pour que l'appli ne plante jamais
   au chargement — même si la clé ne persistera pas entre deux rechargements
   dans ce cas précis. Ouvrir le fichier .html directement dans un navigateur
   (double-clic, ou glisser dans l'onglet) utilise le vrai localStorage. */
const memoryStore = {};
function safeGetItem(key) {
  try { return window.localStorage.getItem(key); } catch (e) { return memoryStore[key] || null; }
}
function safeSetItem(key, value) {
  try { window.localStorage.setItem(key, value); } catch (e) { memoryStore[key] = value; }
}
function safeRemoveItem(key) {
  try { window.localStorage.removeItem(key); } catch (e) { delete memoryStore[key]; }
}

/* ------------------------- SERVICE VERTEX AI ---------------------------- */

function getApiKey() {
  const key = safeGetItem('userApiKey');
  if (!key) throw new Error("Clé API Vertex AI introuvable.");
  return key;
}

function wait(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

const DEFAULT_SAFETY_SETTINGS = [
  { category: 'HARM_CATEGORY_HARASSMENT', threshold: 'BLOCK_ONLY_HIGH' },
  { category: 'HARM_CATEGORY_HATE_SPEECH', threshold: 'BLOCK_ONLY_HIGH' },
  { category: 'HARM_CATEGORY_SEXUALLY_EXPLICIT', threshold: 'BLOCK_ONLY_HIGH' },
  { category: 'HARM_CATEGORY_DANGEROUS_CONTENT', threshold: 'BLOCK_ONLY_HIGH' },
];

async function callVertexGenerateContent(model, parts, generationConfig, safetySettings) {
  const apiKey = getApiKey();
  const url = `${VERTEX_BASE_URL}/${model}:generateContent?key=${apiKey}`;
  const body = { contents: [{ role: 'user', parts }] };
  if (generationConfig) body.generationConfig = generationConfig;
  if (safetySettings) body.safetySettings = safetySettings;

  const response = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });

  if (!response.ok) {
    const errorText = await response.text();
    const error = new Error(`Vertex AI error (${response.status}): ${errorText}`);
    error.status = response.status;
    throw error;
  }
  return response.json();
}

async function generateWithRetry(apiCall, maxRetries = 5, baseDelay = 3000) {
  let lastError;
  for (let i = 0; i < maxRetries; i++) {
    try {
      return await apiCall();
    } catch (error) {
      lastError = error;
      const isRetryable = error.status === 429 || error.status === 503 ||
        (error.message && (error.message.includes('429') || error.message.includes('quota') ||
         error.message.includes('RESOURCE_EXHAUSTED') || error.message.includes('Too Many Requests') ||
         error.message.includes('503')));
      if (!isRetryable) throw error;
      if (i < maxRetries - 1) {
        const delay = baseDelay * Math.pow(2, i) + (Math.random() * 1000);
        await wait(delay);
      }
    }
  }
  throw lastError;
}

function extractText(response) {
  const text = response?.candidates?.[0]?.content?.parts?.find(p => typeof p.text === 'string')?.text;
  if (typeof text !== 'string') throw new Error("Réponse Vertex AI invalide : aucun texte trouvé.");
  return text.trim();
}

function extractImage(response) {
  const part = response?.candidates?.[0]?.content?.parts?.find(p => p.inlineData);
  if (part && part.inlineData) return `data:${part.inlineData.mimeType};base64,${part.inlineData.data}`;
  return null;
}

function getThematicContextPrompt(season, holiday) {
  let context = '';
  if (season.id !== 'none') context += `\n- **Season:** ${season.label}. This should influence the scene with the following aesthetic: "${season.description}"`;
  if (holiday.id !== 'none') context += `\n- **Holiday:** ${holiday.label}. This should transform the scene with a theme of: "${holiday.description}"`;
  if (context) return `\n        **Thematic Context (Merge these styles naturally and cinematically):** ${context}\n        `;
  return '';
}

  return generateWithRetry(async () => {
    const femmePrompt = `

    **CRITICAL PRIORITY: SCENE REALISM & CONTEXT**
    You MUST prioritize the specific activity in the scene description over general fashion trends.
    **MANDATORY SCENE-SPECIFIC RULES:**
    1. **SURGERY / BBL / RECOVERY SCENES:** You MUST suggest Medical Compression Faja, Post-Op Foam Boards, Compression Socks, or Luxury Recovery Robes. DO NOT suggest jeans, tight dresses, or high heels.
    2. **HOSPITAL / BIRTH SCENES:** Hospital Gown, Birthing Robe, or Comfortable Button-Down Pajamas.
    3. **GYM / WORKOUT SCENES:** high-end activewear.
    4. **SWIMMING / POOL / BEACH SCENES:** swimwear or beach cover-ups.

    **Cohesion:** The color palette must harmonize with the scene's lighting.`;
    const mascPrompt = `
    **Task:** Generate 4 unique outfit options for a cinematic vlog scene.
    **CRITICAL PRIORITY: SCENE REALISM**
    1. Medical/Hospital: Hospital Gown, recovery sweats, or robe.
    2. Gym/Workout: performance activewear.
    3. Swimming: designer swim trunks.
    4. Sleeping: boxers, silk pajamas, or robe.
    **Style Guide (General Lifestyle):** Boss-man energy, high-end designer textures, luxury watches, chains, impeccable powerful fit.`;

    const thematicContext = getThematicContextPrompt(season, holiday);
    const bodyTypeContext = bodyType.id !== 'default' ? `\n- **Body Type:** ${bodyType.label} - ${bodyType.description}` : '';
    const prompt = `${genderMode === 'femme' ? femmePrompt : mascPrompt}
    **Scene Context:**
    - **Setting:** ${scene.title} - ${scene.prompt}
    - **Vibe:** ${vibe.label} - ${vibe.description}
    - **Time of Day & Lighting:** ${timeOfDay.label} - ${timeOfDay.description}
    ${bodyTypeContext}
    ${thematicContext}
    Generate fresh, on-brand, cinematic outfit choices based on all the context provided.`;

    const responseSchema = {
      type: 'ARRAY',
      items: {
        type: 'OBJECT',
        properties: {
          name: { type: 'STRING' },
          description: { type: 'STRING' },
          accessories: { type: 'STRING' }
        },
        required: ["name", "description", "accessories"]
      }
    };

    const response = await callVertexGenerateContent(TEXT_MODEL, [{ text: prompt }], { responseMimeType: 'application/json', responseSchema });
    const outfits = JSON.parse(extractText(response));
    if (!Array.isArray(outfits) || outfits.length === 0) throw new Error("L'IA n'a pas renvoyé de tenues valides.");
    return outfits;
  });
}

    **Task:** Create a "VISUAL ANCHOR SHEET" for ${genderedTask} in a cinematic vlog, specific enough to look identical across 7 images.
    **Instructions:**
    1. Archetype: ${partnerArchetype}
    2. Physical anchors: specific skin tone, exact build, one immutable visual hook.
    3. Outfit lock: ONE specific outfit in detail, worn in every frame.
    4. Hair lock: exact hairstyle.
    **Scene Context:** ${scene.title} — Vibe: ${vibe.label}
    ${thematicContext}
    **Output:** A single dense paragraph starting with "The partner is...". Be visual, avoid vague words.`;
    const response = await callVertexGenerateContent(TEXT_MODEL, [{ text: prompt }]);
    const description = extractText(response);
    if (!description) throw new Error("L'IA n'a pas généré de description du partenaire.");
    return description;
  });
}

function extractActionForScene(fullPrompt, sceneNum) {
  const emojis = ['1️⃣', '2️⃣', '3️⃣', '4️⃣', '5️⃣', '6️⃣', '7️⃣'];
  const sceneEmoji = emojis[sceneNum - 1] || `${sceneNum}`;
  const lines = fullPrompt.split('\n');
  const line = lines.find(l => l.trim().startsWith(sceneEmoji));
  if (line) return line.replace(/^[1-7]️⃣\s*.*?—\s*/, '').trim();
  return "Create a cinematic moment from the story.";
}

function extractIntroSetting(fullPrompt, sceneTitle) {
  const lines = fullPrompt.split('\n');
  const introLine = lines.find(l => l.trim().startsWith('1️⃣'));
  if (introLine) return introLine.replace(/^[1-7]️⃣\s*.*?—\s*/, '').trim();
  return sceneTitle + " setting.";
}

async function generateVlogImage(baseImage, scene, sceneNumber, outfit, hairstyle, accessories, vibe, timeOfDay, genderMode, partnerStyle, friendStyles, season, holiday, bodyType) {
  let attempts = 0;
  const maxAttempts = 3;
  while (attempts < maxAttempts) {
    try {
      const imagePart = { inlineData: { data: baseImage.data, mimeType: baseImage.mimeType } };
      const specificAction = extractActionForScene(scene.prompt, sceneNumber);
      const anchorSetting = extractIntroSetting(scene.prompt, scene.title);

      let bodyTypeInstruction = "";
      if (bodyType.id === 'default') {
        bodyTypeInstruction = `
        **MANDATORY MAIN CHARACTER BODY MORPH: AS PER PHOTO**
        - Strictly adhere to the body proportions visible in the reference image. No filters, slimming, BBL effects, or muscle enhancements.`;
      } else {
        bodyTypeInstruction = `
        **MANDATORY MAIN CHARACTER BODY MORPH: ${bodyType.label.toUpperCase()}**
        - Description: "${bodyType.description}"
        - Ensure the silhouette matches this description exactly.`;
      }

      let companionInstruction = "**COMPANION LOCK:** The subject is solo in this frame.";
      if (partnerStyle) {
        companionInstruction = `
        **COMPANION LOCK (PARTNER):** The subject is with their partner. The partner is a SEPARATE ENTITY — do NOT apply the main character's body/outfit/features to them. Partner MUST look exactly as: "${partnerStyle}" in every frame.`;
      } else if (friendStyles) {
        companionInstruction = `
        **COMPANION LOCK (FRIENDS):** The subject is with 2 friends, SEPARATE ENTITIES. Friends MUST look exactly as: "${friendStyles}" in every frame.`;
      }

      const accessoryNails = accessories.nails ? `- **Nails:** ${accessories.nails}. (Must be visible)` : '';
      const accessoryWatch = accessories.watchAndGrooming ? `- **Watch:** ${accessories.watchAndGrooming}.` : '';
      const accessoryFootwear = accessories.footwear ? `- **Footwear:** ${accessories.footwear}.` : '';
      const thematicContext = getThematicContextPrompt(season, holiday);

      const textPart = { text: `
      **CINEMATIC VLOG GENERATION - FRAME ${sceneNumber}/7**
      **1. DIGITAL WARDROBE LOCK (MAIN CHARACTER):**
      - Outfit: ${outfit.name} - "${outfit.description}"
      - Hair: ${hairstyle.name} - "${hairstyle.description}"
      - Must be identical to description in every frame.
      **2. ${bodyTypeInstruction}**
      **3. ${companionInstruction}**
      **4. SCENE ACTION & VIBE:**
      - Setting Anchor: "${anchorSetting}" (keep background consistent).
      - Action: "${specificAction}" (dynamic — motion blur, laughter, movement).
      - Vibe: ${vibe.label} (${vibe.description}).
      - Lighting: ${timeOfDay.label} (${timeOfDay.description}).
      ${thematicContext}
      **5. ACCESSORIES:**
      ${accessoryNails}
      ${accessoryWatch}
      ${accessoryFootwear}
      - Bag: ${accessories.bag}
      **6. TECHNICAL SPECS (iPhone 17-style candid realism):**
      - 9:16 Vertical Aspect Ratio.
      - Photorealistic smartphone photo quality — no AI sheen, no plastic skin, natural micro-imperfections.
      - Natural dynamic range, true-to-life color science.
      - Dynamic camera angle (low angle for power, selfie angle for intimacy).
      ` };

      const response = await callVertexGenerateContent(
        IMAGE_MODEL,
        [imagePart, textPart],
        { responseModalities: ['IMAGE'], imageConfig: { aspectRatio: '9:16' } },
        DEFAULT_SAFETY_SETTINGS
      );
      const imageUrl = extractImage(response);
      if (imageUrl) return imageUrl;
      throw new Error("Génération d'image sans données (probablement filtrée).");
    } catch (error) {
      console.error(`Tentative ${attempts + 1} échouée pour la scène ${sceneNumber}:`, error);
      attempts++;
      if (attempts >= maxAttempts) return null;
      await wait(3000 * Math.pow(2, attempts - 1));
    }
  }
  return null;
}

/**
 * MODE NORMAL — "Studio Photo" : moteur de création de séries photographiques
 * ultra-réalistes prises au smartphone (moments volés, zéro luxe).
 *
 * Pipeline en 2 étapes (comme Studio Story) :
 *  1) generateNormalStoryboard() : un appel texte (gemini-2.5-flash) analyse les
 *     références (lieux + avatars) et la consigne, construit une fiche de
 *     continuité + un storyboard + un prompt photographique détaillé et autonome
 *     PAR image (JSON structuré).
 *  2) generateNormalImage() : pour chaque image, un appel image
 *     (gemini-3.1-flash-image-preview) reçoit les mêmes références + le prompt
 *     spécifique de cette image généré à l'étape 1, avec le renforcement
 *     culinaire systématique et les règles de cadrage/plans.
 */

const STUDIO_PHOTO_SYSTEM_PROMPT_TEMPLATE = `
# 📱 STUDIO PHOTO — INSTRUCTION SYSTÈME COMPLÈTE

## IDENTITÉ

Tu es **Studio Photo**, un moteur de création de séries photographiques ultra-réalistes prises au smartphone.

Tu es spécialisé dans les vlogs photo, les journaux visuels et les carrousels chronologiques composés de plusieurs photographies cohérentes.

Tu ne crées jamais de vidéo, d'animation, de son ou de mouvement vidéo.

Tu produis uniquement des photographies fixes (sous forme de PROMPTS TEXTUELS décrivant chaque photographie — l'image elle-même sera générée séparément par un autre modèle à partir de chacun de tes prompts).

Chaque image doit sembler provenir directement de la galerie photo d'une personne réelle et avoir été prise avec un iPhone récent.

---

# MISSION PRINCIPALE

Transformer les références visuelles importées et l'instruction de l'utilisateur en une série chronologique de photographies ultra-réalistes.

La série doit raconter un moment, une activité, une sortie, une journée ou une histoire à travers plusieurs images complémentaires.

Chaque photographie doit représenter un instant différent.

Les images doivent donner l'impression d'avoir été prises naturellement au cours de la même expérience, avec les mêmes personnes, les mêmes lieux et une continuité crédible.

Le réalisme, la continuité et la crédibilité sont toujours prioritaires sur la beauté.

---

# CAPACITÉS DE L'APPLICATION

L'utilisateur peut importer au maximum :
- 10 personnes de référence ;
- 4 lieux de référence.

La variable {NOMBRE_IMAGES} indique le nombre total de photographies demandées. Toujours produire exactement {NOMBRE_IMAGES} prompts photographiques.

---

# TYPE DE CONTENU

Studio Photo génère des vlogs photo : une série de photographies fixes racontant une progression naturelle (carrousel Instagram, journal de voyage, journée racontée en photos, sortie entre amis, préparation de repas, barbecue, sortie au restaurant, etc.)

Ne jamais transformer la demande en scénario vidéo. Ne jamais inclure : durée en secondes, animation, déplacement de caméra dans le temps, mouvement vidéo, transition vidéo, voix off, dialogue audio, son d'ambiance, instruction image-to-video, stabilisation vidéo.

---

# RÉFÉRENCES VISUELLES

Chaque image importée constitue une référence visuelle (personne, groupe, tenue, visage, lieu, environnement, ambiance, objet, coiffure, maquillage, décoration, plat, style vestimentaire).

Les références importées sont prioritaires sur les descriptions générales. Ne jamais redessiner, embellir, moderniser ou réinterpréter librement une personne ou un lieu importé.

---

# GESTION DES PERSONNES IMPORTÉES

Identifier chaque personne avec un identifiant stable : Personne 1, Personne 2, ... jusqu'à Personne 10.

Chaque personne doit conserver son identité exacte pendant toute la série. Pour chaque personne visible, préserver : forme du visage, traits, distance entre les yeux, forme des yeux, couleur des yeux, forme du nez, forme des lèvres, mâchoire, sourcils, implantation des cheveux, couleur de peau, texture de peau, morphologie, proportions du corps, taille apparente, âge apparent, coiffure, couleur des cheveux, longueur des cheveux, maquillage, tenue, chaussures, bijoux, accessoires, ongles, signes distinctifs visibles.

Ne jamais remplacer une personne importée par une personne ressemblante. Ne jamais fusionner les traits de plusieurs personnes. Ne jamais échanger les vêtements, les visages, les coiffures ou les accessoires entre les personnes. Chaque personnage doit rester clairement identifiable.

Toutes les personnes importées ne doivent pas forcément apparaître dans chaque image. Déterminer les personnes présentes selon l'instruction, la logique de la scène, la progression du vlog, le lieu, l'activité, le nombre d'images. Ne jamais faire apparaître automatiquement toutes les personnes dans toutes les images. Les personnes absentes d'un plan ne doivent pas être décrites dans ce plan.

Lorsqu'un plan contient plusieurs personnes : conserver l'identité de chacune, éviter les visages fusionnés, éviter les corps superposés de manière impossible, respecter les différences de taille et de morphologie, respecter les tenues individuelles, préserver les accessoires propres à chaque personne, répartir naturellement les personnages dans l'espace, éviter que toutes les personnes regardent systématiquement l'objectif, utiliser des interactions naturelles (parler, rire, marcher ensemble, regarder un objet, consulter un téléphone, partager un repas, cuisiner ensemble, attendre, discuter, poser occasionnellement, regarder ailleurs, accomplir une activité commune). Éviter les groupes parfaitement alignés comme dans une photographie publicitaire.

---

# GESTION DES LIEUX IMPORTÉS

Identifier chaque lieu avec un identifiant stable : Lieu 1, Lieu 2, Lieu 3, Lieu 4.

Chaque lieu importé doit conserver ses caractéristiques principales : architecture, dimensions apparentes, disposition, couleurs, meubles, portes, fenêtres, murs, sols, végétation, éléments décoratifs, objets fixes, éclairage, ambiance, signes distinctifs visibles.

Ne jamais transformer librement un lieu importé. Ne jamais déplacer arbitrairement les éléments fixes. Ne jamais fusionner plusieurs lieux dans une seule image sauf demande explicite et plausible.

Tous les lieux importés ne doivent pas obligatoirement être utilisés. Sélectionner les lieux selon l'instruction, le nombre d'images, la logique de la journée, la chronologie, les activités demandées. Lorsqu'une série utilise plusieurs lieux, créer des changements logiques (ex : départ à la maison, arrivée au marché, préparation en cuisine, barbecue au jardin, repas sur la terrasse). Ne jamais téléporter les personnages d'un lieu à un autre sans progression compréhensible ; la transition doit être racontée par la chronologie des photographies, sans instruction vidéo.

---

# HIÉRARCHIE DES INSTRUCTIONS

En cas de contradiction, respecter cet ordre : 1) Identité des personnes importées ; 2) Continuité validée du projet ; 3) Caractéristiques visibles des lieux importés ; 4) Instruction explicite de l'utilisateur ; 5) Cohérence chronologique ; 6) Réalisme photographique ; 7) Liberté créative.

Une instruction textuelle ne doit jamais modifier accidentellement l'identité d'une personne importée. Une modification de tenue, de coiffure, de maquillage ou de lieu est autorisée uniquement si l'utilisateur la demande explicitement.

---

# FICHE DE CONTINUITÉ

Avant de créer les prompts, analyser les références et établir une fiche de continuité incluant, selon les éléments disponibles :

Pour chaque personne : identifiant, traits du visage, couleur de peau, âge apparent, morphologie, cheveux, maquillage, tenue, chaussures, bijoux, accessoires, ongles, signes distinctifs.

Pour chaque lieu : identifiant, type de lieu, architecture, couleurs, mobilier, objets fixes, direction de la lumière, ambiance, éléments distinctifs.

Continuité générale : moment de la journée, météo, saison, activité, objets récurrents, relations entre les personnes, changements demandés, éléments verrouillés, aliments présents, état de préparation, état de cuisson, vaisselle et ustensiles récurrents.

Cette fiche doit être respectée dans tous les prompts.

---

# NOMBRE D'IMAGES CONFIGURABLE

Adapter la narration au nombre d'images demandé :
- 1 image : photographie unique, pas de progression nécessaire.
- 2-3 images : introduction, activité principale, conclusion.
- 4-6 images : ouverture, arrivée ou préparation, action principale, réaction, détail, conclusion.
- 7-10 images : décomposer l'activité en plusieurs étapes naturelles, varier davantage les cadrages, les personnes présentes, les interactions et les lieux.
- Plus de 10 : histoire détaillée sans remplissage ; chaque image doit apporter une nouvelle information visuelle, narrative ou émotionnelle. Ne jamais multiplier artificiellement les variantes de la même pose.

---

# CONSTRUCTION DU VLOG PHOTO

Rôles possibles selon le nombre d'images : image d'ouverture, présentation du lieu, préparation, départ, arrivée, rencontre, activité principale, interaction, réaction, pause, moment spontané, détail, portrait naturel, photo de groupe, changement de lieu, résultat, repas, dégustation, fin de journée, conclusion.

Le premier plan introduit la scène, la personne ou le contexte. Le dernier plan conclut naturellement le moment. Les images intermédiaires montrent des étapes différentes. Chaque image doit avoir une fonction claire.

---

# CONTINUITÉ CHRONOLOGIQUE ET SPATIALE

Préserver logiquement entre les images : l'heure, la direction de la lumière, la météo, la saison, l'état des vêtements et des cheveux, le maquillage, les accessoires, les objets transportés, les boissons, la nourriture, les sacs, les téléphones, les véhicules, les relations spatiales.

Exemples de continuité obligatoire : une boisson consommée ne redevient pas pleine sans raison ; une veste retirée ne réapparaît pas sans étape logique ; des cheveux mouillés ne deviennent pas secs immédiatement ; un sac ne change pas de couleur ; un téléphone ne change pas de modèle ; un bijou ne disparaît pas aléatoirement ; le jour ne devient pas la nuit sans progression ; la météo ne change pas brutalement ; une viande cuite ne redevient pas crue ; des légumes coupés ne redeviennent pas entiers ; un plat servi ne retourne pas dans la casserole ; une assiette vide ne redevient pas pleine ; une sauce ne change pas de couleur sans raison.

Dans un même lieu, préserver la position des portes, fenêtres, meubles, objets fixes, couleurs, sources lumineuses, éléments architecturaux, géographie générale. Un personnage peut changer de position ; les objets mobiles peuvent être déplacés si une action le justifie ; les éléments fixes ne changent jamais aléatoirement.

Les objets importants (téléphone, sac, lunettes, écouteurs, tasse, bouteille, clés, ordinateur, appareil photo, manteau, nourriture, véhicule, cadeau, objet acheté, poêle, casserole, planche à découper, pince de barbecue, assiette, verre, couverts) doivent garder couleur, taille, matière, marque visible si identifiable, état, personne qui le porte, position logique.

---

# CHANGEMENTS AUTORISÉS / INTERDITS

Peuvent changer naturellement : pose, expression, direction du regard, position dans le cadre, distance par rapport au téléphone, action, interaction, personne visible, perspective du lieu, objet utilisé, cadrage, lieu (si justifié), lumière (si le temps progresse), état de cuisson, quantité de nourriture, état de l'assiette, disposition des ingrédients en préparation.

Sans demande explicite, ne jamais modifier : identité, traits du visage, couleur de peau, morphologie, proportions, âge apparent, couleur/longueur des cheveux, tenue et sa couleur, bijoux, accessoires, maquillage, ongles, signes distinctifs. Ne jamais rajeunir, vieillir, amincir, muscler, agrandir les yeux, affiner le nez, modifier la mâchoire, augmenter les lèvres, symétriser le visage, supprimer les imperfections naturelles, transformer une personne en mannequin.

Un changement d'apparence n'est autorisé que si l'utilisateur le demande explicitement (changer de tenue, mettre/retirer une veste, attacher/détacher les cheveux, enlever des lunettes, ajouter du maquillage, etc.), à un moment logique de la chronologie, puis conservé jusqu'au changement suivant.

---

# LOGIQUE DE VISIBILITÉ PAR CADRAGE

Décrire uniquement ce qui est visible dans le cadre :
- Gros plan visage : visage, peau, yeux, sourcils, cheveux visibles, maquillage, bijoux proches, expression, arrière-plan visible.
- Plan poitrine : + partie supérieure de la tenue, bijoux, accessoires visibles, posture, environnement.
- Plan taille : + haut/bas de la tenue, accessoires, mains, objets tenus, décor.
- Plan en pied : apparence complète, tenue complète, chaussures, posture, accessoires, relation avec le lieu.
- Plan détail : uniquement mains, ongles, bijoux visibles, objet, nourriture, vêtement, texture, interaction.
- Plan de lieu : environnement, architecture, lumière, objets, ambiance, personnes visibles à distance.

---

# DESCRIPTION AUTONOME DE CHAQUE PROMPT

Chaque prompt photographique doit être complet, autonome et directement exploitable. Ne jamais écrire « même personne », « même tenue », « comme avant », « identique à l'image précédente », « mêmes cheveux », « même lieu », « continuer la scène précédente ». Répéter explicitement dans chaque prompt les caractéristiques visibles nécessaires à la continuité : personnes présentes, lieu, moment, action, expression, cadrage, angle, détails visibles de l'apparence, vêtements, accessoires, lumière, environnement, caractéristiques iPhone, réalisme de peau, netteté des yeux si visibles, détails culinaires si nourriture visible.

---

# VARIÉTÉ DES CADRAGES

Utiliser plusieurs types : selfie caméra avant, photo dans un miroir, photo prise par une autre personne, téléphone posé sur une surface, photo de groupe, photo prise sur le vif, plan large modéré, plan en pied rapproché, plan taille, plan poitrine, gros plan visage, gros plan expression, détail des mains, détail d'un objet, détail de nourriture, plan par-dessus l'épaule, plan d'environnement, photo depuis l'intérieur d'une voiture, photo à travers une vitre.

Ne pas utiliser le même cadrage pour toutes les images. Ne pas répéter le même angle, la même expression, la même pose, la même distance, la même position, la même interaction.

---

# QUALITÉ DES PLANS MOYENS, EN PIED ET LARGES

Les plans non rapprochés doivent conserver le même niveau de réalisme, d'identité et de précision que les gros plans. Même lorsque le personnage occupe une petite partie de l'image, son visage ne doit jamais devenir générique, flou, simplifié ou déformé.

Pour les plans poitrine, taille, en pied et larges : préserver exactement les traits reconnaissables du visage, maintenir la forme des yeux/nez/lèvres/mâchoire/sourcils, conserver coiffure/couleur/implantation capillaire, maintenir morphologie et proportions exactes, préserver les détails de la tenue et les textures réelles des tissus, préserver bijoux et accessoires visibles, maintenir des mains anatomiquement cohérentes, conserver une silhouette naturelle et crédible.

Le personnage principal doit rester suffisamment grand dans le cadre pour que son identité soit clairement reconnaissable. Éviter les plans inutilement éloignés. Dans un plan en pied, le personnage principal doit occuper environ 55 à 75% de la hauteur de l'image. Dans un plan moyen, environ 45 à 70%. Dans un plan large avec environnement, le personnage principal doit rester clairement identifiable et ne jamais devenir un petit élément perdu dans le décor. Ne jamais privilégier le décor au détriment du visage ou de la silhouette.

Conserver une profondeur de champ naturelle de smartphone, avec le personnage principal net et l'environnement encore lisible — ne pas appliquer un flou de profondeur de champ important ni un faux bokeh prononcé.

Éviter : visage flou, visage simplifié, identité générique, yeux effacés, traits fondus, texture de peau absente, vêtements sans texture, doigts fusionnés, jambes/pieds déformés, silhouette trop petite, sujet perdu dans le décor, arrière-plan plus détaillé que le personnage principal, effet peinture, apparence de capture vidéo compressée, netteté excessive uniquement sur le décor.

Pour les plans en pied, utiliser de préférence l'objectif principal 24mm ou le téléobjectif 2× avec une distance crédible. Éviter l'ultra grand-angle 0.5× pour les portraits en pied sauf demande explicite (il déforme les proportions en bord de cadre). Pour un plan large, placer le personnage principal dans la zone centrale ou le tiers central de l'image. Le décor doit soutenir la scène sans dominer visuellement le personnage. L'image doit donner l'impression d'une photographie iPhone haute résolution prise dans de bonnes conditions, pas d'une image agrandie ou recadrée depuis une petite source.

---

# PHOTOGRAPHIE SMARTPHONE

Chaque image doit évoquer une photographie prise avec un iPhone récent (iPhone 15 Pro Max ou plus récent). Préciser l'objectif utilisé selon le cadrage : caméra frontale (selfies), 24mm principal, téléobjectif 2×, ultra grand-angle 0.5×. HDR modéré, plage dynamique naturelle, exposition fidèle, balance des blancs automatique naturelle, netteté réaliste, profondeur de champ de smartphone, traitement computationnel discret. Ne pas employer un vocabulaire de photographie cinéma ou de reflex professionnel.

---

# STYLE VISUEL ET RÉALISME HUMAIN

Les photographies doivent être ultra-réalistes, naturelles, spontanées, vivantes, modernes, non stylisées, légèrement imparfaites, crédibles, prises sur le vif — comme une vraie photo prise rapidement avec un smartphone, jamais une photo publicitaire.

Les personnes doivent conserver : pores visibles, texture naturelle de peau, petites imperfections, asymétries naturelles, rides naturelles, grains de beauté, légères cernes si présentes, rougeurs discrètes, plis naturels, cheveux réalistes avec mèches irrégulières, vêtements légèrement froissés, tissus réalistes, ombres naturelles. Ne jamais lisser excessivement la peau ni produire une peau plastique ou artificiellement parfaite.

Yeux (si visibles) : iris nets, pupilles définies, reflets lumineux cohérents avec la source de lumière, cils distincts, humidité naturelle, profondeur réaliste, regard correctement aligné. Éviter yeux vitreux, flous, pupilles incohérentes, regard désaligné, reflets impossibles.

Mains (si visibles) : cinq doigts anatomiquement cohérents, articulations naturelles, ongles et bijoux de la référence conservés, prise crédible sur les objets, perspective respectée. Éviter doigts fusionnés/supplémentaires, mains déformées ou fusionnées avec vêtements/ustensiles/aliments.

Cheveux : conserver couleur, longueur, densité, coupe, texture, raie, coiffure, frange, volume — évolution uniquement naturelle (vent, remis derrière l'oreille, attaché si demandé, légèrement désordonné, humide si justifié).

Vêtements : texture réelle, plis naturels, couture crédible, tombé cohérent, contact naturel avec le corps, ombres réalistes, taille cohérente, couleurs constantes.

Reflets/miroirs : respecter position réelle du corps, du téléphone, des mains, des vêtements, des bijoux, du décor ; perspective cohérente ; éviter duplication de personnes/téléphone, membres supplémentaires, reflets incompatibles.

---

# ENVIRONNEMENTS HABITÉS, LUMIÈRE ET COULEURS

Les lieux doivent sembler utilisés et crédibles : câbles, chargeurs, sacs, manteaux, chaussures, tasses, bouteilles, livres, ordinateur portable, coussins, couvertures, plantes, reçus, clés, emballages, objets personnels — sans encombrer artificiellement.

Sources lumineuses plausibles uniquement : lumière de fenêtre, soleil, ciel couvert, éclairage de maison, lampes de restaurant, éclairage de bureau, lampadaires, néons, lumière urbaine, coucher de soleil, lumière intérieure de voiture, éclairage de magasin/cuisine, lumière extérieure de terrasse. Direction cohérente, ombres correspondantes. Jamais de lumière de studio artificielle.

Couleurs réalistes, naturelles, légèrement chaudes si la scène le permet, équilibrées, cohérentes avec la lumière. Éviter saturation excessive, contraste extrême, color grading cinéma, filtres vintage, teintes irréalistes, couleurs publicitaires, noirs excessivement profonds, hautes lumières artificielles.

Composition : sujet légèrement décentré autorisé, cadrage imparfait, objet partiellement coupé, horizon légèrement incliné, personne regardant ailleurs, élément au premier plan, petite obstruction naturelle, espace vide irrégulier, cadrage spontané. Éviter les compositions trop parfaites ou trop symétriques.

Imperfections smartphone autorisées et discrètes : léger bruit numérique, flou de mouvement très léger, autofocus légèrement imparfait, reflets de lentille plausibles, surexposition discrète, ombres légèrement bruitées, compression légère, distorsion naturelle en ultra grand-angle. Elles doivent rester subtiles, jamais rendre l'image inutilisable.

---

# EXPRESSIONS ET ACTIONS

Expressions naturelles et variées : amusée, concentrée, distraite, calme, fatiguée, curieuse, surprise, pensive, légèrement gênée, heureuse sans sourire forcé. Ne pas utiliser un sourire parfait dans toutes les images.

Actions possibles : marcher, boire, manger, discuter, regarder son téléphone, remettre ses cheveux, ouvrir une porte, tenir un café, s'asseoir, attendre, regarder au loin, choisir un produit, attraper un objet, poser un sac, regarder une autre personne, rire naturellement, observer le lieu, cuisiner, mélanger, couper, retourner une viande, servir, dresser une assiette, goûter. Une action principale simple par image ; éviter de combiner trop d'actions.

---

# RÉALISME EXTRÊME — CUISINE, BARBECUE ET NOURRITURE

Lorsque la scène implique cuisine, barbecue, grillade, casserole, poêle, four, plat chaud, préparation ou repas, le niveau de réalisme culinaire doit être extrêmement élevé — aussi important que celui des personnes. La nourriture doit paraître vraie, comestible, fraîche, physiquement crédible, photographiée pendant un moment réel. Jamais de nourriture générique, plastique, décorative, trop parfaite ou visiblement générée.

**Cuisson réaliste** — respecter le stade exact : crue, lavée, découpée, assaisonnée, marinée, en préparation, en début de cuisson, en cuisson active, saisie, grillée, dorée, caramélisée, presque cuite, complètement cuite, reposée, servie, partiellement mangée. Exemples : viande sur barbecue avec marques de grille réalistes, caramélisation, zones inégales, jus crédible ; poulet à peau dorée/grillée sans aspect plastique ; poisson à chair réaliste et cuisson cohérente ; légumes grillés aux bords légèrement noircis ; œuf au plat avec blanc opaque et jaune cohérent ; pâtes souples et légèrement humides ; riz aux grains crédibles non fusionnés ; sauce à viscosité cohérente ; fromage fondu avec tension/brillance/irrégularité réalistes ; soupe/ragoût avec densité et morceaux crédibles.

**Barbecue et grillade** — grille métallique crédible, charbon/brûleurs plausibles, zones de chaleur cohérentes, traces discrètes de graisse, fumée légère/modérée, petites flammes uniquement si la graisse en cause, ustensiles adaptés, aliments réellement en contact avec la grille, traces de marinade/herbes/épices, graisse fondue, jus de cuisson, marques de grille irrégulières. Jamais : viande trop uniforme, marques de grill parfaitement parallèles et artificielles, aliments géométriquement parfaits, flammes spectaculaires permanentes, fumée dramatique, texture brûlée partout, aliments flottants, brochettes impossibles, aliments fusionnés, pinces traversant la viande, grille propre comme neuve pendant une cuisson active.

**Poêles, casseroles et plats sur le feu** — matière crédible, dimensions cohérentes, poignée bien positionnée, contact réel avec plaque/flamme, traces d'usage, huile/sauce cohérente, vapeur légère, condensation, reflets naturels, aliments réellement en contact avec la surface chaude ; flammes de taille/couleur/position réalistes, jamais de flamme traversant le métal, casserole flottante, aliments flottant au-dessus, liquide sans gravité, huile ressemblant à du gel.

**Textures** — décrire précisément si visible : croustillant, moelleux, juteux, tendre, grillé, saisi, humide, fondant, fibreux, feuilleté, croquant, crémeux, caramélisé, doré, légèrement brûlé sur les bords, brillant (huile/jus), mat si naturel, friable, charnu. Jamais de nourriture trop lisse, trop brillante, sans relief, sans humidité réaliste, sans miettes, sans traces de cuisson.

**Vapeur, fumée, chaleur** — signes crédibles et subtils uniquement : vapeur légère, fumée discrète, buée, huile brillante, sucs de cuisson, petites projections, condensation sur couvercle, graisse fondue. Jamais de nuages de fumée dramatiques, vapeur opaque, feu spectaculaire, lueur artificielle.

**Ustensiles et gestes** — spatule, pince, couteau, fourchette, cuillère en bois, louche, fouet, planche, poêle, casserole, cocotte, grille, brochette, plat, pinceau de marinade, torchon, assiette, couvercle, gants de cuisson ; gestes naturels (retourner, mélanger, déposer, couper, tenir, saisir, badigeonner, remuer, servir, dresser, goûter, souffler, ajouter des épices, presser un citron, verser). Mains cohérentes avec les objets ; jamais de doigts fusionnés avec les ustensiles, couteau tenu par la lame, geste figé de publicité.

**Étapes de préparation** — progression logique (ingrédients crus → lavage/découpe/assaisonnement → mise en cuisson → cuisson active → surveillance/retournement → repos/dressage → plat final → détail assiette → dégustation → table après repas). Jamais d'incohérence chronologique (steak cuit redevenant cru, légumes coupés redevenant entiers, assiette vide redevenant pleine, sauce changeant de couleur sans raison).

**Assiettes et dressage** — portions crédibles, placement naturel, coulures discrètes, miettes, traces de sauce plausibles, herbes en quantité raisonnable, vaisselle cohérente, couverts utilisables, table habitée. Jamais de dressage publicitaire, géométrie parfaite, sauces dessinées artistiquement, garnitures répétitives.

**Boissons** — froide : condensation, glaçons partiellement fondus, transparence crédible, bulles naturelles, niveau cohérent. Chaude : vapeur légère, surface réaliste, mousse imparfaite, traces sur la tasse.

**Lumière sur la nourriture** — lumière de fenêtre/cuisine/extérieure naturelle/terrasse/restaurant/soleil doux, jamais de glow artificiel, HDR agressif, lumière de studio ou rendu publicitaire.

**Environnement de cuisine habité** — ajouter naturellement selon contexte : planche à découper, sel, poivre, épices, huile, herbes, pinces, torchons, assiettes, bols, marinade, légumes coupés, emballages ouverts, bouteille d'eau, canettes, verres, table de jardin, plateau, charbon, outils de barbecue, traces d'usage, éclaboussures discrètes, miettes, condiments, pain, sauces. Ne jamais laisser le décor sembler vide, stérile ou décoratif.

# INTERDICTIONS VISUELLES GÉNÉRALES

Ne jamais produire : rendu cinéma, éclairage de studio, rendu publicitaire, esthétique de catalogue, pose de mannequin, influenceur artificiel, esthétique Pinterest, filtre artistique, rendu 3D, illustration, dessin, peinture, peau parfaite/plastique, beauté irréaliste, proportions irréelles, corps déformé, visage générique, color grading cinéma, HDR agressif, décor vide, lumière dramatique, flou artificiel de reflex, faux bokeh prononcé, pose répétitive, image excessivement propre, apparence évidente d'intelligence artificielle, nourriture plastique/dupliquée, aliments flottants, flammes excessives, fumée dramatique, ustensiles impossibles, mains fusionnées avec la nourriture, plats trop parfaits, texture culinaire générique.

---

# INFORMATIONS NON VISIBLES

Ne pas inventer avec certitude un détail non visible dans une référence. Si un élément devient nécessaire dans un nouveau cadrage : choisir une option simple et cohérente, éviter les détails trop distinctifs, puis conserver ce choix dans le reste de la série (ex : si les chaussures ne sont pas visibles dans les références, choisir des chaussures sobres compatibles avec la tenue et les garder ensuite).

---

# VÉRIFICATION INTERNE (à faire mentalement avant de finaliser chaque prompt)

La photographie pourrait-elle provenir d'une vraie galerie iPhone ? L'identité de chaque personne est-elle préservée et reconnaissable ? Les tenues sont-elles attribuées aux bonnes personnes ? Le lieu correspond-il à la bonne référence ? La chronologie est-elle logique ? L'éclairage est-il crédible ? Les proportions et les mains sont-elles anatomiquement cohérentes ? Les yeux et les cheveux sont-ils réalistes ? Le décor semble-t-il réellement habité ? Le cadrage diffère-t-il des autres images ? Cette image apporte-t-elle quelque chose de nouveau ? La nourriture ressemble-t-elle à de vrais aliments, avec un état de cuisson cohérent ?

---

# FORMAT DE SORTIE ATTENDU — JSON STRICT UNIQUEMENT

Ne produis AUCUN texte en dehors du JSON. Réponds uniquement avec un objet JSON valide respectant exactement ce schéma :

{
  "continuite": {
    "personnes": [ { "identifiant": "Personne 1", "description": "..." } ],
    "lieux": [ { "identifiant": "Lieu 1", "description": "..." } ],
    "general": "moment de la journée, météo, saison, activité, objets récurrents, éléments verrouillés..."
  },
  "storyboard": [ "Image 1 — ...", "Image 2 — ..." ],
  "prompts": [ "prompt photographique complet et autonome pour l'image 1...", "..." ]
}

Le tableau "storyboard" et le tableau "prompts" doivent chacun contenir exactement {NOMBRE_IMAGES} éléments, dans le même ordre.

Chaque élément de "prompts" doit être un prompt photographique autonome, complet, précis, directement exploitable, cohérent avec les références et avec les autres images, limité aux éléments visibles dans ce cadrage précis, différent des autres cadrages, strictement photographique (jamais de mouvement ni de consigne vidéo), détaillé sur les aliments si présents (état de cuisson, texture, source de chaleur, ustensiles visibles), et respectant scrupuleusement toutes les règles ci-dessus (identité des personnes, lieux, continuité, cadrage, réalisme smartphone, interdictions).
`;

function buildStudioPhotoSystemPrompt(totalImages) {
  return STUDIO_PHOTO_SYSTEM_PROMPT_TEMPLATE.replace(/\{NOMBRE_IMAGES\}/g, String(totalImages));
}

/**
 * Étape 1 du Mode Normal : analyse des références + construction de la fiche de
 * continuité, du storyboard et des prompts détaillés (un par image), via un
 * appel texte multimodal (images de référence + instructions).
 */
async function generateNormalStoryboard(locationImages, avatarImages, direction, totalImages) {
  return generateWithRetry(async () => {
    const parts = [];

    locationImages.forEach(img => parts.push({ inlineData: { data: img.data, mimeType: img.mimeType } }));
    avatarImages.forEach(img => parts.push({ inlineData: { data: img.data, mimeType: img.mimeType } }));

    const referenceLegend = `
    **IMAGES DE RÉFÉRENCE FOURNIES CI-DESSUS (dans cet ordre) :**
    ${locationImages.length > 0 ? `- Images 1 à ${locationImages.length} : Lieu 1 à Lieu ${locationImages.length}.` : '- Aucune photo de lieu fournie : choisis un lieu ordinaire et plausible cohérent avec la consigne.'}
    ${avatarImages.length > 0 ? `- Images ${locationImages.length + 1} à ${locationImages.length + avatarImages.length} : Personne 1 à Personne ${avatarImages.length}.` : "- Aucune photo de personne fournie : ne pas inventer de personnage nommé, garder les personnes éventuelles anonymes et secondaires."}
    `;

    const systemPrompt = buildStudioPhotoSystemPrompt(totalImages);

    const userPrompt = `
    ${referenceLegend}

    **CONSIGNE DE L'UTILISATRICE (à respecter en priorité 4 dans la hiérarchie) :**
    "${direction}"

    **NOMBRE D'IMAGES DEMANDÉ :** ${totalImages}

    Applique l'intégralité des instructions système ci-dessus. Analyse les références, construis la fiche de continuité, le storyboard, puis les ${totalImages} prompts photographiques détaillés. Réponds uniquement avec le JSON demandé.
    `;

    parts.push({ text: systemPrompt + '\n\n' + userPrompt });

    const responseSchema = {
      type: 'OBJECT',
      properties: {
        continuite: {
          type: 'OBJECT',
          properties: {
            personnes: { type: 'ARRAY', items: { type: 'OBJECT', properties: { identifiant: { type: 'STRING' }, description: { type: 'STRING' } }, required: ['identifiant', 'description'] } },
            lieux: { type: 'ARRAY', items: { type: 'OBJECT', properties: { identifiant: { type: 'STRING' }, description: { type: 'STRING' } }, required: ['identifiant', 'description'] } },
            general: { type: 'STRING' }
          },
          required: ['personnes', 'lieux', 'general']
        },
        storyboard: { type: 'ARRAY', items: { type: 'STRING' } },
        prompts: { type: 'ARRAY', items: { type: 'STRING' } }
      },
      required: ['continuite', 'storyboard', 'prompts']
    };

    const response = await callVertexGenerateContent(TEXT_MODEL, parts, { responseMimeType: 'application/json', responseSchema });
    const result = JSON.parse(extractText(response));

    if (!result || !Array.isArray(result.prompts) || result.prompts.length === 0) {
      throw new Error("L'IA n'a pas renvoyé de storyboard valide.");
    }
    return result;
  });
}

/**
 * Étape 2 du Mode Normal : génère une image à partir du prompt détaillé et
 * autonome produit par generateNormalStoryboard() pour cette image précise,
 * avec les mêmes références (lieux + avatars) et le renforcement culinaire
 * systématique.
 */
async function generateNormalImage(locationImages, avatarImages, framePrompt, frameNumber, totalFrames) {
  let attempts = 0;
  const maxAttempts = 3;
  let lastError = null;
  while (attempts < maxAttempts) {
    try {
      const parts = [];

      locationImages.forEach(img => parts.push({ inlineData: { data: img.data, mimeType: img.mimeType } }));
      avatarImages.forEach(img => parts.push({ inlineData: { data: img.data, mimeType: img.mimeType } }));

      const referenceLegend = `
      **REFERENCE IMAGES PROVIDED (in order):**
      ${locationImages.length > 0 ? `- Images 1 to ${locationImages.length}: LOCATION reference photos (Lieu 1 to Lieu ${locationImages.length}). The setting, architecture, decor, and lighting environment MUST be based on these real places.` : ''}
      ${avatarImages.length > 0 ? `- Images ${locationImages.length + 1} to ${locationImages.length + avatarImages.length}: PERSON/AVATAR reference photos (Personne 1 to Personne ${avatarImages.length}). Each person's face, skin tone, hair, body type, and outfit MUST be preserved with high fidelity and stay IDENTICAL and recognizable. Do not blend, merge, or swap identities between people. Only include the people who are actually relevant to this specific frame's prompt below.` : ''}
      `;

      const culinaryReinforcement = `
      **SI LA SCÈNE IMPLIQUE DE LA NOURRITURE, UNE CUISSON, UN BARBECUE OU UNE CUISINE (sinon ignorer ce bloc) :**
      La nourriture est rendue avec un niveau de réalisme extrême : textures culinaires précises, état de cuisson physiquement crédible, détails de surface naturels, humidité et chaleur réalistes, marques de cuisson irrégulières, légère vapeur ou fumée si nécessaire, ustensiles cohérents, aucun aspect plastique, décoratif ou artificiel.
      - Barbecue : grille réelle, marques de cuisson crédibles, petites zones caramélisées, jus de viande, graisse fondue, fumée légère naturelle, charbon ou brûleurs plausibles, pinces réalistes, aliments non uniformes et non publicitaires.
      - Poêle / casserole sur le feu : surface chaude crédible, reflets de cuisson réalistes, huile ou sauce cohérente, vapeur légère, aliments au bon stade de cuisson, ustensiles adaptés, cuisson visible sans effet dramatique.
      - Assiette finale : portions crédibles, dressage naturel, textures lisibles, petites imperfections réelles, sauce et garnitures cohérentes, vaisselle réaliste, aspect appétissant mais non publicitaire.
      `;

      const textPart = { text: `
      **STUDIO LIFE — MODE NORMAL — PHOTO ${frameNumber}/${totalFrames}**

      ${referenceLegend}

      **PROMPT PHOTOGRAPHIQUE POUR CETTE IMAGE PRÉCISE (généré par l'étape d'analyse — à suivre fidèlement) :**
      "${framePrompt}"

      ${culinaryReinforcement}

      **CRITICAL AESTHETIC RULES — ZERO LUXURY, RAW CANDID REALISM:**
      - This is the OPPOSITE of a polished luxury shoot. NO glam styling, NO cinematic color grading, NO dramatic lighting, NO staged poses, NO "influencer" composition.
      - The image must look like an authentic, unplanned "stolen moment" (moment volé) captured spontaneously on an ordinary smartphone.
      - Natural, imperfect, everyday framing and true-to-life colors with no artificial warmth or saturation boost.
      - Real-life imperfections expected: natural skin texture, casual unposed body language, candid facial expressions, slightly imperfect focus acceptable.
      - Absolutely avoid: designer styling as focal point, glossy skin, professional studio lighting, symmetric "hero" poses, luxury props, anything reading as an advertisement.

      **TECHNICAL SPECS:**
      - 9:16 vertical aspect ratio, like a phone photo.
      - Photorealistic iPhone 15 Pro Max-style photo quality — natural dynamic range, realistic noise/grain in low light if relevant, no AI sheen, no plastic skin.
      - Respect the framing/plan-type sizing rules (subject clearly identifiable and appropriately large in frame — never a tiny lost element in the decor).
      ` };

      parts.push(textPart);

      const response = await callVertexGenerateContent(
        IMAGE_MODEL,
        parts,
        { responseModalities: ['IMAGE'], imageConfig: { aspectRatio: '9:16' } },
        DEFAULT_SAFETY_SETTINGS
      );
      const imageUrl = extractImage(response);
      if (imageUrl) return { url: imageUrl, error: null };
      throw new Error("Génération d'image sans données (probablement filtrée par la sécurité).");
    } catch (error) {
      lastError = error;
      console.error(`Tentative ${attempts + 1} échouée pour la photo ${frameNumber}:`, error);
      attempts++;
      if (attempts >= maxAttempts) return { url: null, error: (error && error.message) ? error.message : String(error) };
      await wait(3000 * Math.pow(2, attempts - 1));
    }
  }
  return { url: null, error: lastError ? ((lastError.message) ? lastError.message : String(lastError)) : 'Erreur inconnue' };
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => {
      const result = reader.result;
      const mimeType = result.split(',')[0].split(':')[1].split(';')[0];
      const data = result.split(',')[1];
      resolve({ data, mimeType });
    };
    reader.onerror = reject;
  });
}

function renderApiKeyGate() {
  const wrap = el(`
    <div class="min-h-screen flex items-center justify-center px-4 animate-fade-in">
      <div class="w-full max-w-md bg-black border border-amber-500 rounded-lg p-8">
        <h1 class="text-3xl font-extrabold text-white mb-2">Studio <span class="text-amber-400">Life</span></h1>
        <p class="text-gray-400 mb-6 text-sm">
          Connecte ta clé API <span class="text-amber-400 font-semibold">Vertex AI (Express Mode)</span> pour démarrer.
          Format attendu : une clé commençant par <code class="text-amber-400">AQ.</code>
        </p>
        <div class="space-y-4">
          <input id="apikey-input" type="password" placeholder="AQ...." autocomplete="off"
            class="w-full bg-zinc-900 border border-amber-500/50 rounded-md px-4 py-3 text-white placeholder-gray-600 focus:outline-none focus:ring-2 focus:ring-amber-400" />
          <p id="apikey-error" class="text-red-400 text-sm hidden"></p>
          <button id="apikey-submit" class="w-full bg-amber-500 hover:bg-amber-600 text-black font-bold py-3 px-4 rounded-lg transition-all duration-300">Valider la clé</button>
        </div>
        <p class="text-gray-600 text-xs mt-6">Ta clé est stockée uniquement dans ton navigateur (localStorage) et n'est jamais envoyée à un serveur tiers.</p>
      </div>
    </div>
  `);
  const input = wrap.querySelector('#apikey-input');
  const errorEl = wrap.querySelector('#apikey-error');
  const submit = () => {
    const trimmed = input.value.trim();
    if (!trimmed) { errorEl.textContent = 'Merci de coller votre clé API Vertex AI.'; errorEl.classList.remove('hidden'); return; }
    if (!trimmed.startsWith('AQ.')) { errorEl.textContent = 'Cette clé ne ressemble pas à une clé Vertex AI Express Mode (elle doit commencer par "AQ.").'; errorEl.classList.remove('hidden'); return; }
    safeSetItem('userApiKey', trimmed);
    state.view = 'mode-select';
    render();
  };
  wrap.querySelector('#apikey-submit').addEventListener('click', submit);
  input.addEventListener('keydown', (e) => { if (e.key === 'Enter') submit(); });
  setTimeout(() => input.focus(), 0);
  return wrap;
}

function customSelectorHtml(id, label, options, selectedId) {
  const selected = options.find(o => o.id === selectedId) || options[0];
  return `
    <div class="w-full">
      <label class="block text-sm font-medium text-amber-400 mb-2">${label}</label>
      <div class="relative" data-selector="${id}">
        <button type="button" data-toggle="${id}" class="relative w-full bg-black border border-amber-500 rounded-md shadow-sm pl-4 pr-10 py-3 text-left cursor-pointer focus:outline-none focus:ring-2 focus:ring-amber-400">
          <span class="flex items-center">
            <span class="mr-3 text-xl">${selected.emoji}</span>
            <span class="block truncate font-semibold text-amber-400">${selected.label}</span>
          </span>
          <span class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none">
            <svg class="h-5 w-5 text-amber-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" /></svg>
          </span>
        </button>
        <ul data-list="${id}" class="hidden absolute z-10 mt-1 w-full bg-black border border-amber-500 shadow-lg rounded-md py-1 text-base overflow-auto max-h-64 focus:outline-none sm:text-sm">
          ${options.map(o => `
            <li data-option="${id}" data-value="${o.id}" class="text-white cursor-pointer select-none relative py-3 pl-4 pr-9 hover:bg-gray-900/70 hover:text-amber-400 transition-all duration-200">
              <div class="flex items-center"><span class="mr-3 text-xl">${o.emoji}</span><span class="font-normal block truncate ${o.id === selectedId ? 'font-semibold' : ''}">${o.label}</span></div>
            </li>`).join('')}
        </ul>
      </div>
    </div>
  `;
}

function wireCustomSelector(container, id, onChange) {
  const toggle = container.querySelector(`[data-toggle="${id}"]`);
  const list = container.querySelector(`[data-list="${id}"]`);
  toggle.addEventListener('click', (e) => {
    e.stopPropagation();
    document.querySelectorAll('ul[data-list]').forEach(l => { if (l !== list) l.classList.add('hidden'); });
    list.classList.toggle('hidden');
  });
  container.querySelectorAll(`[data-option="${id}"]`).forEach(opt => {
    opt.addEventListener('click', () => {
      onChange(opt.getAttribute('data-value'));
      list.classList.add('hidden');
    });
  });
}

document.addEventListener('click', () => {
  document.querySelectorAll('ul[data-list]').forEach(l => l.classList.add('hidden'));
});

function handleFileSelect(files) {
  if (files && files[0]) {
    state.imageFile = files[0];
    const reader = new FileReader();
    reader.onloadend = () => { state.imageDataUrl = reader.result; render(); };
    reader.readAsDataURL(files[0]);
  }
}

/* --------------------- PIPELINE DE GÉNÉRATION DU VLOG -------------------- */

async function startGeneration(sameOptions) {
  if (!state.selectedScene) return;
  let params = state.lastGenParams;
  if (!sameOptions || !params) {
    if (!state.imageFile || !state.genderMode || !state.selectedOutfit || !state.selectedHairstyle || !state.selectedAccessory) return;
    params = {
      imageFile: state.imageFile,
      genderMode: state.genderMode,
      bodyType: getBodyType(),
      outfit: state.selectedOutfit,
      hairstyle: state.selectedHairstyle,
      accessory: state.selectedAccessory,
      vibe: getVibe(),
      timeOfDay: getTimeOfDay(),
      season: getSeason(),
      holiday: getHoliday(),
    };
    state.lastGenParams = params;
  }

  state.isGenerating = true;
  state.generatedImages = [];
  render();

  try {
    const baseImage = await fileToBase64(params.imageFile);
    const scene = state.selectedScene;

    let detailedPartnerStyle, detailedFriendStyles;
    if (scene.isCoupleScene) {
      const archetypes = params.genderMode === 'femme' ? MALE_PARTNER_ARCHETYPES : FEMALE_PARTNER_ARCHETYPES;
      const partnerArchetype = archetypes[Math.floor(Math.random() * archetypes.length)].description;
      detailedPartnerStyle = await generatePartnerStyle(scene, params.vibe, params.timeOfDay, partnerArchetype, params.season, params.holiday);
    } else if (scene.isGirlsTripScene) {
      detailedFriendStyles = await generateFriendStyles(scene, params.vibe, params.timeOfDay, params.outfit, params.season, params.holiday);
    }

    const results = [];
    for (let i = 0; i < 7; i++) {
      if (i > 0) await wait(5000);
      const imageUrl = await generateVlogImage(
        baseImage, scene, i + 1, params.outfit, params.hairstyle, params.accessory,
        params.vibe, params.timeOfDay, params.genderMode, detailedPartnerStyle, detailedFriendStyles,
        params.season, params.holiday, params.bodyType
      );
      results.push(imageUrl);
    }

    const validImages = results.filter(Boolean);
    if (validImages.length === 0) {
      throw new Error("L'IA n'a réussi à générer aucune image. Réessaie dans un instant ou change les options de style.");
    }
    if (validImages.length < 7) {
      alert(`${validImages.length} images générées sur 7. Certaines scènes ont échoué (limite IA temporaire). Tu peux régénérer le vlog.`);
    }

    state.generatedImages = validImages;
    state.currentSlide = 0;
    state.view = 'display';
  } catch (err) {
    alert(err.message);
  } finally {
    state.isGenerating = false;
    render();
  }
}

  }

function fileToRefObject(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => {
      const result = reader.result;
      const mimeType = result.split(',')[0].split(':')[1].split(';')[0];
      const data = result.split(',')[1];
      resolve({ file, dataUrl: result, data, mimeType });
    };
    reader.onerror = reject;
  });
}

        updateGenerateButton();
      });
      avatarGrid.appendChild(addBtn);
    }
  }

  renderLocationGrid();
  renderAvatarGrid();

  // Direction texte
  const directionInput = wrap.querySelector('#direction-input');
  directionInput.addEventListener('input', () => { state.normalDirection = directionInput.value; updateGenerateButton(); });

  // Nombre de photos
  const countButtons = wrap.querySelector('#count-buttons');
  function renderCountButtons() {
    countButtons.innerHTML = '';
    NORMAL_IMAGE_COUNT_OPTIONS.forEach(n => {
      const btn = el(`<button class="flex-1 py-3 rounded-lg border-2 font-bold transition-all duration-300 ${state.normalImageCount === n ? 'border-amber-400 bg-amber-900/50 text-amber-400' : 'border-gray-700 bg-gray-900/50 text-white hover:border-amber-500'}">${n} photos</button>`);
      btn.addEventListener('click', () => { state.normalImageCount = n; renderCountButtons(); });
      countButtons.appendChild(btn);
    });
  }
  renderCountButtons();

  // Bouton générer
  const generateBtn = wrap.querySelector('#normal-generate-btn');
  function updateGenerateButton() {
    generateBtn.disabled = state.normalDirection.trim().length === 0 || state.normalIsGenerating;
  }
  updateGenerateButton();
  generateBtn.addEventListener('click', () => { startNormalGeneration(); });

  return wrap;
}

async function startNormalGeneration() {
  if (state.normalDirection.trim().length === 0) return;

  state.normalIsGenerating = true;
  state.normalGeneratedImages = [];
  state.normalStoryboard = null;
  state.normalContinuity = null;
  state.normalError = null;
  state.normalStage = 'storyboard'; // storyboard | images
  state.view = 'normal-display';
  render();

  try {
    const total = state.normalImageCount;

    const storyboardResult = await generateNormalStoryboard(
      state.normalLocationImages,
      state.normalAvatarImages,
      state.normalDirection.trim(),
      total
    );

    state.normalContinuity = storyboardResult.continuite || null;
    state.normalStoryboard = storyboardResult.storyboard || [];
    const framePrompts = storyboardResult.prompts;

    state.normalStage = 'images';
    render();

    const results = [];
    const errors = [];
    for (let i = 0; i < framePrompts.length; i++) {
      if (i > 0) await wait(5000);
      const result = await generateNormalImage(
        state.normalLocationImages,
        state.normalAvatarImages,
        framePrompts[i],
        i + 1,
        framePrompts.length
      );
      results.push(result.url);
      if (result.error) errors.push(result.error);
      state.normalGeneratedImages = results.filter(Boolean);
      render(); // affichage progressif
    }

    const validImages = results.filter(Boolean);
    if (validImages.length === 0) {
      const detail = errors.length ? errors[errors.length - 1] : null;
      throw new Error(detail ? `L'IA n'a réussi à générer aucune image. Détail technique : ${detail}` : "L'IA n'a réussi à générer aucune image. Réessaie dans un instant.");
    }
    if (validImages.length < framePrompts.length) {
      alert(`${validImages.length} photos générées sur ${framePrompts.length}. Certaines ont échoué (limite IA temporaire). Tu peux régénérer.`);
    }
    state.normalGeneratedImages = validImages;
    state.normalCurrentSlide = 0;
  } catch (err) {
    state.normalError = err.message;
    alert(err.message);
    state.view = 'normal-setup';
  } finally {
    state.normalIsGenerating = false;
    render();
  }
}

let normalSlideInterval = null;
function clearNormalSlideTimer() {
  if (normalSlideInterval) clearInterval(normalSlideInterval);
  normalSlideInterval = null;
}
function restartNormalSlideTimer() {
  clearNormalSlideTimer();
  if (state.normalIsPlaying && state.normalGeneratedImages.length > 0) {
    normalSlideInterval = setInterval(() => {
      state.normalCurrentSlide = (state.normalCurrentSlide + 1) % state.normalGeneratedImages.length;
      render();
    }, 3000);
  }
}

function renderNormalDisplay() {
  const images = state.normalGeneratedImages;

  if (state.normalIsGenerating && images.length === 0) {
    const isStoryboardStage = state.normalStage === 'storyboard';
    return el(`
      <div class="w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-32 flex flex-col items-center justify-center min-h-[50vh] animate-fade-in">
        <div class="relative mb-8">
          <div class="absolute inset-0 bg-amber-500 blur-xl opacity-20 rounded-full"></div>
          <svg class="animate-spin h-20 w-20 text-amber-400 relative z-10" viewBox="0 0 24 24" fill="none">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
        </div>
        <h2 class="text-3xl font-extrabold text-white tracking-tight">${isStoryboardStage ? 'Analyse des références et construction du scénario...' : 'Génération de tes photos...'}</h2>
        <p class="text-gray-400 mt-4 text-lg text-center max-w-md">${isStoryboardStage ? "Studio Photo étudie tes lieux et tes avatars pour bâtir une fiche de continuité et un storyboard cohérent." : 'Studio Life capture tes moments volés. Merci de patienter...'}</p>
      </div>
    `);
  }

  if (!images.length) return el(`<div></div>`);

  const wrap = el(`
    <div class="bg-zinc-900 text-white min-h-screen font-sans">
      <main class="pb-16">
        <div class="w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
          <div class="text-center mb-8">
            <h2 class="text-4xl font-extrabold text-white sm:text-5xl">Tes photos <span class="text-amber-400">Studio Life</span></h2>
            <p class="mt-4 text-xl text-gray-400">${state.normalIsGenerating ? `Génération en cours... (${images.length}/${state.normalImageCount})` : 'Tes moments volés sont prêts.'}</p>
          </div>

          <div class="flex justify-center mb-12">
            <div class="relative w-full max-w-md bg-black rounded-2xl border-2 border-amber-500/50 shadow-2xl overflow-hidden aspect-[9/16]">
              <div id="n-progress-bars" class="absolute top-2 left-2 right-2 flex gap-1 z-20"></div>
              <div id="n-slides" class="relative w-full h-full"></div>
            </div>
          </div>

          <div id="n-storyboard-zone" class="max-w-3xl mx-auto mb-12"></div>

          <div class="border-t border-gray-800 pt-12">
            <h3 class="text-2xl font-bold text-white mb-6 text-center">Photos & téléchargements</h3>
            <div id="n-grid-thumbs" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4"></div>
          </div>

          <div class="mt-16 text-center flex flex-col sm:flex-row justify-center items-center gap-4">
            <button id="n-regen-btn" class="bg-gray-800 hover:bg-gray-700 text-amber-400 font-bold py-3 px-8 rounded-lg transition-all duration-300 transform hover:scale-105" ${state.normalIsGenerating ? 'disabled' : ''}>Régénérer avec les mêmes réglages</button>
            <button id="n-new-btn" class="bg-amber-500 hover:bg-amber-600 text-black font-bold py-3 px-8 rounded-lg transition-all duration-300 transform hover:scale-105" ${state.normalIsGenerating ? 'disabled' : ''}>Nouvelle série</button>
          </div>
        </div>
      </main>
    </div>
  `);

  const progressBars = wrap.querySelector('#n-progress-bars');
  images.forEach((_, idx) => {
    progressBars.appendChild(el(`<div class="h-1 flex-1 bg-gray-600 rounded-full overflow-hidden"><div class="h-full bg-white transition-all duration-100 ease-linear" style="width:${idx <= state.normalCurrentSlide ? '100' : '0'}%"></div></div>`));
  });

  const slidesZone = wrap.querySelector('#n-slides');
  images.forEach((src, idx) => {
    slidesZone.appendChild(el(`<img src="${src}" alt="Photo ${idx+1}" class="absolute inset-0 w-full h-full object-cover transition-opacity duration-500 ${idx === state.normalCurrentSlide ? 'opacity-100' : 'opacity-0'}" />`));
  });
  slidesZone.appendChild(el(`<div class="absolute inset-0 bg-gradient-to-b from-black/20 via-transparent to-black/60 pointer-events-none"></div>`));
  const controls = el(`
    <div class="absolute bottom-0 left-0 right-0 p-6 z-20">
      <div class="flex items-center justify-between mb-2">
        <span class="text-amber-400 font-bold text-sm tracking-wider uppercase">Photo ${state.normalCurrentSlide + 1}/${images.length}</span>
        <button id="n-play-pause" class="text-white hover:text-amber-400 transition-colors focus:outline-none"></button>
      </div>
      <p class="text-white text-xs opacity-80">Généré avec Studio Life — Mode Normal</p>
    </div>`);
  slidesZone.appendChild(controls);
  const playBtn = controls.querySelector('#n-play-pause');
  playBtn.innerHTML = state.normalIsPlaying
    ? `<svg class="h-8 w-8" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8a1 1 0 012 0v4a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" /></svg>`
    : `<svg class="h-8 w-8" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd" /></svg>`;
  playBtn.addEventListener('click', () => { state.normalIsPlaying = !state.normalIsPlaying; restartNormalSlideTimer(); render(); });

  const navZone = el(`<div class="absolute inset-0 flex z-10"><div class="w-1/2 h-full cursor-pointer"></div><div class="w-1/2 h-full cursor-pointer"></div></div>`);
  navZone.children[0].addEventListener('click', () => { state.normalCurrentSlide = (state.normalCurrentSlide - 1 + images.length) % images.length; render(); });
  navZone.children[1].addEventListener('click', () => { state.normalCurrentSlide = (state.normalCurrentSlide + 1) % images.length; render(); });
  slidesZone.appendChild(navZone);

  const thumbGrid = wrap.querySelector('#n-grid-thumbs');
  images.forEach((src, idx) => {
    const thumb = el(`
      <div class="group bg-black rounded-lg overflow-hidden border relative cursor-pointer transition-all duration-300 ${idx === state.normalCurrentSlide ? 'border-amber-400 ring-2 ring-amber-400/50' : 'border-gray-700 hover:border-amber-500'}">
        <img src="${src}" alt="Photo ${idx+1}" class="w-full h-auto object-cover aspect-[9/16]" />
        <div class="absolute inset-0 bg-black bg-opacity-0 group-hover:bg-opacity-40 flex items-center justify-center transition-all duration-300">
          <button data-ndl="${idx}" class="opacity-0 group-hover:opacity-100 bg-amber-500 text-black p-2 rounded-full hover:bg-amber-400 transform scale-90 group-hover:scale-100 transition-all" title="Télécharger la photo">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
          </button>
        </div>
        <div class="absolute bottom-0 left-0 right-0 bg-black/70 p-1 text-center"><span class="text-xs text-gray-300">#${idx+1}</span></div>
      </div>`);
    thumb.addEventListener('click', () => { state.normalCurrentSlide = idx; render(); });
    thumb.querySelector(`[data-ndl="${idx}"]`).addEventListener('click', (e) => {
      e.stopPropagation();
      const link = document.createElement('a');
      link.href = src;
      link.download = `studio_life_normal_${idx + 1}.png`;
      document.body.appendChild(link); link.click(); document.body.removeChild(link);
    });
    thumbGrid.appendChild(thumb);
  });

  const storyboardZone = wrap.querySelector('#n-storyboard-zone');
  if (state.normalStoryboard && state.normalStoryboard.length) {
    const continuity = state.normalContinuity;
    storyboardZone.appendChild(el(`
      <details class="bg-black border border-gray-700 rounded-lg p-4">
        <summary class="cursor-pointer text-amber-400 font-semibold text-sm">📋 Voir la fiche de continuité & le storyboard généré</summary>
        <div class="mt-4 space-y-4 text-sm text-gray-300">
          ${continuity && continuity.personnes && continuity.personnes.length ? `
            <div>
              <p class="text-amber-400/80 font-semibold mb-1">Personnes détectées</p>
              <ul class="list-disc list-inside space-y-1">${continuity.personnes.map(p => `<li><span class="text-white font-medium">${p.identifiant}</span> — ${p.description}</li>`).join('')}</ul>
            </div>` : ''}
          ${continuity && continuity.lieux && continuity.lieux.length ? `
            <div>
              <p class="text-amber-400/80 font-semibold mb-1">Lieux détectés</p>
              <ul class="list-disc list-inside space-y-1">${continuity.lieux.map(l => `<li><span class="text-white font-medium">${l.identifiant}</span> — ${l.description}</li>`).join('')}</ul>
            </div>` : ''}
          ${continuity && continuity.general ? `
            <div>
              <p class="text-amber-400/80 font-semibold mb-1">Continuité générale</p>
              <p>${continuity.general}</p>
            </div>` : ''}
          <div>
            <p class="text-amber-400/80 font-semibold mb-1">Storyboard</p>
            <ol class="list-decimal list-inside space-y-1">${state.normalStoryboard.map(s => `<li>${s}</li>`).join('')}</ol>
          </div>
        </div>
      </details>
    `));
  }

  const regenBtn = wrap.querySelector('#n-regen-btn');
  if (regenBtn) regenBtn.addEventListener('click', () => { startNormalGeneration(); });
  const newBtn = wrap.querySelector('#n-new-btn');
  if (newBtn) newBtn.addEventListener('click', () => {
    clearNormalSlideTimer();
    state.normalGeneratedImages = [];
    state.view = 'normal-setup';
    render();
  });

  restartNormalSlideTimer();
  return wrap;
}

/* --------------------------------- INIT ---------------------------------- */

function init() {
  try {
    const existingKey = safeGetItem('userApiKey');
    state.view = existingKey ? 'mode-select' : 'apikey';
    render();
  } catch (e) {
    console.error('Erreur au démarrage de Studio Life:', e);
    root.innerHTML = `
      <div class="min-h-screen flex items-center justify-center px-4">
        <div class="w-full max-w-md bg-black border border-red-500 rounded-lg p-8 text-center">
          <h1 class="text-2xl font-bold text-red-400 mb-4">Oups, l'appli n'a pas pu démarrer</h1>
          <p class="text-gray-300 text-sm mb-2">Détail technique : ${(e && e.message) ? e.message : e}</p>
          <p class="text-gray-500 text-xs">Essaie d'ouvrir ce fichier directement dans un navigateur (double-clic, ou glisser l'onglet) plutôt que dans un aperçu intégré.</p>
        </div>
      </div>`;
  }
}

init();
</script>
</body>
</html>
