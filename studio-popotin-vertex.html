<script>
const MODEL = "gemini-3.1-flash-image-preview";

let API_KEY = "";
let avatarImage = null;
let referenceImage = null;
let aspectRatio = "9:16";

// ================= API =================
async function generateImage(parts) {
  const endpoint = `https://aiplatform.googleapis.com/v1/publishers/google/models/${MODEL}:generateContent?key=${API_KEY}`;

  const body = {
    contents: [{
      role: "user",
      parts: parts
    }],
    generationConfig: {
      responseModalities: ["IMAGE"], // 🔥 IMAGE ONLY
      imageConfig: {
        aspectRatio: aspectRatio,
        imageSize: "4K"
      }
    }
  };

  const res = await fetch(endpoint, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });

  if (!res.ok) {
    const txt = await res.text();
    throw new Error(txt);
  }

  const data = await res.json();

  for (const part of data.candidates?.[0]?.content?.parts || []) {
    if (part.inlineData?.data) {
      return `data:image/png;base64,${part.inlineData.data}`;
    }
  }

  throw new Error("Aucune image générée");
}

// ================= PROCESS =================
async function handleProcess() {
  if (!avatarImage) return;

  const avatarBase64 = avatarImage.split(",")[1];

  const parts = [
    {
      inlineData: {
        mimeType: "image/jpeg",
        data: avatarBase64
      }
    }
  ];

  if (referenceImage) {
    const refBase64 = referenceImage.split(",")[1];
    parts.push({
      inlineData: {
        mimeType: "image/jpeg",
        data: refBase64
      }
    });
  }

  parts.push({
    text: `
Ultra realistic human photography.

STRICT RULES:
- photorealistic skin texture
- no smoothing
- no artificial beauty filter
- real lighting
- DSLR 50mm look
- natural body physics
- identity preserved

Generate final image only.
`
  });

  try {
    const image = await generateImage(parts);

    document.getElementById("resultImage").src = image;

  } catch (err) {
    console.error(err);
    alert("Erreur : " + err.message);
  }
}

// ================= UPLOAD =================
function handleAvatarUpload(e) {
  const file = e.target.files[0];
  const reader = new FileReader();
  reader.onload = () => {
    avatarImage = reader.result;
  };
  reader.readAsDataURL(file);
}

function handleRefUpload(e) {
  const file = e.target.files[0];
  const reader = new FileReader();
  reader.onload = () => {
    referenceImage = reader.result;
  };
  reader.readAsDataURL(file);
}
</script>
