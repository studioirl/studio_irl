<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio Popotin — Real Raw 4K</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #080808;
  --bg2: #050505;
  --glass: rgba(255,255,255,0.02);
  --border: rgba(255,255,255,0.05);
  --border2: rgba(255,255,255,0.1);
  --text: #f5f5f5;
  --text2: #a3a3a3;
  --text3: #6b7280;
  --text4: #374151;
  --amber: #f59e0b;
  --amber2: rgba(245,158,11,0.1);
  --amber3: rgba(245,158,11,0.5);
  --white: #ffffff;
  --red: rgba(239,68,68,0.1);
  --red2: rgba(239,68,68,0.2);
}
html { font-family: 'Inter', sans-serif; background: var(--bg2); color: var(--text); }
body { min-height: 100vh; }

.glass {
  background: var(--glass);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border);
}

/* === SPLASH === */
#splash {
  min-height: 100vh;
  background: var(--bg2);
  display: flex; flex-direction: column;
  align-items: center;
  padding: 80px 16px;
  text-align: center;
}
.splash-header {
  display: flex; flex-direction: column; align-items: center;
  margin-bottom: 80px;
  animation: fadeIn 1s ease both;
}
.splash-logo {
  padding: 20px;
  background: #111;
  border-radius: 24px;
  box-shadow: 0 0 40px rgba(255,255,255,0.05);
  border: 1px solid var(--border2);
  margin-bottom: 32px;
}
.splash-logo svg { width: 32px; height: 32px; color: var(--amber); display: block; }
.splash-title {
  font-size: clamp(36px, 8vw, 56px);
  font-weight: 900; color: white;
  text-transform: uppercase; font-style: italic;
  letter-spacing: -0.03em; line-height: 1;
}
.splash-title span { color: var(--amber); }
.splash-badge {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 32px; border-radius: 999px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border2);
  font-size: 10px; font-weight: 900;
  letter-spacing: 0.4em; color: var(--text3);
  text-transform: uppercase; margin-top: 24px;
}
.splash-badge svg { width: 12px; height: 12px; fill: var(--amber); color: var(--amber); }

.api-section {
  display: flex; flex-direction: column; gap: 10px;
  width: 100%; max-width: 420px; margin: 0 auto 32px;
}
.api-label {
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.3em;
  color: var(--text3); text-align: left;
}
.api-input {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border2);
  border-radius: 16px; padding: 16px 20px;
  font-size: 13px; font-family: monospace;
  color: var(--text); outline: none; transition: all 0.2s;
}
.api-input::placeholder { color: var(--text4); }
.api-input:focus { border-color: var(--amber); box-shadow: 0 0 0 3px rgba(245,158,11,0.15); }
.vertex-note { font-size: 11px; color: var(--amber); font-weight: 600; text-align: center; }

.splash-cta {
  width: 100%; max-width: 420px;
  background: white; color: black;
  border: none; border-radius: 24px;
  padding: 24px 48px;
  font-weight: 900; font-size: 14px;
  text-transform: uppercase; letter-spacing: 0.3em;
  cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 16px;
  box-shadow: 0 20px 60px rgba(255,255,255,0.05);
}
.splash-cta:hover { background: #e5e5e5; transform: scale(1.02); }
.splash-cta:active { transform: scale(0.95); }
.splash-cta svg { width: 20px; height: 20px; }
#splash-error { color: #f87171; font-size: 12px; font-weight: 600; margin-top: 12px; display: none; }

/* === APP === */
#app {
  min-height: 100vh;
  background: var(--bg);
  color: var(--text2);
  display: none; flex-direction: column;
  align-items: center; padding: 80px 16px;
}
#app.visible { display: flex; }

/* Header */
.app-header {
  width: 100%; max-width: 896px;
  display: flex; flex-direction: column; align-items: center;
  margin-bottom: 80px; text-align: center;
  animation: fadeIn 1s ease both;
}
.header-top { display: flex; align-items: center; gap: 24px; margin-bottom: 32px; }
.header-icon {
  padding: 20px; background: #111;
  border-radius: 24px;
  box-shadow: 0 0 40px rgba(255,255,255,0.05);
  border: 1px solid var(--border2);
}
.header-icon svg { width: 32px; height: 32px; color: var(--amber); display: block; }
.header-title {
  font-size: clamp(32px, 6vw, 48px);
  font-weight: 900; color: white;
  text-transform: uppercase; font-style: italic;
  letter-spacing: -0.03em; line-height: 1;
}
.header-title span { color: var(--amber); }
.header-badge {
  display: inline-flex; align-items: center; gap: 12px;
  padding: 12px 32px; border-radius: 999px;
  background: rgba(255,255,255,0.05); border: 1px solid var(--border2);
  font-size: 10px; font-weight: 900;
  letter-spacing: 0.4em; color: var(--text3); text-transform: uppercase;
}
.header-badge svg { width: 12px; height: 12px; fill: var(--amber); color: var(--amber); }

/* Error box */
.error-box {
  width: 100%; max-width: 896px;
  background: var(--red); border: 1px solid var(--red2);
  color: #fca5a5; padding: 16px 24px;
  border-radius: 24px; margin-bottom: 40px;
  display: flex; align-items: center; gap: 16px;
  animation: slideDown 0.3s ease;
}
.error-box svg { width: 20px; height: 20px; color: #ef4444; flex-shrink: 0; }
.error-box p { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.2em; }

/* Main content */
.app-main { width: 100%; max-width: 1024px; display: flex; flex-direction: column; gap: 40px; }

/* Step containers */
.step-container { animation: fadeZoom 0.5s ease both; }
@keyframes fadeZoom { from{opacity:0;transform:scale(0.97)}to{opacity:1;transform:scale(1)} }
@keyframes fadeIn { from{opacity:0}to{opacity:1} }
@keyframes slideDown { from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)} }

/* Back button */
.back-btn {
  display: flex; align-items: center; gap: 12px;
  font-size: 10px; font-weight: 900;
  text-transform: uppercase; letter-spacing: 0.2em;
  color: var(--text3); background: none; border: none;
  cursor: pointer; transition: color 0.2s;
}
.back-btn:hover { color: var(--text); }
.back-btn svg { width: 16px; height: 16px; }
.step-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 48px; }
.step-title { font-size: 20px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.4em; color: white; font-style: italic; }

/* Landing card */
.landing-card {
  background: var(--glass); backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: 80px; overflow: hidden;
  display: flex; flex-direction: column;
  min-height: 600px; box-shadow: 0 40px 80px rgba(0,0,0,0.4);
}
@media(min-width:1024px){ .landing-card { flex-direction: row; } }
.landing-visual {
  position: relative; min-height: 400px;
  flex: 1;
}
@media(min-width:1024px){ .landing-visual { min-height: 600px; } }
.landing-visual img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; transition: transform 1s ease; }
.landing-card:hover .landing-visual img { transform: scale(1.05); }
.landing-visual-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, #080808, transparent, transparent);
}
@media(min-width:1024px){
  .landing-visual-overlay { background: linear-gradient(to right, transparent, rgba(8,8,8,0.15)); }
}
.landing-tag {
  position: absolute; bottom: 40px; left: 40px;
  display: inline-flex; align-items: center; gap: 12px;
  padding: 8px 24px; border-radius: 999px;
  background: rgba(0,0,0,0.4); backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.1);
  font-size: 9px; font-weight: 900;
  text-transform: uppercase; letter-spacing: 0.3em; color: rgba(255,255,255,0.8);
}
.landing-tag svg { width: 12px; height: 12px; fill: var(--amber); color: var(--amber); }
.landing-action {
  flex: 1; padding: 48px;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  text-align: center; gap: 48px;
  background: rgba(255,255,255,0.005);
}
@media(min-width:1024px){ .landing-action { padding: 80px; } }
.landing-h2 {
  font-size: clamp(32px, 5vw, 48px);
  font-weight: 900; color: white;
  font-style: italic; text-transform: uppercase;
  letter-spacing: -0.03em; line-height: 1;
}
.landing-h2 span { color: var(--amber); display: block; }
.landing-desc { font-size: 14px; color: var(--text3); max-width: 320px; line-height: 1.7; font-weight: 500; }
.upload-label {
  width: 100%;
  background: white; color: black;
  padding: 32px 48px; border-radius: 40px;
  font-weight: 900; font-size: 14px;
  text-transform: uppercase; letter-spacing: 0.3em;
  cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 24px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
}
.upload-label:hover { background: #e5e5e5; transform: scale(1.02); }
.upload-label:active { transform: scale(0.95); }
.upload-label svg { width: 24px; height: 24px; transition: transform 0.2s; }
.upload-label:hover svg { transform: translateX(4px); }
.avatars-row { display: flex; align-items: center; flex-direction: column; gap: 16px; padding-top: 16px; }
.avatar-stack { display: flex; }
.avatar-bubble {
  width: 40px; height: 40px; border-radius: 50%;
  border: 2px solid var(--bg);
  background: #1f2937; overflow: hidden;
  margin-left: -12px;
}
.avatar-bubble:first-child { margin-left: 0; }
.avatar-bubble img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
.trust-text { font-size: 10px; font-weight: 900; color: var(--text4); text-transform: uppercase; letter-spacing: 0.2em; }

/* Angle grid */
.cards-grid { display: grid; gap: 24px; grid-template-columns: 1fr; }
@media(min-width:640px){ .cards-grid { grid-template-columns: repeat(2, 1fr); } }
@media(min-width:1024px){ .cards-grid { grid-template-columns: repeat(3, 1fr); } }
.angle-card {
  background: var(--glass); backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: 48px; padding: 40px;
  text-align: left; cursor: pointer; transition: all 0.2s;
  box-shadow: 0 8px 40px rgba(0,0,0,0.3);
}
.angle-card:hover { border-color: var(--amber3); background: var(--amber2); }
.angle-icon {
  width: 48px; height: 48px;
  background: rgba(255,255,255,0.05);
  border-radius: 16px; border: 1px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 24px; transition: all 0.2s;
}
.angle-card:hover .angle-icon { background: var(--amber2); }
.angle-icon svg { width: 24px; height: 24px; color: rgba(255,255,255,0.3); transition: color 0.2s; }
.angle-card:hover .angle-icon svg { color: var(--amber); }
.angle-label { font-weight: 900; font-size: 18px; color: white; text-transform: uppercase; font-style: italic; letter-spacing: -0.02em; margin-bottom: 8px; }
.angle-desc { font-size: 10px; color: var(--text3); font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; line-height: 1.6; }

/* Mode select */
.modes-grid { display: grid; gap: 40px; }
@media(min-width:768px){ .modes-grid { grid-template-columns: repeat(2, 1fr); } }
.mode-card {
  background: var(--glass); backdrop-filter: blur(20px);
  border: 1px solid transparent;
  border-radius: 64px; padding: 48px;
  text-align: left; cursor: pointer; transition: all 0.2s;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
.mode-card:hover { border-color: var(--border2); background: rgba(255,255,255,0.04); }
.mode-card-icon {
  width: 64px; height: 64px;
  background: rgba(255,255,255,0.04);
  border-radius: 24px; border: 1px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 48px; transition: transform 0.2s;
}
.mode-card:hover .mode-card-icon { transform: scale(1.1); }
.mode-card-icon svg { width: 32px; height: 32px; }
.mode-card-icon.amber svg { color: var(--amber); }
.mode-card-icon.white svg { color: rgba(255,255,255,0.4); }
.mode-title { font-size: 24px; font-weight: 900; color: white; font-style: italic; text-transform: uppercase; letter-spacing: -0.02em; margin-bottom: 16px; }
.mode-desc { font-size: 14px; color: var(--text3); line-height: 1.7; font-weight: 500; margin-bottom: 40px; }
.mode-cta {
  font-size: 10px; font-weight: 900;
  text-transform: uppercase; letter-spacing: 0.3em;
  display: flex; align-items: center; gap: 8px;
  transition: transform 0.2s;
}
.mode-cta.amber { color: var(--amber); }
.mode-cta.white { color: white; }
.mode-card:hover .mode-cta { transform: translateX(12px); }
.mode-cta svg { width: 16px; height: 16px; }

/* Status badge */
.status-badge {
  display: flex; align-items: center; gap: 12px;
  padding: 8px 24px; border-radius: 999px;
  background: rgba(255,255,255,0.04); border: 1px solid var(--border2);
}
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--amber); animation: glow 2s infinite; box-shadow: 0 0 10px var(--amber); }
@keyframes glow { 0%,100%{opacity:1}50%{opacity:0.4} }
.status-text { font-size: 10px; font-weight: 900; color: var(--text3); text-transform: uppercase; letter-spacing: 0.2em; }

/* Style selection */
.options-grid { display: grid; gap: 24px; }
@media(min-width:640px){ .options-grid { grid-template-columns: repeat(2, 1fr); } }
.format-card {
  background: var(--glass); backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: 64px; padding: 40px;
  display: flex; flex-direction: column;
  align-items: center; gap: 32px;
}
.format-label {
  display: flex; align-items: center; gap: 12px;
  font-size: 10px; font-weight: 900;
  text-transform: uppercase; letter-spacing: 0.3em; color: var(--text3);
}
.format-label svg { width: 16px; height: 16px; color: var(--amber); }
.format-btns { display: flex; gap: 16px; }
.fmt-btn {
  padding: 16px 32px; border-radius: 16px;
  font-weight: 900; font-size: 12px;
  cursor: pointer; transition: all 0.2s; border: 1px solid;
}
.fmt-btn.active { background: var(--amber); border-color: #fbbf24; color: white; box-shadow: 0 4px 16px rgba(245,158,11,0.3); }
.fmt-btn.inactive { background: rgba(255,255,255,0.04); border-color: var(--border); color: var(--text3); }
.fmt-btn.inactive:hover { border-color: var(--border2); }

/* Toggle */
.toggle-btn {
  width: 100%; padding: 24px;
  border-radius: 24px; border: 1px solid;
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer; transition: all 0.2s; background: none;
}
.toggle-btn.on { background: var(--amber2); border-color: var(--amber3); color: white; }
.toggle-btn.off { background: rgba(255,255,255,0.04); border-color: var(--border2); color: var(--text3); }
.toggle-label { font-size: 12px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.2em; }
.toggle-track { width: 48px; height: 24px; border-radius: 999px; position: relative; transition: background 0.3s; }
.toggle-track.on { background: var(--amber); }
.toggle-track.off { background: #1f2937; }
.toggle-knob { position: absolute; top: 4px; width: 16px; height: 16px; background: white; border-radius: 50%; transition: left 0.3s; }
.toggle-track.on .toggle-knob { left: 28px; }
.toggle-track.off .toggle-knob { left: 4px; }

/* Style cards */
.styles-grid { display: grid; gap: 24px; }
@media(min-width:640px){ .styles-grid { grid-template-columns: repeat(2, 1fr); } }
@media(min-width:1024px){ .styles-grid { grid-template-columns: repeat(3, 1fr); } }
.style-card {
  padding: 48px; border-radius: 56px;
  text-align: left; cursor: pointer; transition: all 0.2s;
  border: 1px solid; position: relative;
}
.style-card.selected { background: white; border-color: white; box-shadow: 0 20px 60px rgba(0,0,0,0.4); transform: scale(1.02); z-index: 10; }
.style-card.unselected { background: var(--glass); backdrop-filter: blur(20px); border-color: var(--border); }
.style-card.unselected:hover { border-color: var(--border2); }
.check-mark {
  position: absolute; top: 24px; right: 24px;
  width: 24px; height: 24px; background: black;
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
}
.check-mark svg { width: 16px; height: 16px; color: white; }
.style-title { font-weight: 900; font-size: 20px; text-transform: uppercase; font-style: italic; letter-spacing: -0.02em; margin-bottom: 12px; }
.style-title.amber { color: var(--amber); }
.style-title.black { color: black; }
.style-desc { font-size: 12px; line-height: 1.6; font-weight: 700; letter-spacing: 0.02em; }
.style-desc.muted { color: var(--text3); }
.style-desc.dark { color: #6b7280; }

/* Gen button */
.gen-btn {
  padding: 32px 96px; border-radius: 40px;
  font-weight: 900; font-size: 14px;
  text-transform: uppercase; letter-spacing: 0.4em;
  cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; gap: 24px;
  border: none; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
.gen-btn.ready { background: #d97706; color: white; }
.gen-btn.ready:hover { background: var(--amber); transform: scale(1.05); }
.gen-btn.ready:active { transform: scale(0.95); }
.gen-btn.disabled { background: rgba(255,255,255,0.04); color: var(--text4); cursor: not-allowed; border: 1px solid var(--border); }
.gen-btn svg { width: 24px; height: 24px; }
.gen-btn.ready svg { fill: currentColor; }
.center-wrap { display: flex; justify-content: center; padding-top: 40px; }

/* Reference upload */
.ref-upload-zone {
  background: var(--glass); backdrop-filter: blur(20px);
  border: 2px dashed var(--border);
  border-radius: 80px; padding: 96px;
  display: flex; flex-direction: column; align-items: center;
  text-align: center; gap: 48px;
  transition: border-color 0.2s; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
.ref-upload-zone:hover { border-color: var(--border2); }
.ref-icon-wrap {
  width: 96px; height: 96px;
  background: rgba(255,255,255,0.04);
  border-radius: 48px; border: 1px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  box-shadow: inset 0 2px 8px rgba(0,0,0,0.2);
}
.ref-icon-wrap svg { width: 48px; height: 48px; color: var(--amber); }
.ref-title { font-size: 28px; font-weight: 900; color: white; font-style: italic; text-transform: uppercase; letter-spacing: -0.02em; line-height: 1; }
.ref-desc { font-size: 10px; color: var(--text3); max-width: 280px; line-height: 1.7; text-transform: uppercase; font-weight: 900; letter-spacing: 0.2em; }
.upload-btn-label {
  background: white; color: black;
  padding: 24px 56px; border-radius: 32px;
  font-weight: 900; font-size: 14px;
  text-transform: uppercase; letter-spacing: 0.2em;
  cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; gap: 16px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
}
.upload-btn-label:hover { background: #e5e5e5; }
.upload-btn-label:active { transform: scale(0.95); }
input[type=file] { display: none; }

.ref-preview-wrap {
  background: var(--glass); backdrop-filter: blur(20px);
  border: 1px solid var(--border2);
  border-radius: 72px; padding: 20px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  position: relative; overflow: hidden;
}
.ref-preview-wrap img { width: 100%; border-radius: 56px; max-height: 500px; object-fit: cover; }
.ref-change-btn {
  position: absolute; top: 48px; right: 48px;
  background: rgba(10,10,10,0.8); backdrop-filter: blur(16px);
  color: white; padding: 20px; border-radius: 24px;
  border: none; cursor: pointer; transition: background 0.2s;
}
.ref-change-btn:hover { background: #1f2937; }
.ref-change-btn svg { width: 24px; height: 24px; display: block; }
.launch-wrap { display: flex; justify-content: center; }
.launch-btn {
  background: white; color: black;
  padding: 32px 96px; border-radius: 40px;
  font-weight: 900; font-size: 14px;
  text-transform: uppercase; letter-spacing: 0.4em;
  border: none; cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; gap: 24px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
}
.launch-btn:hover { transform: scale(1.05); }
.launch-btn:active { transform: scale(0.95); }
.launch-btn svg { width: 28px; height: 28px; fill: currentColor; }

/* Processing */
.processing-wrap {
  max-width: 672px; margin: 0 auto;
  min-height: 600px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 80px;
  text-align: center;
}
.spin-outer {
  position: relative; width: 224px; height: 224px;
  display: flex; align-items: center; justify-content: center;
}
.spin-glow {
  position: absolute; inset: 0;
  background: rgba(255,255,255,0.04);
  filter: blur(80px); border-radius: 50%;
  animation: breathe 3s ease infinite;
}

      <div class="ref-upload-zone">
        <div class="ref-icon-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        </div>
        <div>
          <h3 class="ref-title">Silhouette Cible</h3>
        </div>
        <p class="ref-desc">Importez une photo pour que l'IA adapte naturellement votre profil brut.</p>
        <label class="upload-btn-label">
          Choisir Photo
          <input type="file" accept="image/*" onchange="handleRefUpload(event)">
        </label>
      </div>
    </div>`;
  }
  return `<div>
    <div class="step-nav">
      <button class="back-btn" onclick="goStep('SELECT_MODE')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        Retour
      </button>
      <h2 class="step-title">02. Source Inspiration</h2>
    </div>
    <div class="ref-preview-wrap" style="margin-bottom:48px;">
      <img src="${referenceImage}" alt="Référence">
      <button class="ref-change-btn" onclick="clearRef()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3"/></svg>
      </button>
    </div>
    <div class="launch-wrap">
      <button class="launch-btn" onclick="handleProcess()">
        <svg viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
        Lancer le Rendu
      </button>
    </div>
  </div>`;
}

function renderProcessing() {
  return `<div class="processing-wrap">
    <div class="spin-outer">
      <div class="spin-glow"></div>
      <div class="spin-ring"></div>
      <div class="spin-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
      </div>
    </div>
    <div>
      <h2 class="processing-title">Rendu Brut 4K...</h2>
      <div class="processing-steps" style="margin-top:32px;">
        <p class="proc-step grey">Cartographie cutanée organique active</p>
        <p class="proc-step amber">Préservation des fossettes et textures naturelles</p>
        <p class="proc-step grey">Moteur Pro Nano Banana 3.1</p>
      </div>
    </div>
  </div>`;
}

function renderResult() {
  return `<div class="result-wrap">
    <div class="result-header">
      <h2 class="result-title">Rendu Finalisé</h2>
      <button class="new-project-btn" onclick="reset()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3"/></svg>
        Nouveau Projet
      </button>
    </div>
    <div class="result-grid">
      <div class="result-img-wrap">
        <img src="${resultImage}" alt="Résultat">
        <div class="live-badge">
          <div class="live-green"></div>
          <span class="live-text">Real Human Rendering</span>
        </div>
      </div>
      <div class="result-sidebar">
        <div class="sidebar-header">
          <h3 class="sidebar-title">Détails Image</h3>
          <p class="sidebar-engine">Engine: Studio Popotin 4.1 (3.1 Flash)</p>
        </div>
        <div class="checks">
          <div class="check-item">
            <div class="check-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div>
            <div>
              <div class="check-label">Zéro Retouche Visage</div>
              <div class="check-sub">Fossettes et peau préservées</div>
            </div>
          </div>
          <div class="check-item">
            <div class="check-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div>
            <div>
              <div class="check-label">Réalisme Textile Brut</div>
              <div class="check-sub">Vêtements adaptés en 4K</div>
            </div>
          </div>
        </div>
        <button class="dl-btn" onclick="downloadResult()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Télécharger HD
        </button>
      </div>
    </div>
  </div>`;
}

// ==================== CONTROLS ====================
function goStep(s) { step = s; errorMsg = null; render(); }
function setAR(r) { aspectRatio = r; render(); }
function toggleDimples() { preserveDimples = !preserveDimples; render(); }
function selectAngle(id) { selectedAngle = id; goStep('SELECT_MODE'); }
function selectStyle(id) { selectedStyle = id; render(); }
function clearRef() { referenceImage = null; render(); }

function reset() {
  step='UPLOAD_AVATAR'; avatarImage=null; referenceImage=null;
  selectedAngle=null; selectedStyle=null; aspectRatio='9:16';
  preserveDimples=true; resultImage=null; errorMsg=null;
  render();
}

function handleAvatarUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onloadend = () => { avatarImage = reader.result; goStep('ANGLE_SELECTION'); };
  reader.readAsDataURL(file);
}

function handleRefUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onloadend = () => { referenceImage = reader.result; render(); };
  reader.readAsDataURL(file);
}

function downloadResult() {
  if (!resultImage) return;
  const a = document.createElement('a');
  a.href = resultImage;
  a.download = `studio-popotin-render-${Date.now()}.png`;
  a.click();
}

// ==================== GENERATE ====================
async function handleProcess() {
  if (!avatarImage) return;

  goStep('PROCESSING');

  const angleInfo = CAMERA_ANGLES.find(a => a.id === selectedAngle);
  const styleInfo = MORPH_STYLES.find(s => s.id === selectedStyle);
  const baseContext = angleInfo ? `Shot framing: ${angleInfo.prompt}.` : '';
  const dimpleContext = preserveDimples ? '\nDIMPLE PRESERVATION MODE (ON): Identify facial dimples and lock them. Do not smooth or remove them.' : '';

  let taskInstructions = '';
  if (referenceImage) {
    taskInstructions = `${baseContext}${dimpleContext}
TASK: Harmonize the posterior shape from the SECOND image onto the person in the FIRST image.
NATURAL INTEGRATION: Absolute photographic realism. IDENTITY LOCK: Face remains identical. AUTHENTIC SKIN: Keep original skin imperfections.`;
  } else {
    taskInstructions = `${baseContext}${dimpleContext}
TASK: Adjust the posterior silhouette to match this lifestyle style: "${styleInfo?.prompt}".
RAW REALISM: Real human skin and fabric textures. SOFT CURVES: Organic, non-plastic look. CLOTHING REALISM: Natural adaptation.`;
  }

  const avatarData = avatarImage.split(',')[1];
  const parts = [
    { inlineData: { data: avatarData, mimeType: 'image/jpeg' } }
  ];

  if (referenceImage) {
    const refData = referenceImage.split(',')[1];
    parts.push({ inlineData: { data: refData, mimeType: 'image/jpeg' } });
  }

  parts.push({ text: `${SYSTEM_PROMPT}\n\n${taskInstructions}` });

  const apiAR = aspectRatio === '4:5' ? '3:4' : aspectRatio;
  const endpoint = `https://aiplatform.googleapis.com/v1/publishers/google/models/${MODEL}:generateContent?key=${API_KEY}`;

  const body = {
    contents: [{ role: 'user', parts }],
    generationConfig: {
      responseModalities: ['IMAGE', 'TEXT'],
      imageConfig: { aspectRatio: apiAR, imageSize: '4K' }
    }
  };

  try {
    const res = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    if (!res.ok) {
      const txt = await res.text();
      let d; try { d = JSON.parse(txt); } catch(e) {}
      throw new Error(`HTTP ${res.status}: ${d?.error?.message || txt}`);
    }

    const data = await res.json();
    let url = '';

    for (const part of (data.candidates?.[0]?.content?.parts || [])) {
      if (part.inlineData?.data) {
        url = `data:image/png;base64,${part.inlineData.data}`;
        break;
      }
    }

    if (!url) throw new Error("Le rendu n'a pas pu être généré. Essayez une image plus nette.");

    resultImage = url;
    goStep('RESULT');

  } catch(err) {
    errorMsg = err.message || "Erreur de traitement esthétique.";
    step = referenceImage ? 'REFERENCE_UPLOAD' : (selectedStyle ? 'STYLE_SELECTION' : 'SELECT_MODE');
    render();
  }
}
</script>
