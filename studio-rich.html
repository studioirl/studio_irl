/* ------------------------- SERVICE VERTEX AI ---------------------------- */

function getApiKey() {
  const key = localStorage.getItem('userApiKey');
  if (!key) throw new Error("Clé API Vertex AI introuvable.");
  return key;
}

function wait(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

const DEFAULT_SAFETY_SETTINGS = [
  { category: 'HARM_CATEGORY_HARASSMENT', threshold: 'BLOCK_ONLY_HIGH' },
  { category: 'HARM_CATEGORY_HATE_SPEECH', threshold: 'BLOCK_ONLY_HIGH' },
  { category: 'HARM_CATEGORY_SEXUALLY_EXPLICIT', threshold: 'BLOCK_ONLY_HIGH' },
  { category: 'HARM_CATEGORY_DANGEROUS_CONTENT', threshold: 'BLOCK_ONLY_HIGH' },
];

async function callVertexGenerateContent(model, parts, generationConfig, safetySettings) {
  const apiKey = getApiKey();
  const url = `${VERTEX_BASE_URL}/${model}:generateContent?key=${apiKey}`;
  const body = { contents: [{ role: 'user', parts }] };
  if (generationConfig) body.generationConfig = generationConfig;
  if (safetySettings) body.safetySettings = safetySettings;

  const response = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });

  if (!response.ok) {
    const errorText = await response.text();
    const error = new Error(`Vertex AI error (${response.status}): ${errorText}`);
    error.status = response.status;
    throw error;
  }
  return response.json();
}

async function generateWithRetry(apiCall, maxRetries = 5, baseDelay = 3000) {
  let lastError;
  for (let i = 0; i < maxRetries; i++) {
    try {
      return await apiCall();
    } catch (error) {
      lastError = error;
      const isRetryable = error.status === 429 || error.status === 503 ||
        (error.message && (error.message.includes('429') || error.message.includes('quota') ||
         error.message.includes('RESOURCE_EXHAUSTED') || error.message.includes('Too Many Requests') ||
         error.message.includes('503')));
      if (!isRetryable) throw error;
      if (i < maxRetries - 1) {
        const delay = baseDelay * Math.pow(2, i) + (Math.random() * 1000);
        await wait(delay);
      }
    }
  }
  throw lastError;
}

function extractText(response) {
  const text = response?.candidates?.[0]?.content?.parts?.find(p => typeof p.text === 'string')?.text;
  if (typeof text !== 'string') throw new Error("Réponse Vertex AI invalide : aucun texte trouvé.");
  return text.trim();
}

function extractImage(response) {
  const part = response?.candidates?.[0]?.content?.parts?.find(p => p.inlineData);
  if (part && part.inlineData) return `data:${part.inlineData.mimeType};base64,${part.inlineData.data}`;
  return null;
}

function getThematicContextPrompt(season, holiday) {
  let context = '';
  if (season.id !== 'none') context += `\n- **Season:** ${season.label}. This should influence the scene with the following aesthetic: "${season.description}"`;
  if (holiday.id !== 'none') context += `\n- **Holiday:** ${holiday.label}. This should transform the scene with a theme of: "${holiday.description}"`;
  if (context) return `\n        **Thematic Context (Merge these styles naturally and cinematically):** ${context}\n        `;
  return '';
}

    const thematicContext = getThematicContextPrompt(season, holiday);
    const bodyTypeContext = bodyType.id !== 'default' ? `\n- **Body Type:** ${bodyType.label} - ${bodyType.description}` : '';
    const prompt = `${genderMode === 'femme' ? femmePrompt : mascPrompt}

    ${bodyTypeContext}
    ${thematicContext}
    Generate fresh, on-brand, cinematic outfit choices based on all the context provided.`;

    const responseSchema = {
      type: 'ARRAY',
      items: {
        type: 'OBJECT',
        properties: {
          name: { type: 'STRING' },
          description: { type: 'STRING' },
          accessories: { type: 'STRING' }

        required: ["name", "description", "accessories"]

    const response = await callVertexGenerateContent(TEXT_MODEL, [{ text: prompt }], { responseMimeType: 'application/json', responseSchema });

    if (!Array.isArray(outfits) || outfits.length === 0) throw new Error("L'IA n'a pas renvoyé de tenues valides.");

    const thematicContext = getThematicContextPrompt(season, holiday);
    const prompt = `
    **Task:** Create a "VISUAL ANCHOR SHEET" for 2 friends accompanying the main character, visually distinct from each other and consistent across 7 images.
    **Instructions:**
    1. Friend A: distinctive feature, specific skin tone/body type, distinct outfit color.
    2. Friend B: different distinctive feature, specific skin tone/body type, distinct outfit color.
    3. Cohesion: "Baddie" friend group but visually distinct.
    4. Main character wears ${mainCharacterOutfit.name} — DO NOT reuse this color/style for the friends.
    **Scene Context:** ${scene.title} — Vibe: ${vibe.label}
    ${thematicContext}
    **Output:** A detailed paragraph describing Friend A and Friend B.`;
    const response = await callVertexGenerateContent(TEXT_MODEL, [{ text: prompt }]);
    const description = extractText(response);
    if (!description) throw new Error("L'IA n'a pas généré de description des amies.");
    return description;
  });
}

function extractActionForScene(fullPrompt, sceneNum) {
  const emojis = ['1️⃣', '2️⃣', '3️⃣', '4️⃣', '5️⃣', '6️⃣', '7️⃣'];
  const sceneEmoji = emojis[sceneNum - 1] || `${sceneNum}`;
  const lines = fullPrompt.split('\n');
  const line = lines.find(l => l.trim().startsWith(sceneEmoji));
  if (line) return line.replace(/^[1-7]️⃣\s*.*?—\s*/, '').trim();
  return "Create a cinematic moment from the story.";
}

function extractIntroSetting(fullPrompt, sceneTitle) {
  const lines = fullPrompt.split('\n');
  const introLine = lines.find(l => l.trim().startsWith('1️⃣'));
  if (introLine) return introLine.replace(/^[1-7]️⃣\s*.*?—\s*/, '').trim();
  return sceneTitle + " setting.";
}

async function generateVlogImage(baseImage, scene, sceneNumber, outfit, hairstyle, accessories, vibe, timeOfDay, genderMode, partnerStyle, friendStyles, season, holiday, bodyType) {
  let attempts = 0;
  const maxAttempts = 3;
  while (attempts < maxAttempts) {
    try {
      const imagePart = { inlineData: { data: baseImage.data, mimeType: baseImage.mimeType } };
      const specificAction = extractActionForScene(scene.prompt, sceneNumber);
      const anchorSetting = extractIntroSetting(scene.prompt, scene.title);

      let bodyTypeInstruction = "";
      if (bodyType.id === 'default') {
        bodyTypeInstruction = `
        **MANDATORY MAIN CHARACTER BODY MORPH: AS PER PHOTO**
        - Strictly adhere to the body proportions visible in the reference image. No filters, slimming, BBL effects, or muscle enhancements.`;
      } else {
        bodyTypeInstruction = `
        **MANDATORY MAIN CHARACTER BODY MORPH: ${bodyType.label.toUpperCase()}**
        - Description: "${bodyType.description}"
        - Ensure the silhouette matches this description exactly.`;
      }

      let companionInstruction = "**COMPANION LOCK:** The subject is solo in this frame.";
      if (partnerStyle) {
        companionInstruction = `
        **COMPANION LOCK (PARTNER):** The subject is with their partner. The partner is a SEPARATE ENTITY — do NOT apply the main character's body/outfit/features to them. Partner MUST look exactly as: "${partnerStyle}" in every frame.`;
      } else if (friendStyles) {
        companionInstruction = `
        **COMPANION LOCK (FRIENDS):** The subject is with 2 friends, SEPARATE ENTITIES. Friends MUST look exactly as: "${friendStyles}" in every frame.`;
      }

      const accessoryNails = accessories.nails ? `- **Nails:** ${accessories.nails}. (Must be visible)` : '';
      const accessoryWatch = accessories.watchAndGrooming ? `- **Watch:** ${accessories.watchAndGrooming}.` : '';
      const accessoryFootwear = accessories.footwear ? `- **Footwear:** ${accessories.footwear}.` : '';
      const thematicContext = getThematicContextPrompt(season, holiday);

      const textPart = { text: `
      **CINEMATIC VLOG GENERATION - FRAME ${sceneNumber}/7**
      **1. DIGITAL WARDROBE LOCK (MAIN CHARACTER):**
      - Outfit: ${outfit.name} - "${outfit.description}"
      - Hair: ${hairstyle.name} - "${hairstyle.description}"
      - Must be identical to description in every frame.
      **2. ${bodyTypeInstruction}**
      **3. ${companionInstruction}**
      **4. SCENE ACTION & VIBE:**
      - Setting Anchor: "${anchorSetting}" (keep background consistent).
      - Action: "${specificAction}" (dynamic — motion blur, laughter, movement).
      - Vibe: ${vibe.label} (${vibe.description}).
      - Lighting: ${timeOfDay.label} (${timeOfDay.description}).
      ${thematicContext}
      **5. ACCESSORIES:**
      ${accessoryNails}
      ${accessoryWatch}
      ${accessoryFootwear}
      - Bag: ${accessories.bag}
      **6. TECHNICAL SPECS (iPhone 17-style candid realism):**
      - 9:16 Vertical Aspect Ratio.
      - Photorealistic smartphone photo quality — no AI sheen, no plastic skin, natural micro-imperfections.
      - Natural dynamic range, true-to-life color science.
      - Dynamic camera angle (low angle for power, selfie angle for intimacy).
      ` };

      const response = await callVertexGenerateContent(
        IMAGE_MODEL,
        [imagePart, textPart],
        { responseModalities: ['IMAGE'], imageConfig: { aspectRatio: '9:16' } },
        DEFAULT_SAFETY_SETTINGS
      );
      const imageUrl = extractImage(response);
      if (imageUrl) return imageUrl;
      throw new Error("Génération d'image sans données (probablement filtrée).");
    } catch (error) {
      console.error(`Tentative ${attempts + 1} échouée pour la scène ${sceneNumber}:`, error);
      attempts++;
      if (attempts >= maxAttempts) return null;
      await wait(3000 * Math.pow(2, attempts - 1));
    }
  }
  return null;
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => {
      const result = reader.result;
      const mimeType = result.split(',')[0].split(':')[1].split(';')[0];
      const data = result.split(',')[1];
      resolve({ data, mimeType });
    };
    reader.onerror = reject;
  });
}

function wireCustomSelector(container, id, onChange) {
  const toggle = container.querySelector(`[data-toggle="${id}"]`);
  const list = container.querySelector(`[data-list="${id}"]`);
  toggle.addEventListener('click', (e) => {
    e.stopPropagation();
    document.querySelectorAll('ul[data-list]').forEach(l => { if (l !== list) l.classList.add('hidden'); });
    list.classList.toggle('hidden');
  });
  container.querySelectorAll(`[data-option="${id}"]`).forEach(opt => {
    opt.addEventListener('click', () => {
      onChange(opt.getAttribute('data-value'));
      list.classList.add('hidden');
    });
  });
}

  if (state.loadingOutfits) { zone.innerHTML = `<div class="flex items-center gap-2 text-gray-400"><svg class="animate-spin h-5 w-5 text-white" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg><p>Generating cinematic outfits...</p></div>`; return; }
  if (state.outfitError) { zone.innerHTML = `<div class="p-4 bg-red-900/50 border border-red-500 text-red-300 rounded-lg"><p>${state.outfitError}</p></div>`; return; }
  if (!state.outfits.length) { zone.innerHTML = ''; return; }
  zone.innerHTML = `<div class="grid grid-cols-1 md:grid-cols-2 gap-4">${state.outfits.map((o, i) => `
    <div data-outfit-idx="${i}" class="p-4 rounded-lg border bg-black cursor-pointer transition-all duration-300 ${state.selectedOutfit && state.selectedOutfit.name === o.name ? 'border-amber-400 shadow-lg shadow-amber-500/20' : 'border-gray-700 hover:border-amber-500 hover:shadow-amber-500/10'}">
      <h4 class="font-bold text-amber-400 text-md">${o.name}</h4>
      <p class="text-white text-sm mt-2 mb-3">${o.description}</p>
      <ul class="space-y-1 list-disc list-inside">${o.accessories.split(',').map(a => `<li class="text-amber-400/90 italic text-sm">${a.trim()}</li>`).join('')}</ul>
    </div>`).join('')}</div>`;
  zone.querySelectorAll('[data-outfit-idx]').forEach(cardEl => {
    cardEl.addEventListener('click', () => {
      state.selectedOutfit = state.outfits[parseInt(cardEl.getAttribute('data-outfit-idx'))];
      state.accessories = []; state.selectedAccessory = null;
      render();
      refreshAccessories();
    });
  });
}

function renderHairZone(zone) {
  if (state.loadingHairstyles) { zone.innerHTML = `<div class="flex items-center gap-2 text-gray-400"><svg class="animate-spin h-5 w-5 text-white" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg><p>Styling hair with perfect edges...</p></div>`; return; }
  if (state.hairstyleError) { zone.innerHTML = `<div class="p-4 bg-red-900/50 border border-red-500 text-red-300 rounded-lg"><p>${state.hairstyleError}</p></div>`; return; }
  if (!state.hairstyles.length) { zone.innerHTML = ''; return; }
  zone.innerHTML = `<div class="grid grid-cols-1 md:grid-cols-2 gap-4">${state.hairstyles.map((h, i) => `
    <div data-hair-idx="${i}" class="p-4 rounded-lg border bg-black cursor-pointer transition-all duration-300 ${state.selectedHairstyle && state.selectedHairstyle.name === h.name ? 'border-amber-400 shadow-lg shadow-amber-500/20' : 'border-gray-700 hover:border-amber-500 hover:shadow-amber-500/10'}">
      <h4 class="font-bold text-amber-400 text-md">${h.name}</h4>
      <p class="text-white text-sm mt-2">${h.description}</p>
    </div>`).join('')}</div>`;
  zone.querySelectorAll('[data-hair-idx]').forEach(cardEl => {
    cardEl.addEventListener('click', () => {
      state.selectedHairstyle = state.hairstyles[parseInt(cardEl.getAttribute('data-hair-idx'))];
      render();
      if (state.selectedOutfit) refreshAccessories();
    });
  });
}

function renderAccessoryZone(zone) {
  if (state.loadingAccessories) { zone.innerHTML = `<div class="flex items-center gap-2 text-gray-400"><svg class="animate-spin h-5 w-5 text-white" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg><p>Selecting the final touches...</p></div>`; return; }
  if (state.accessoryError) { zone.innerHTML = `<div class="p-4 bg-red-900/50 border border-red-500 text-red-300 rounded-lg"><p>${state.accessoryError}</p></div>`; return; }
  if (!state.accessories.length) { zone.innerHTML = ''; return; }
  zone.innerHTML = `<div class="grid grid-cols-1 md:grid-cols-2 gap-4">${state.accessories.map((c, i) => `
    <div data-acc-idx="${i}" class="p-4 rounded-lg border bg-zinc-900/50 cursor-pointer transition-all duration-300 ${state.selectedAccessory && state.selectedAccessory.name === c.name ? 'border-amber-400 shadow-lg shadow-amber-500/20' : 'border-gray-700 hover:border-amber-500 hover:shadow-amber-500/10'}">
      <h4 class="font-bold text-amber-400 text-md">${c.name}</h4>
      <div class="mt-3 space-y-3">
        ${c.nails ? `<div><p class="text-sm font-semibold text-amber-400/80">💅🏽 Nails</p><p class="text-white text-sm">${c.nails}</p></div>` : ''}
        ${c.watchAndGrooming ? `<div><p class="text-sm font-semibold text-amber-400/80">⌚️ Watch & Grooming</p><p class="text-white text-sm">${c.watchAndGrooming}</p></div>` : ''}
        ${c.footwear ? `<div><p class="text-sm font-semibold text-amber-400/80">👟 Footwear</p><p class="text-white text-sm">${c.footwear}</p></div>` : ''}
        <div><p class="text-sm font-semibold text-amber-400/80">👜 Luxury Bag</p><p class="text-white text-sm">${c.bag}</p></div>
        <div><p class="text-sm font-semibold text-amber-400/80">💎 Jewelry & Extras</p><p class="text-white text-sm">${c.jewelry}</p></div>
      </div>
    </div>`).join('')}</div>`;
  zone.querySelectorAll('[data-acc-idx]').forEach(cardEl => {
    cardEl.addEventListener('click', () => {
      state.selectedAccessory = state.accessories[parseInt(cardEl.getAttribute('data-acc-idx'))];
      render();
    });
  });
}

function renderUploadZone(zone) {
  if (state.imageDataUrl) {
    zone.innerHTML = `
      <div class="relative group">
        <img src="${state.imageDataUrl}" alt="Preview" class="max-h-60 rounded-lg" />
        <div id="change-image" class="absolute inset-0 bg-black bg-opacity-50 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity cursor-pointer">
          <p class="text-white font-semibold">Change Image</p>
        </div>
      </div>`;
    zone.querySelector('#change-image').addEventListener('click', () => { state.imageFile = null; state.imageDataUrl = null; render(); });
  } else {
    zone.innerHTML = `
      <div class="space-y-1 text-center">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-gray-500 mx-auto" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>
        <div class="flex text-sm text-gray-400 justify-center">
          <label for="file-upload" class="relative cursor-pointer bg-gray-900 rounded-md font-medium text-amber-400 hover:text-amber-300"><span>Upload a file</span>
            <input id="file-upload" type="file" class="sr-only" accept="image/png, image/jpeg" />
          </label>
          <p class="pl-1">or drag and drop</p>
        </div>
        <p class="text-xs text-gray-500">PNG, JPG up to 10MB</p>
      </div>`;
    const input = zone.querySelector('#file-upload');
    input.addEventListener('change', (e) => handleFileSelect(e.target.files));
    zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('border-amber-500', 'bg-gray-800'); });
    zone.addEventListener('dragleave', (e) => { e.preventDefault(); zone.classList.remove('border-amber-500', 'bg-gray-800'); });
    zone.addEventListener('drop', (e) => { e.preventDefault(); zone.classList.remove('border-amber-500', 'bg-gray-800'); handleFileSelect(e.dataTransfer.files); });
  }
}

function handleFileSelect(files) {
  if (files && files[0]) {
    state.imageFile = files[0];
    const reader = new FileReader();
    reader.onloadend = () => { state.imageDataUrl = reader.result; render(); };
    reader.readAsDataURL(files[0]);
  }
}

async function refreshOutfitsAndHair() {
  if (!state.genderMode) return;
  const scene = state.selectedScene, vibe = getVibe(), timeOfDay = getTimeOfDay(), season = getSeason(), holiday = getHoliday(), bodyType = getBodyType();

  state.loadingOutfits = true; state.outfitError = null; state.outfits = []; state.selectedOutfit = null;
  state.loadingHairstyles = true; state.hairstyleError = null; state.hairstyles = []; state.selectedHairstyle = null;
  state.accessories = []; state.selectedAccessory = null;
  render();

  try {
    state.outfits = await generateOutfits(scene, vibe, timeOfDay, state.genderMode, season, holiday, bodyType);
    state.selectedOutfit = state.outfits[0] || null;
  } catch (err) { state.outfitError = err.message; }
  state.loadingOutfits = false;
  render();

  try {
    state.hairstyles = await generateHairstyles(vibe, timeOfDay, state.genderMode, season, holiday, bodyType);
    state.selectedHairstyle = state.hairstyles[0] || null;
  } catch (err) { state.hairstyleError = err.message; }
  state.loadingHairstyles = false;
  render();

  if (state.selectedOutfit) refreshAccessories();
}

async function refreshAccessories() {
  if (!state.selectedOutfit || !state.genderMode) return;
  const scene = state.selectedScene, vibe = getVibe(), timeOfDay = getTimeOfDay(), season = getSeason(), holiday = getHoliday(), bodyType = getBodyType();
  state.loadingAccessories = true; state.accessoryError = null; state.accessories = []; state.selectedAccessory = null;
  render();
  try {
    state.accessories = await generateAccessoryCombinations(scene, vibe, state.selectedOutfit, timeOfDay, state.genderMode, season, holiday, bodyType);
    state.selectedAccessory = state.accessories[0] || null;
  } catch (err) { state.accessoryError = err.message; }
  state.loadingAccessories = false;
  render();
}

/* --------------------- PIPELINE DE GÉNÉRATION DU VLOG -------------------- */

async function startGeneration(sameOptions) {
  if (!state.selectedScene) return;
  let params = state.lastGenParams;
  if (!sameOptions || !params) {
    if (!state.imageFile || !state.genderMode || !state.selectedOutfit || !state.selectedHairstyle || !state.selectedAccessory) return;
    params = {
      imageFile: state.imageFile,
      genderMode: state.genderMode,
      bodyType: getBodyType(),
      outfit: state.selectedOutfit,
      hairstyle: state.selectedHairstyle,
      accessory: state.selectedAccessory,
      vibe: getVibe(),
      timeOfDay: getTimeOfDay(),
      season: getSeason(),
      holiday: getHoliday(),
    };
    state.lastGenParams = params;
  }

  state.isGenerating = true;
  state.generatedImages = [];
  render();

  try {
    const baseImage = await fileToBase64(params.imageFile);
    const scene = state.selectedScene;

    let detailedPartnerStyle, detailedFriendStyles;
    if (scene.isCoupleScene) {
      const archetypes = params.genderMode === 'femme' ? MALE_PARTNER_ARCHETYPES : FEMALE_PARTNER_ARCHETYPES;
      const partnerArchetype = archetypes[Math.floor(Math.random() * archetypes.length)].description;
      detailedPartnerStyle = await generatePartnerStyle(scene, params.vibe, params.timeOfDay, partnerArchetype, params.season, params.holiday);
    } else if (scene.isGirlsTripScene) {
      detailedFriendStyles = await generateFriendStyles(scene, params.vibe, params.timeOfDay, params.outfit, params.season, params.holiday);
    }

    const results = [];
    for (let i = 0; i < 7; i++) {
      if (i > 0) await wait(5000);
      const imageUrl = await generateVlogImage(
        baseImage, scene, i + 1, params.outfit, params.hairstyle, params.accessory,
        params.vibe, params.timeOfDay, params.genderMode, detailedPartnerStyle, detailedFriendStyles,
        params.season, params.holiday, params.bodyType
      );
      results.push(imageUrl);
    }

    const validImages = results.filter(Boolean);
    if (validImages.length === 0) {
      throw new Error("L'IA n'a réussi à générer aucune image. Réessaie dans un instant ou change les options de style.");
    }
    if (validImages.length < 7) {
      alert(`${validImages.length} images générées sur 7. Certaines scènes ont échoué (limite IA temporaire). Tu peux régénérer le vlog.`);
    }

    state.generatedImages = validImages;
    state.currentSlide = 0;
    state.view = 'display';
  } catch (err) {
    alert(err.message);
  } finally {
    state.isGenerating = false;
    render();
  }
}

/* --------------------------- Écran 5 : affichage -------------------------- */

let slideInterval = null, progressInterval = null;

function clearSlideTimers() {
  if (slideInterval) clearInterval(slideInterval);
  if (progressInterval) clearInterval(progressInterval);
  slideInterval = null; progressInterval = null;
}

function renderDisplay() {
  if (state.isGenerating) {
    return el(`
      <div class="w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-32 flex flex-col items-center justify-center min-h-[50vh] animate-fade-in">
        <div class="relative mb-8">
          <div class="absolute inset-0 bg-amber-500 blur-xl opacity-20 rounded-full"></div>
          <svg class="animate-spin h-20 w-20 text-amber-400 relative z-10" viewBox="0 0 24 24" fill="none">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
        </div>
        <h2 class="text-3xl font-extrabold text-white tracking-tight">Regenerating Your Vlog...</h2>
        <p class="text-gray-400 mt-4 text-lg text-center max-w-md">The AI director is reshooting your scenes to ensure maximum luxury and consistency. Please wait...</p>
      </div>
    `);
  }

  const images = state.generatedImages;
  const scene = state.selectedScene;
  if (!images.length) return el(`<div></div>`);

  const wrap = el(`
    <div class="bg-zinc-900 text-white min-h-screen font-sans">
      <main class="pb-16">
        <div class="w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
          <div class="text-center mb-8">
            <h2 class="text-4xl font-extrabold text-white sm:text-5xl">Your <span class="text-amber-400">${scene.title}</span> Vlog</h2>
            <p class="mt-4 text-xl text-gray-400">Your story is ready. Watch the generated vlog below.</p>
          </div>

          <div class="flex justify-center mb-12">
            <div class="relative w-full max-w-md bg-black rounded-2xl border-2 border-amber-500/50 shadow-2xl overflow-hidden aspect-[9/16]">
              <div id="progress-bars" class="absolute top-2 left-2 right-2 flex gap-1 z-20"></div>
              <div id="slides" class="relative w-full h-full"></div>
            </div>
          </div>

          <div class="border-t border-gray-800 pt-12">
            <h3 class="text-2xl font-bold text-white mb-6 text-center">Scene Breakdown & Downloads</h3>
            <div id="scene-grid-thumbs" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-7 gap-4"></div>
          </div>

          <div class="mt-16 text-center flex flex-col sm:flex-row justify-center items-center gap-4">
            <button id="regen-open" class="bg-gray-800 hover:bg-gray-700 text-amber-400 font-bold py-3 px-8 rounded-lg transition-all duration-300 transform hover:scale-105">Regenerate This Vlog</button>
            <button id="reset-btn" class="bg-amber-500 hover:bg-amber-600 text-black font-bold py-3 px-8 rounded-lg transition-all duration-300 transform hover:scale-105">Create New Vlog</button>
          </div>
        </div>
      </main>
      <div id="regen-modal" class="fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-50 hidden">
        <div class="bg-black border border-amber-500 rounded-lg shadow-xl p-8 max-w-md w-full mx-4 relative">
          <button id="regen-close" class="absolute top-3 right-3 text-gray-400 hover:text-white transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
          </button>
          <h3 class="text-2xl font-bold text-amber-400 mb-4">Regenerate Your Vlog</h3>
          <p class="text-gray-300 mb-6">Do you want to retry generating the vlog with the same styles, or change your look?</p>
          <div class="flex flex-col gap-4">
            <button id="regen-same" class="w-full bg-amber-500 hover:bg-amber-600 text-black font-bold py-3 px-4 rounded-lg transition-all duration-300 transform hover:scale-105">Retry Same Style</button>
            <button id="regen-new" class="w-full bg-gray-800 hover:bg-gray-700 text-amber-400 font-bold py-3 px-4 rounded-lg transition-all duration-300">Change Style & Retry</button>
          </div>
        </div>
      </div>
    </div>
  `);

  const progressBars = wrap.querySelector('#progress-bars');
  images.forEach((_, idx) => {
    progressBars.appendChild(el(`<div class="h-1 flex-1 bg-gray-600 rounded-full overflow-hidden"><div data-bar="${idx}" class="h-full bg-white transition-all duration-100 ease-linear" style="width:${idx < state.currentSlide ? '100' : '0'}%"></div></div>`));
  });

  const slidesZone = wrap.querySelector('#slides');
  images.forEach((src, idx) => {
    slidesZone.appendChild(el(`<img src="${src}" alt="Scene ${idx+1}" class="absolute inset-0 w-full h-full object-cover transition-opacity duration-500 ${idx === state.currentSlide ? 'opacity-100' : 'opacity-0'}" />`));
  });
  slidesZone.appendChild(el(`<div class="absolute inset-0 bg-gradient-to-b from-black/20 via-transparent to-black/60 pointer-events-none"></div>`));
  const controls = el(`
    <div class="absolute bottom-0 left-0 right-0 p-6 z-20">
      <div class="flex items-center justify-between mb-2">
        <span class="text-amber-400 font-bold text-sm tracking-wider uppercase">${scene.title} • Scene ${state.currentSlide + 1}/${images.length}</span>
        <button id="play-pause" class="text-white hover:text-amber-400 transition-colors focus:outline-none"></button>
      </div>
      <p class="text-white text-xs opacity-80">Generated with Reel Rich AI</p>
    </div>`);
  slidesZone.appendChild(controls);
  const playBtn = controls.querySelector('#play-pause');
  playBtn.innerHTML = state.isPlaying
    ? `<svg class="h-8 w-8" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8a1 1 0 012 0v4a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" /></svg>`
    : `<svg class="h-8 w-8" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd" /></svg>`;
  playBtn.addEventListener('click', () => { state.isPlaying = !state.isPlaying; restartSlideTimers(); render(); });

  const navLeft = el(`<div class="absolute inset-0 flex z-10"><div class="w-1/2 h-full cursor-pointer"></div><div class="w-1/2 h-full cursor-pointer"></div></div>`);
  navLeft.children[0].addEventListener('click', () => { state.currentSlide = (state.currentSlide - 1 + images.length) % images.length; render(); });
  navLeft.children[1].addEventListener('click', () => { state.currentSlide = (state.currentSlide + 1) % images.length; render(); });
  slidesZone.appendChild(navLeft);

  const thumbGrid = wrap.querySelector('#scene-grid-thumbs');
  images.forEach((src, idx) => {
    const thumb = el(`
      <div class="group bg-black rounded-lg overflow-hidden border relative cursor-pointer transition-all duration-300 ${idx === state.currentSlide ? 'border-amber-400 ring-2 ring-amber-400/50' : 'border-gray-700 hover:border-amber-500'}">
        <img src="${src}" alt="Scene ${idx+1}" class="w-full h-auto object-cover aspect-[9/16]" />
        <div class="absolute inset-0 bg-black bg-opacity-0 group-hover:bg-opacity-40 flex items-center justify-center transition-all duration-300">
          <button data-dl="${idx}" class="opacity-0 group-hover:opacity-100 bg-amber-500 text-black p-2 rounded-full hover:bg-amber-400 transform scale-90 group-hover:scale-100 transition-all" title="Download Image">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
          </button>
        </div>
        <div class="absolute bottom-0 left-0 right-0 bg-black/70 p-1 text-center"><span class="text-xs text-gray-300">#${idx+1}</span></div>
      </div>`);
    thumb.addEventListener('click', () => { state.currentSlide = idx; render(); });
    thumb.querySelector(`[data-dl="${idx}"]`).addEventListener('click', (e) => {
      e.stopPropagation();
      const link = document.createElement('a');
      link.href = src;
      const sanitizedTitle = scene.title.replace(/[^a-z0-9]/gi, '_').toLowerCase();
      link.download = `reel_rich_ai_${sanitizedTitle}_scene_${idx + 1}.png`;
      document.body.appendChild(link); link.click(); document.body.removeChild(link);
    });
    thumbGrid.appendChild(thumb);
  });

  wrap.querySelector('#reset-btn').addEventListener('click', () => {
    clearSlideTimers();
    state.view = 'categories'; state.selectedScene = null; state.generatedImages = [];
    render();
  });
  wrap.querySelector('#regen-open').addEventListener('click', () => { wrap.querySelector('#regen-modal').classList.remove('hidden'); });
  wrap.querySelector('#regen-close').addEventListener('click', () => { wrap.querySelector('#regen-modal').classList.add('hidden'); });
  wrap.querySelector('#regen-same').addEventListener('click', () => { wrap.querySelector('#regen-modal').classList.add('hidden'); startGeneration(true); });
  wrap.querySelector('#regen-new').addEventListener('click', () => {
    clearSlideTimers();
    state.view = 'generator'; state.generatedImages = [];
    render();
  });

  restartSlideTimers();
  return wrap;
}

function restartSlideTimers() {
  clearSlideTimers();
  const SLIDE_DURATION = 3000;
  if (state.isPlaying && state.generatedImages.length > 0) {
    slideInterval = setInterval(() => {
      state.currentSlide = (state.currentSlide + 1) % state.generatedImages.length;
      render();
    }, SLIDE_DURATION);
  }
}

/* --------------------------------- INIT ---------------------------------- */

function init() {
  const existingKey = localStorage.getItem('userApiKey');
  state.view = existingKey ? 'categories' : 'apikey';
  render();
}

init();
</script>
