<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Studio Cinéma — GitHub Pages</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface-2: #1c1c1c;
      --surface-3: #262626;
      --text: #f5f5f5;
      --text-2: #a3a3a3;
      --text-3: #525252;
      --border: #262626;
      --accent: #e85d4a;
      --gold: #d4af37;
      --green: #4ade80;
      --purple: #8b5cf6;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); }
    body {
      font-family: "Inter", system-ui, sans-serif;
      min-height: 100vh;
      overflow: hidden;
    }

    .film-grain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      opacity: .03;
      background-image: url("https://grainy-gradients.vercel.app/noise.svg");
    }

    /* ... tout le reste du CSS ... */
  </style>
</head>
<body>
  <div class="film-grain"></div>

  <div class="app">
    <!-- ... tout le HTML de l'interface ... -->
  </div>

  <script>

  </script>
</body>
</html>
