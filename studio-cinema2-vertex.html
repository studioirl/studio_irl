<!doctype html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio Cinéma</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family: Inter, sans-serif;
  background:#0a0a0a;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.container {
  width:90%;
  max-width:500px;
  background:#141414;
  padding:20px;
  border-radius:12px;
}

input, textarea, button {
  width:100%;
  margin-top:10px;
  padding:10px;
  border-radius:8px;
  border:none;
}

button {
  background:#e85d4a;
  color:white;
  cursor:pointer;
  font-weight:bold;
}

video {
  width:100%;
  margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

<h2>Studio Cinéma</h2>

<input type="password" id="apiKey" placeholder="Ta clé API Vertex">

<input type="file" id="imageInput">

<textarea id="prompt" placeholder="Ton texte / dialogue"></textarea>

<button onclick="generate()">Générer vidéo</button>

<video id="video" controls></video>

</div>

<script>

async function generate() {
  const apiKey = document.getElementById("apiKey").value;
  const file = document.getElementById("imageInput").files[0];
  const prompt = document.getElementById("prompt").value;

  if (!apiKey || !file) {
    alert("Ajoute clé API + image");
    return;
  }

  const reader = new FileReader();

  reader.onload = async function () {
    const base64 = reader.result.split(",")[1];

    const res = await fetch(
      "https://generativelanguage.googleapis.com/v1beta/models/veo-3.1-generate-preview:predictLongRunning?key=" + apiKey,
      {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [{
            role: "user",
            parts: [
              { text: prompt },
              {
                inlineData: {
                  mimeType: "image/jpeg",
                  data: base64
                }
              }
            ]
          }],
          generationConfig: {
            responseModalities: ["VIDEO"],
            videoConfig: {
              durationSeconds: 6,
              aspectRatio: "9:16"
            }
          }
        })
      }
    );

    const data = await res.json();

    if (!data.name) {
      alert("Erreur API");
      return;
    }

    // polling
    let done = false;
    let result;

    while (!done) {
      await new Promise(r => setTimeout(r, 5000));

      const check = await fetch(
        "https://generativelanguage.googleapis.com/v1beta/" + data.name + "?key=" + apiKey
      );

      result = await check.json();
      done = result.done;
    }

    const videoData =
      result.response.candidates[0].content.parts[0].inlineData.data;

    const binary = atob(videoData);
    const bytes = new Uint8Array(binary.length);

    for (let i = 0; i < binary.length; i++) {
      bytes[i] = binary.charCodeAt(i);
    }

    const blob = new Blob([bytes], { type: "video/mp4" });
    const url = URL.createObjectURL(blob);

    document.getElementById("video").src = url;
  };

  reader.readAsDataURL(file);
}

</script>

</body>
</html>
