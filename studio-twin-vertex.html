<script>
const MODEL = 'gemini-3.1-flash-image-preview';

async function startGeneration() {
  const allUploaded = Object.values(photos).every(p => p !== null);
  if (!allUploaded || isGenerating) return;

  isGenerating = true;
  loadingMsgIdx = 0;
  results = [];
  document.getElementById('errorBox').style.display = 'none';
  document.getElementById('resultsSection').style.display = 'none';
  updateGenBtn();

  loadingInterval = setInterval(() => {
    loadingMsgIdx = (loadingMsgIdx + 1) % LOADING_MESSAGES.length;
    const sub = document.getElementById('loadingSubMsg');
    if (sub) sub.textContent = LOADING_MESSAGES[loadingMsgIdx];
  }, 3000);

  const referenceParts = Object.values(photos).map(base64 => {
    const mime = base64.match(/^data:(image\/[a-zA-Z+]+);base64,/)?.[1] || 'image/png';
    return { inlineData: { data: base64.split(',')[1], mimeType: mime } };
  });

  const apiAR = selectedRatio === '4:5' ? '3:4' : selectedRatio;

  const endpoint = `https://generativelanguage.googleapis.com/v1/models/${MODEL}:generateContent`;

  const generationPromises = VIEWS.map(async view => {
    const body = {
      contents: [{
        role: "user",
        parts: [
          ...referenceParts,
          { text: `${SYSTEM_INSTRUCTION}\n\nTASK: ${view.prompt}` }
        ]
      }],
      generationConfig: {
        responseModalities: ["IMAGE"],
        imageConfig: {
          aspectRatio: apiAR,
          imageSize: "4K"
        }
      }
    };

    const res = await fetch(`${endpoint}?key=${API_KEY}`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(body)
    });

    if (!res.ok) {
      const txt = await res.text();
      let d; try { d = JSON.parse(txt); } catch(e) {}
      const msg = d?.error?.message || txt;

      if(res.status===429) throw new Error("Trop de requêtes → attends 30s");
      if(res.status===403) throw new Error("Clé invalide ou API non activée");
      throw new Error(msg);
    }

    const data = await res.json();

    for (const part of (data.candidates?.[0]?.content?.parts || [])) {
      if (part.inlineData?.data) {
        return {
          view: view.id,
          url: `data:image/png;base64,${part.inlineData.data}`
        };
      }
    }

    throw new Error("Image non générée");
  });

  try {
    const allResults = await Promise.all(generationPromises);
    results = allResults;
    showResults();
  } catch(err) {
    const errBox = document.getElementById('errorBox');
    errBox.textContent = err.message;
    errBox.style.display = 'block';
  } finally {
    isGenerating = false;
    clearInterval(loadingInterval);
    updateGenBtn();
  }
}
</script>
