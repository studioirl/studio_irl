<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STUDIO GÉNÉTIQUE — IRL</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Syne', sans-serif; background: #080810; color: #f0f0f8; margin: 0; }
    .mono { font-family: 'Space Mono', monospace; }

    :root {
      --blue: #3b82f6;
      --blue-dim: rgba(59,130,246,0.15);
      --blue-border: rgba(59,130,246,0.25);
      --surface: rgba(255,255,255,0.03);
      --border: rgba(255,255,255,0.06);
      --amber: #f59e0b;
    }

    .glass {
      background: var(--surface);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
    }

    .gradient-bg {
      background: radial-gradient(ellipse 80% 60% at 70% -10%, rgba(59,130,246,0.08) 0%, transparent 60%),
                  radial-gradient(ellipse 60% 40% at 10% 100%, rgba(99,102,241,0.06) 0%, transparent 60%),
                  #080810;
    }

    input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 4px;
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--blue);
      cursor: pointer;
      box-shadow: 0 0 8px rgba(59,130,246,0.5);
    }

    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

    @keyframes spin-slow { to { transform: rotate(360deg); } }
    @keyframes bounce-slow { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    @keyframes fade-in { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    @keyframes ping { 0%{transform:scale(1);opacity:1} 75%,100%{transform:scale(2);opacity:0} }

    .animate-bounce-slow { animation: bounce-slow 4s ease-in-out infinite; }
    .animate-fade-in { animation: fade-in 0.5s ease forwards; }
    .animate-ping { animation: ping 1.5s cubic-bezier(0,0,0.2,1) infinite; }
    .animate-pulse { animation: pulse 2s cubic-bezier(0.4,0,0.6,1) infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
    .animate-spin-slow { animation: spin-slow 20s linear infinite; }

    .api-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }

    /* Range wrapper for generating */
    .gen-btn {
      background: #fff;
      color: #000;
      font-weight: 800;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border: none;
      border-radius: 1rem;
      padding: 1rem 1.5rem;
      width: 100%;
      cursor: pointer;
      font-size: 0.875rem;
      transition: all 0.2s;
    }
    .gen-btn:hover { background: #dbeafe; }
    .gen-btn:disabled { background: #1f2937; color: #4b5563; cursor: not-allowed; }

    .mode-btn {
      display: flex; align-items: center; gap: 0.75rem;
      width: 100%; padding: 0.75rem; border-radius: 0.75rem;
      border: 1px solid transparent;
      background: transparent; color: #9ca3af;
      cursor: pointer; font-size: 0.875rem; font-weight: 500;
      transition: all 0.2s; text-align: left; font-family: 'Syne', sans-serif;
    }
    .mode-btn:hover { background: rgba(255,255,255,0.05); color: #e5e7eb; }
    .mode-btn.active {
      background: var(--blue-dim);
      color: var(--blue);
      border-color: var(--blue-border);
      box-shadow: 0 0 15px rgba(59,130,246,0.1);
    }

    .upload-zone {
      aspect-ratio: 1;
      border-radius: 1rem;
      border: 2px dashed rgba(255,255,255,0.1);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      cursor: pointer; overflow: hidden; position: relative;
      transition: border-color 0.2s; background: rgba(255,255,255,0.02);
    }
    .upload-zone:hover { border-color: rgba(59,130,246,0.5); }
    .upload-zone img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; }
    .upload-zone-overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.2s;
    }
    .upload-zone:hover .upload-zone-overlay { opacity: 1; }

    .tag-btn {
      padding: 0.25rem 0.75rem; border-radius: 0.5rem;
      font-size: 0.6rem; font-weight: 700; text-transform: uppercase;
      border: 1px solid rgba(255,255,255,0.1);
      background: transparent; color: #4b5563; cursor: pointer;
      transition: all 0.2s; font-family: 'Space Mono', monospace;
    }
    .tag-btn.active { background: var(--blue-dim); border-color: var(--blue); color: var(--blue); }

    .sex-btn {
      flex: 1; padding: 1rem; border-radius: 0.75rem; border: 2px solid rgba(255,255,255,0.05);
      background: transparent; color: #6b7280; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 0.25rem;
      transition: all 0.2s; font-family: 'Syne', sans-serif;
    }
    .sex-btn.active {
      background: var(--blue-dim); border-color: var(--blue); color: var(--blue);
      box-shadow: 0 0 20px rgba(59,130,246,0.2);
    }

    .result-img-wrap {
      position: relative; border-radius: 1rem; overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .result-img-wrap img { width: 100%; height: auto; display: block; }
    .result-overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.4);
      opacity: 0; transition: opacity 0.2s;
      display: flex; align-items: center; justify-content: center;
    }
    .result-img-wrap:hover .result-overlay { opacity: 1; }
    .result-label {
      position: absolute; top: 1rem; left: 1rem;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
      padding: 0.25rem 0.75rem; border-radius: 9999px;
      font-size: 0.6rem; font-weight: 700; color: var(--blue);
      text-transform: uppercase; letter-spacing: 0.15em;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .progress-bar-inner { height: 100%; background: var(--blue); transition: width 1s ease-in-out; border-radius: 4px; }

    .section-header {
      font-size: 0.625rem; color: var(--blue); font-weight: 800;
      text-transform: uppercase; letter-spacing: 0.2em; margin-bottom: 0.5rem;
    }

    .panel-block {
      padding: 1rem; background: rgba(255,255,255,0.03);
      border-radius: 1rem; border: 1px solid rgba(255,255,255,0.06);
    }

    .amber-note {
      padding: 0.75rem 1rem;
      border-left: 2px solid rgba(245,158,11,0.5);
      background: rgba(245,158,11,0.05);
      border-radius: 0 0.5rem 0.5rem 0;
    }

    /* Checkbox */
    input[type=checkbox] { accent-color: var(--blue); width: 1rem; height: 1rem; cursor: pointer; }
  </style>
</head>
<body>
<div id="app"></div>

<script type="module">
// ===================== STATE =====================
const APP_MODES = {
  CHILD: 'CHILD', SIBLING: 'SIBLING', GRANDPARENT: 'GRANDPARENT',
  UNCLE_AUNT: 'UNCLE_AUNT', COUSIN: 'COUSIN', PREGNANCY: 'PREGNANCY', EVOLUTION: 'EVOLUTION'
};
const MODE_LABELS = {
  CHILD: 'Enfant', SIBLING: 'Frères & Sœurs', GRANDPARENT: 'Grands-Parents',
  UNCLE_AUNT: 'Oncles / Tantes', COUSIN: 'Cousins / Cousines',
  PREGNANCY: 'Mode Grossesse', EVOLUTION: 'Évolution Temporelle'
};
const MODE_ICONS = {
  CHILD: '👶', SIBLING: '👧👦', GRANDPARENT: '👵👴',
  UNCLE_AUNT: '👨‍👩‍👦', COUSIN: '🧑‍🤝‍🧑', PREGNANCY: '🤰', EVOLUTION: '⏳'
};
const EYE_COLORS = ['Marron','Noisette','Vert','Bleu','Gris','Ambre'];

let state = {
  apiKey: localStorage.getItem('studio_gen_api_key') || '',
  apiKeyValid: !!localStorage.getItem('studio_gen_api_key'),
  view: 'home', // 'home' | 'lab' | 'gallery'
  activeMode: APP_MODES.PREGNANCY,
  parent1: null, parent2: null,
  results: [], isGenerating: false, generatingStep: 0,
  selectedSex: 'female',
  selectedEyeColor: 'Marron',
  siblingChoice: { brother: true, sister: false },
  siblingAges: { brother: 5, sister: 5 },
  familySide: 'mother',
  gpAges: { grandpa: 70, grandma: 68 },
  relationChoice: { male: true, female: true },
  relationAges: { male: 30, female: 30 },
  familyResemblance: 50,
  dominance: 50,
  childAge: 5,
  pregnancyStep: 1,
  pregMonth: 3,
  weightGain: 2.5,
  initialWeight: 60,
  initialCupSize: 'B',
  initialBust: 90,
  initialThigh: 55,
  pelvisWidening: 1,
  breastVolume: 1,
  breastfeedingPrep: false,
  morphoIntensity: 1,
  stretchIntensity: 0,
  stretchZones: ['Ventre'],
  evolutionAgeInput: '18 mois',
};

// ===================== HELPERS =====================
function el(tag, attrs={}, ...children) {
  const e = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs)) {
    if (k === 'class') e.className = v;
    else if (k === 'style') Object.assign(e.style, v);
    else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
    else e.setAttribute(k, v);
  }
  for (const c of children.flat()) {
    if (c == null) continue;
    if (typeof c === 'string' || typeof c === 'number') e.appendChild(document.createTextNode(c));
    else e.appendChild(c);
  }
  return e;
}

function html(strings, ...values) {
  const d = document.createElement('div');
  d.innerHTML = strings.reduce((acc, str, i) => acc + str + (values[i]??''), '');
  return d.firstElementChild || d;
}

function h(tag, cls, ...children) { return el(tag, {class:cls}, ...children); }

function weightMapForMonth(m) {
  const map = {1:0.5,2:1,3:2.5,4:5,5:8,6:11,7:13,8:15,9:18};
  return map[m] || 0;
}

// ===================== COMPONENTS =====================
function Slider(label, value, min, max, onChange, opts={}) {
  const { suffix='', labels=null } = opts;
  const wrap = el('div', {class:'space-y-2'});
  const row = el('div', {class:'flex justify-between items-center px-1'});
  const lbl = el('label', {class:'text-xs text-gray-500 font-bold uppercase tracking-widest mono'}, label);
  const val = el('span', {class:'text-xs text-blue-400 mono'}, `${value}${suffix}`);
  row.append(lbl, val);

  const inp = el('input', {type:'range', min, max, value, class:''});
  inp.addEventListener('input', e => {
    val.textContent = e.target.value + suffix;
    onChange(parseInt(e.target.value));
  });

  wrap.append(row, inp);
  if (labels) {
    const labRow = el('div', {class:'flex justify-between px-1 mt-1'});
    labels.forEach(l => labRow.append(el('span', {class:'text-xs text-gray-600 uppercase font-bold mono'}, l)));
    wrap.append(labRow);
  }
  return wrap;
}

function ImageUploader(onUpload, image, placeholder) {
  const wrap = el('div', {class:'upload-zone'});
  const inp = el('input', {type:'file', accept:'image/*', style:{display:'none'}});
  wrap.append(inp);

  if (image) {
    const img = el('img', {src:image, alt:''});
    const overlay = el('div', {class:'upload-zone-overlay'});
    overlay.append(el('span', {class:'text-white text-xs font-bold uppercase tracking-widest'}, 'Changer'));
    wrap.append(img, overlay);
  } else {
    wrap.append(
      el('div', {class:'text-2xl opacity-40 mb-1'}, '📸'),
      el('span', {class:'text-xs text-gray-500 font-bold uppercase tracking-tight mono'}, placeholder),
      el('span', {class:'text-xs text-gray-700 mono mt-1'}, 'PNG / JPG')
    );
  }

  inp.addEventListener('change', e => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => onUpload(ev.target.result);
    reader.readAsDataURL(file);
  });
  wrap.addEventListener('click', () => inp.click());
  return wrap;
}

function TagButton(label, active, onClick) {
  const btn = el('button', {class:`tag-btn${active?' active':''}`}, label);
  btn.addEventListener('click', onClick);
  return btn;
}

function SexButton(emoji, label, active, onClick) {
  const btn = el('button', {class:`sex-btn${active?' active':''}`});
  btn.append(el('span', {class:'text-xl'}, emoji), el('span', {class:'text-xs font-bold uppercase tracking-widest'}, label));
  btn.addEventListener('click', onClick);
  return btn;
}

// ===================== GENERATE =====================
async function callGeminiAPI(prompt, p1, p2) {
  const parts = [{ text: prompt }];
  if (p1) parts.push({ inlineData: { data: p1.split(',')[1], mimeType: 'image/jpeg' } });
  if (p2) parts.push({ inlineData: { data: p2.split(',')[1], mimeType: 'image/jpeg' } });

  const body = {
    contents: [{ parts }],
    generationConfig: {}
  };

  const model = 'gemini-2.0-flash-preview-image-generation';
  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${state.apiKey}`,
    { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) }
  );

  if (!res.ok) {
    const err = await res.json().catch(()=>({}));
    if (res.status === 400 || res.status === 403) throw new Error('API_KEY_ERROR');
    throw new Error(err.error?.message || 'Génération échouée');
  }

  const data = await res.json();
  const images = [];
  for (const part of (data.candidates?.[0]?.content?.parts || [])) {
    if (part.inlineData) images.push(`data:image/png;base64,${part.inlineData.data}`);
  }
  if (!images.length) throw new Error('Aucune image générée.');
  return images;
}

function buildPrompt() {
  const s = state;
  const resemblanceLabel = s.familyResemblance < 33 ? "FAIBLE (éloignée, subtile)" : s.familyResemblance < 66 ? "RÉALISTE (naturelle, standard)" : "FORTE (mâchoire, yeux, nez, expressions très marqués)";
  const resemblanceRule = `RÈGLE DE RESSEMBLANCE : Intensité ${resemblanceLabel} (${s.familyResemblance}%). Le lien génétique doit être identifiable sans jamais être un clone. INTERDICTION FORMELLE DU CLONAGE.`;
  const common = `QUALITÉ : ultra-photoréaliste 4K. FORMAT : portrait 9:16. IMAGE UNIQUE : Ne jamais générer de collages.`;
  const sexLabel = s.selectedSex === 'female' ? "Fille / Femme (XX)" : "Garçon / Homme (XY)";

  switch (s.activeMode) {
    case APP_MODES.EVOLUTION:
      return `MODE : ÉVOLUTION TEMPORELLE ADN
RÈGLE ABSOLUE : L'âge indiqué est PRIORITAIRE et DOIT être respecté strictement.
PARAMÈTRES :
- Âge exact : ${s.evolutionAgeInput}
- Sexe biologique : ${sexLabel}
- Couleur des yeux : ${s.selectedEyeColor}
ADAPTATIONS OBLIGATOIRES SELON L'ÂGE :
- Morphologie corporelle réaliste correspondant EXACTEMENT à l'âge indiqué
- Taille, proportions, posture, motricité adaptées
- Structure faciale et osseuse cohérente
- Cheveux : longueur, densité et implantation réalistes selon l'âge
- Texture de peau adaptée à l'âge
IDENTITÉ : Conserver rigoureusement l'identité de la personne en photo source.
SORTIE : PNG, Format 9:16, Ultra-réalisme humain 4K`;

    case APP_MODES.SIBLING:
      return `BIOLOGIE FRATRIE : Génère EXACTEMENT 3 IMAGES DISTINCTES.
1. IMAGE DE GROUPE : Frère (${s.siblingAges.brother} ans, XY) et Sœur (${s.siblingAges.sister} ans, XX) ensemble.
2. INDIVIDUEL : Le frère seul (XY, 9:16).
3. INDIVIDUEL : La sœur seule (XX, 9:16).
${resemblanceRule} ${common}`;

    case APP_MODES.GRANDPARENT: {
      const persons = [];
      if (s.relationChoice.male) persons.push(`Grand-père (${s.gpAges.grandpa} ans, XY)`);
      if (s.relationChoice.female) persons.push(`Grand-mère (${s.gpAges.grandma} ans, XX)`);
      const lien = s.familySide === 'mother' ? 'MATERNELLE' : 'PATERNELLE';
      const instr = persons.length === 2
        ? `Génère EXACTEMENT 3 IMAGES DISTINCTES : 1. Individuel ${persons[0]}. 2. Individuel ${persons[1]}. 3. Image de groupe.`
        : `Génère 1 image INDIVIDUELLE : ${persons[0]}.`;
      return `VIEILLISSEMENT GÉNÉTIQUE - BRANCHE ${lien} : ${instr} ${resemblanceRule} ${common}`;
    }

    case APP_MODES.UNCLE_AUNT:
    case APP_MODES.COUSIN: {
      const roleM = s.activeMode === APP_MODES.UNCLE_AUNT ? "Oncle" : "Cousin";
      const roleF = s.activeMode === APP_MODES.UNCLE_AUNT ? "Tante" : "Cousine";
      const persons = [];
      if (s.relationChoice.male) persons.push(`${roleM} (${s.relationAges.male} ans, XY)`);
      if (s.relationChoice.female) persons.push(`${roleF} (${s.relationAges.female} ans, XX)`);
      const lien = s.familySide === 'mother' ? 'MATERNEL(LE)' : 'PATERNEL(LE)';
      const instr = persons.length === 2
        ? `Génère EXACTEMENT 3 IMAGES DISTINCTES : 1. Individuel ${persons[0]}. 2. Individuel ${persons[1]}. 3. Image de groupe.`
        : `Génère 1 image INDIVIDUELLE : ${persons[0]}.`;
      return `LOGIQUE FAMILY ${s.activeMode} BRANCHE ${lien} : ${instr} ${resemblanceRule} ${common}`;
    }

    case APP_MODES.PREGNANCY: {
      if (s.pregnancyStep === 3) {
        return `PROTOCOLE NAISSANCE : Génère DEUX IMAGES SÉPARÉES.
1. GROUPE : Mère + nouveau-né en maternité (Sexe : ${sexLabel}).
2. INDIVIDUEL : Le bébé seul (9:16 PNG, ${sexLabel}).
${common}`;
      }
      const thighGrowth = (s.weightGain * 0.45).toFixed(1);
      const pelvisV = s.pregMonth > 4 ? (s.pelvisWidening + 1) * 2.5 : 0;
      const breastVLabels = ['légère augmentation','augmentation naturelle','augmentation marquée'];
      const stretchLabels = ['aucune','légères','visibles','marquées'];
      return `BIOLOGIE GROSSESSE — COHÉRENCE GLOBALE STRICTE :
DONNÉES INITIALES : Poids ${s.initialWeight}kg, Tour poitrine ${s.initialBust}cm, Bonnet ${s.initialCupSize}, Tour cuisse ${s.initialThigh}cm.
STADE : Mois ${s.pregMonth}. GAIN DE POIDS TOTAL : +${s.weightGain}kg.
RÈGLE DE COHÉRENCE GLOBALE (STRICTE) : Le corps évolue comme un ensemble cohérent. Ventre↑, Cuisses↑, Bassin↑, Poitrine↑, Bras↑, Joues↑.
POITRINE : Augmentation volume ${breastVLabels[s.breastVolume]}. Préparation allaitement : ${s.breastfeedingPrep ? 'ACTIVÉE':'OFF'}.
DISTRIBUTION PHYSIOLOGIQUE :
- VENTRE (35%): Projection frontale massive, peau tendue.
- BASSIN & HANCHES (20%): Élargissement osseux (+${pelvisV}cm).
- CUISSES & FESSES (15%): Épaississement (+${thighGrowth}cm).
- POITRINE (15%), BRAS/DOS (10%), VISAGE (5%).
INTERDICTION : Poitrine figée, silhouette mince incohérente.
VERGETURES : ${s.stretchIntensity > 0 ? `${stretchLabels[s.stretchIntensity]} sur ${s.stretchZones.join(', ')}.` : 'AUCUNE.'}
Rendu individuel 9:16 PNG. ${common}`;
    }

    default: // CHILD
      return `IDENTITÉ GÉNÉTIQUE : Enfant de ${s.childAge} ans. Sexe : ${sexLabel}.
Dominance parentale : ${s.dominance}%.
Génère 1 image INDIVIDUELLE (9:16 PNG).
${resemblanceRule} ${common}`;
  }
}

function getResultLabel(idx, count) {
  const m = state.activeMode;
  if (m === APP_MODES.SIBLING) {
    if (idx === 0) return "PORTRAIT DE FRATRIE";
    if (idx === 1) return "INDIVIDUEL : LE FRÈRE";
    return "INDIVIDUEL : LA SŒUR";
  }
  if (m === APP_MODES.PREGNANCY && state.pregnancyStep === 3) {
    return idx === 0 ? "MÈRE + BÉBÉ" : "BÉBÉ SEUL";
  }
  if ([APP_MODES.GRANDPARENT, APP_MODES.UNCLE_AUNT, APP_MODES.COUSIN].includes(m)) {
    const roleM = m===APP_MODES.GRANDPARENT?"GRAND-PÈRE":m===APP_MODES.UNCLE_AUNT?"ONCLE":"COUSIN";
    const roleF = m===APP_MODES.GRANDPARENT?"GRAND-MÈRE":m===APP_MODES.UNCLE_AUNT?"TANTE":"COUSINE";
    const s = state;
    const selected = [];
    if (s.relationChoice.male) selected.push(roleM);
    if (s.relationChoice.female) selected.push(roleF);
    if (selected.length === 2) {
      if (idx === 0) return `INDIVIDUEL : ${selected[0]}`;
      if (idx === 1) return `INDIVIDUEL : ${selected[1]}`;
      return "IMAGE DE GROUPE";
    }
    return `INDIVIDUEL : ${selected[0]||'ADN'}`;
  }
  return `UNITÉ ADN #${idx+1}`;
}

// ===================== RENDER =====================
function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';
  if (!state.apiKeyValid) { app.append(renderApiKeyScreen()); return; }
  if (state.view === 'home') { app.append(renderHome()); return; }
  app.append(renderLab());
}

function renderApiKeyScreen() {
  const wrap = el('div', {class:'api-screen gradient-bg'});
  const card = el('div', {class:'glass', style:{maxWidth:'480px',width:'100%',padding:'2.5rem',borderRadius:'1.5rem'}});

  card.append(
    el('div', {style:{textAlign:'center',marginBottom:'2rem'}},
      el('div', {style:{fontSize:'3rem',marginBottom:'1rem'}}, '🧬'),
      el('h1', {style:{fontSize:'1.75rem',fontWeight:'800',textTransform:'uppercase',letterSpacing:'0.2em',marginBottom:'0.5rem'}}, 'STUDIO GÉNÉTIQUE'),
      el('p', {style:{color:'#6b7280',fontSize:'0.875rem'}}, 'Entrez votre clé API Google AI Studio pour commencer')
    )
  );

  const label = el('label', {style:{display:'block',fontSize:'0.625rem',color:'#3b82f6',fontWeight:'800',textTransform:'uppercase',letterSpacing:'0.2em',marginBottom:'0.5rem',fontFamily:'Space Mono, monospace'}}, 'Clé API Google AI Studio');
  const inp = el('input', {
    type:'password',
    placeholder:'AIza...',
    value: state.apiKey,
    style:{
      width:'100%',background:'rgba(0,0,0,0.4)',border:'1px solid rgba(255,255,255,0.1)',

    }

  inp.addEventListener('input', e => { state.apiKey = e.target.value; });

  const btn = el('button', {class:'gen-btn'}, 'ACCÉDER À L\'APPLICATION');
  btn.addEventListener('click', async () => {
    if (!state.apiKey.trim()) return alert('Veuillez entrer une clé API.');
    btn.disabled = true; btn.textContent = 'Vérification...';
    try {
      // Test rapide avec un prompt minimal
      const testRes = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${state.apiKey.trim()}`,
        { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({contents:[{parts:[{text:'Hi'}]}]}) }
      );
      if (!testRes.ok) throw new Error('Clé invalide');
      state.apiKey = state.apiKey.trim();
      localStorage.setItem('studio_gen_api_key', state.apiKey);
      state.apiKeyValid = true;
      render();
    } catch {
      alert('Clé API invalide ou sans permission. Vérifiez votre clé Google AI Studio.');
      btn.disabled = false; btn.textContent = 'ACCÉDER À L\'APPLICATION';
    }
  });

  const note = el('p', {style:{color:'#4b5563',fontSize:'0.7rem',textAlign:'center',marginTop:'1rem',lineHeight:'1.6'}},

  changeLink.addEventListener('click', () => { localStorage.removeItem('studio_gen_api_key'); state.apiKey=''; state.apiKeyValid=false; render(); });

  card.append(label, inp, btn, note, changeLink);

  return wrap;

  const uploaderSection = el('div');
  const m = state.activeMode;

  if ([APP_MODES.GRANDPARENT, APP_MODES.UNCLE_AUNT, APP_MODES.COUSIN].includes(m)) {
    uploaderSection.append(
      ImageUploader(img => { state.parent1=img; render(); }, state.parent1, state.familySide==='mother'?'Photo Mère':'Photo Père'),
      el('p', {style:{fontSize:'0.6rem',color:'#4b5563',fontStyle:'italic',textAlign:'center',marginTop:'0.5rem',fontFamily:'Space Mono'}}, 'Importez la photo du parent servant de lien direct.')

    uploaderSection.append(ImageUploader(img => { state.parent1=img; render(); }, state.parent1, m===APP_MODES.PREGNANCY?'Photo Mère':'Photo Source'));
  } else {
    const row = el('div', {style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0.75rem'}});
    row.append(
      ImageUploader(img => { state.parent1=img; render(); }, state.parent1, 'Mère'),
      ImageUploader(img => { state.parent2=img; render(); }, state.parent2, 'Père')
    );
    uploaderSection.append(row);
  }
  wrap.append(uploaderSection);

  // Params section
  const paramsSection = el('div', {style:{borderTop:'1px solid rgba(255,255,255,0.05)',paddingTop:'1rem',overflowY:'auto',maxHeight:'55vh',display:'flex',flexDirection:'column',gap:'1.25rem'}});

  // Mode-specific params
  if ([APP_MODES.CHILD, APP_MODES.PREGNANCY, APP_MODES.COUSIN].includes(m)) paramsSection.append(renderSexSelector());
  if (m === APP_MODES.EVOLUTION) paramsSection.append(renderEvolutionParams());
  if (m === APP_MODES.GRANDPARENT) paramsSection.append(renderFamilyMemberControls('Grand-Père','Grand-Mère'));
  if (m === APP_MODES.UNCLE_AUNT) paramsSection.append(renderFamilyMemberControls('Oncle','Tante'));
  if (m === APP_MODES.COUSIN) paramsSection.append(renderFamilyMemberControls('Cousin','Cousine'));
  if (m === APP_MODES.SIBLING) paramsSection.append(renderSiblingParams());
  if (m === APP_MODES.CHILD) paramsSection.append(renderChildParams());
  if (m === APP_MODES.PREGNANCY) paramsSection.append(renderPregnancyParams());

  wrap.append(paramsSection);

  // Generate button
  const btnText = state.pregnancyStep === 3 ? 'Générer la Naissance' : "Générer l'Identité";
  const genBtn = el('button', {class:'gen-btn'});

  if (state.isGenerating) {
    genBtn.disabled = true;
    const spinner = el('span', {style:{display:'inline-block',width:'1rem',height:'1rem',border:'2px solid #4b5563',borderTopColor:'transparent',borderRadius:'50%',animation:'spin-slow 0.8s linear infinite',marginRight:'0.5rem',verticalAlign:'middle'}});
    genBtn.append(spinner, 'Séquençage...');
    genBtn.style.background='#1f2937'; genBtn.style.color='#4b5563';
  } else {
    genBtn.textContent = btnText;
    genBtn.addEventListener('click', handleGenerate);
  }

  // Birth button
  if (m === APP_MODES.PREGNANCY && state.pregnancyStep === 2) {
    const birthBtn = el('button', {style:{
      width:'100%',padding:'1rem',background:'rgba(34,197,94,0.1)',color:'#86efac',

    birthBtn.addEventListener('click', () => { state.pregnancyStep=3; render(); });
    wrap.append(birthBtn);
  }

  wrap.append(genBtn);
  return wrap;
}

function renderStretchMarks() {
  const wrap = el('div', {class:'panel-block', style:{display:'flex',flexDirection:'column',gap:'1rem'}});
  wrap.append(Slider('Intensité des vergetures', state.stretchIntensity, 0, 3, v => { state.stretchIntensity=v; render(); }, {labels:['Aucune','Légères','Moyennes','Marquées']}));
  if (state.stretchIntensity > 0) {
    const zoneWrap = el('div', {style:{paddingTop:'0.5rem',display:'flex',flexDirection:'column',gap:'0.5rem'}});
    zoneWrap.append(el('label', {style:{fontSize:'0.625rem',color:'#6b7280',fontWeight:'800',textTransform:'uppercase',letterSpacing:'0.15em',fontFamily:'Space Mono'}}, 'Zones actives'));
    const zones = el('div', {style:{display:'flex',flexWrap:'wrap',gap:'0.5rem'}});
    ['Ventre','Hanches','Cuisses','Fesses','Dos','Poitrine'].forEach(z => {
      zones.append(TagButton(z, state.stretchZones.includes(z), () => {
        state.stretchZones = state.stretchZones.includes(z) ? state.stretchZones.filter(x=>x!==z) : [...state.stretchZones,z];
        render();
      }));
    });
    zoneWrap.append(zones);
    wrap.append(zoneWrap);
  }
  return wrap;
}

function renderResults() {
  const wrap = el('div', {class:'glass', style:{borderRadius:'1.5rem',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'flex-start',overflowY:'auto',border:'2px solid rgba(255,255,255,0.05)',minHeight:'500px',padding:'1.5rem',scrollbarWidth:'none'}});

  if (state.isGenerating) {
    wrap.append(renderProgressView());
  } else if (state.results.length > 0) {
    const grid = el('div', {style:{width:'100%',display:'grid',gridTemplateColumns:state.results.length===1?'1fr':'1fr 1fr',gap:'1.5rem',animation:'fade-in 0.7s ease forwards'}});
    state.results.forEach((imgSrc, idx) => {
      const imgWrap = el('div', {class:'result-img-wrap', style:state.results.length===1?{maxWidth:'28rem',margin:'0 auto'}:{}});
      const img = el('img', {src:imgSrc, alt:''});
      const overlay = el('div', {class:'result-overlay'});
      const dlBtn = el('button', {style:{background:'#fff',color:'#000',padding:'0.75rem 1.5rem',borderRadius:'9999px',border:'none',cursor:'pointer',display:'flex',alignItems:'center',gap:'0.5rem',fontWeight:'800',fontFamily:'Syne',transition:'all 0.2s'}});
      dlBtn.append(el('span',{style:{fontSize:'1.25rem'}},'⬇️'), el('span',{style:{fontSize:'0.75rem',textTransform:'uppercase',letterSpacing:'0.1em'}},'Download'));
      dlBtn.addEventListener('click', () => {
        const a = document.createElement('a');
        a.href = imgSrc;
        a.download = `studio_genetique_${state.activeMode}_${idx}.png`;
        a.click();
      });
      overlay.append(dlBtn);
      imgWrap.append(img, overlay);
      imgWrap.append(el('div', {class:'result-label'}, getResultLabel(idx, state.results.length)));
      grid.append(imgWrap);
    });
    wrap.append(grid);
  } else {
    const empty = el('div', {style:{flex:'1',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',textAlign:'center',gap:'1rem',padding:'3rem',opacity:'0.5',height:'100%'}});
    empty.append(
      el('div', {style:{fontSize:'4rem',marginBottom:'1.5rem',filter:'grayscale(1)'}}, '🧬'),
      el('h2', {style:{fontSize:'1.25rem',fontWeight:'300',color:'#9ca3af',textTransform:'uppercase',letterSpacing:'0.2em'}}, 'STATION ADN'),
      el('p', {style:{color:'#4b5563',fontSize:'0.875rem',maxWidth:'20rem',lineHeight:'1.6',fontStyle:'italic'}}, '"Aucune optimisation esthétique. La génétique prime sur tout."')
    );
    wrap.append(empty);
  }
  return wrap;
}

function renderProgressView() {
  const steps = [
    "Numérisation de l'ADN Visage","Identification des traits dominants",
    "Simulation de la structure osseuse","Application de la pigmentation épidermique",
    "Vérification de la continuité génétique","Finalisation du rendu photoréaliste"
  ];
  const wrap = el('div', {style:{display:'flex',flexDirection:'column',alignItems:'center',gap:'2rem',padding:'3rem',width:'100%',maxWidth:'28rem'}});

  const iconWrap = el('div', {style:{position:'relative',width:'8rem',height:'8rem',display:'flex',alignItems:'center',justifyContent:'center'}});
  const ping = el('div', {style:{position:'absolute',inset:'0',border:'4px solid rgba(59,130,246,0.2)',borderRadius:'50%',animation:'ping 1.5s cubic-bezier(0,0,0.2,1) infinite'}});
  const pulse = el('div', {style:{position:'absolute',inset:'0',border:'2px solid rgba(59,130,246,0.4)',borderRadius:'50%',animation:'pulse 2s infinite'}});
  const dna = el('div', {style:{fontSize:'2.5rem'}}, '🧬');
  iconWrap.append(ping, pulse, dna);

  const barWrap = el('div', {style:{width:'100%'}});
  const bar = el('div', {style:{height:'4px',background:'rgba(255,255,255,0.05)',borderRadius:'4px',overflow:'hidden',marginBottom:'1rem'}});
  const progress = el('div', {class:'progress-bar-inner', style:{width:`${((state.generatingStep+1)/steps.length)*100}%`}});
  bar.append(progress);

  const stepText = el('p', {style:{fontSize:'0.875rem',fontWeight:'700',color:'#e5e7eb',textAlign:'center',animation:'pulse 2s infinite',marginBottom:'0.25rem'}}, steps[state.generatingStep]+'...');
  const idText = el('p', {style:{fontSize:'0.6rem',color:'#4b5563',fontFamily:'Space Mono',textAlign:'center'}}, `ID_SESSION: ${Math.random().toString(36).substr(2,9).toUpperCase()}`);
  barWrap.append(bar, stepText, idText);

  wrap.append(iconWrap, barWrap);
  return wrap;
}

// ===================== EVENT HANDLER =====================
async function handleGenerate() {
  const m = state.activeMode;
  if ([APP_MODES.SIBLING, APP_MODES.CHILD].includes(m) && (!state.parent1||!state.parent2)) return alert("Photos des deux parents obligatoires.");
  if ([APP_MODES.GRANDPARENT, APP_MODES.UNCLE_AUNT, APP_MODES.COUSIN].includes(m) && !state.parent1) return alert("Photo du parent obligatoire.");
  if ([APP_MODES.PREGNANCY, APP_MODES.EVOLUTION].includes(m) && !state.parent1) return alert("Photo source obligatoire.");

  state.isGenerating = true;
  state.results = [];
  state.generatingStep = 0;
  render();

  // Progress simulation
  const interval = setInterval(() => {
    state.generatingStep = (state.generatingStep + 1) % 6;
    const stepEl = document.querySelector('.progress-bar-inner');
    if (stepEl) stepEl.style.width = `${((state.generatingStep+1)/6)*100}%`;
  }, 2500);

  try {
    const prompt = buildPrompt();
    const images = await callGeminiAPI(prompt, state.parent1, state.parent2);
    state.results = images;
    if (m === APP_MODES.PREGNANCY && state.pregnancyStep === 1) state.pregnancyStep = 2;
  } catch (err) {
    if (err.message === 'API_KEY_ERROR') {
      alert('Clé API invalide ou expirée. Veuillez en changer.');
      localStorage.removeItem('studio_gen_api_key');
      state.apiKeyValid = false;
    } else {
      alert('La génération a échoué : ' + err.message);
    }
  } finally {
    clearInterval(interval);
    state.isGenerating = false;
    render();
  }
}

// ===================== INIT =====================
render();
