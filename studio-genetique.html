<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>STUDIO GÉNÉTIQUE</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #3b82f6;
      --blue-dim: rgba(59,130,246,0.12);
      --blue-border: rgba(59,130,246,0.25);
      --surface: rgba(255,255,255,0.03);
      --border: rgba(255,255,255,0.07);
      --amber: #f59e0b;
      --bg: #080810;
      --font: 'Syne', sans-serif;
      --mono: 'Space Mono', monospace;
      --sb: env(safe-area-inset-bottom, 0px);
      --st: env(safe-area-inset-top, 0px);
    }

    html, body {
      font-family: var(--font);
      background: var(--bg);
      color: #f0f0f8;
      height: 100%;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
      -webkit-font-smoothing: antialiased;
    }

    #app { min-height: 100vh; }

    .glass {
      background: var(--surface);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
    }

    /* SCROLLBARS */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

    /* RANGE INPUT */
    input[type=range] {
      -webkit-appearance: none;
      width: 100%; height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 6px; outline: none; cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 24px; height: 24px;
      border-radius: 50%;
      background: var(--blue);
      box-shadow: 0 0 10px rgba(59,130,246,0.5);
    }
    input[type=range]::-moz-range-thumb {
      width: 24px; height: 24px;
      border-radius: 50%;
      background: var(--blue); border: none;
    }

    /* ANIMATIONS */
    @keyframes spin      { to { transform: rotate(360deg); } }
    @keyframes bounce-s  { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    @keyframes fadein    { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
    @keyframes ping      { 0%{transform:scale(1);opacity:1} 75%,100%{transform:scale(2);opacity:0} }
    @keyframes pulse     { 0%,100%{opacity:1} 50%{opacity:.45} }
    @keyframes slidein   { from{transform:translateX(-100%)} to{transform:translateX(0)} }

    /* BUTTON RESET */
    button { font-family: var(--font); cursor: pointer; -webkit-appearance: none; }
    button:active { opacity: .85; }

    /* GENERATE BTN */
    .btn-gen {
      width: 100%; padding: 1.1rem;
      background: #fff; color: #000;
      font-weight: 800; font-size: .9rem;
      letter-spacing: .12em; text-transform: uppercase;
      border: none; border-radius: 1rem;
      transition: background .2s, transform .1s;
    }
    .btn-gen:active  { transform: scale(.98); }
    .btn-gen:disabled { background: #1f2937; color: #4b5563; cursor: not-allowed; }

    /* MODE BTN */
    .btn-mode {
      display: flex; align-items: center; gap: .75rem;
      width: 100%; padding: .9rem 1rem;
      border-radius: .9rem; border: 1px solid transparent;
      background: transparent; color: #9ca3af;
      font-size: .9rem; font-weight: 600;
      transition: all .2s; text-align: left;
    }
    .btn-mode.active { background: var(--blue-dim); color: var(--blue); border-color: var(--blue-border); }

    /* TAG BTN */
    .tag-btn {
      padding: .45rem .85rem;
      border-radius: .55rem;
      font-size: .65rem; font-weight: 700; text-transform: uppercase;
      border: 1px solid rgba(255,255,255,0.1);
      background: transparent; color: #6b7280;
      transition: all .2s; font-family: var(--mono);
      min-height: 38px;
    }
    .tag-btn.active { background: var(--blue-dim); border-color: var(--blue); color: var(--blue); }

    /* SEX BTN */
    .sex-btn {
      flex: 1; padding: 1rem .5rem;
      border-radius: .9rem; border: 2px solid rgba(255,255,255,0.07);
      background: transparent; color: #6b7280;
      display: flex; flex-direction: column; align-items: center; gap: .3rem;
      transition: all .2s; min-height: 74px;
    }
    .sex-btn.active { background: var(--blue-dim); border-color: var(--blue); color: var(--blue); box-shadow: 0 0 18px rgba(59,130,246,0.18); }

    /* PANELS */
    .panel      { padding: 1rem; background: rgba(255,255,255,0.03); border-radius: 1rem; border: 1px solid rgba(255,255,255,0.06); }
    .panel-blue { padding: 1rem; background: rgba(59,130,246,0.05); border-radius: 1rem; border: 1px solid rgba(59,130,246,0.15); }

    .section-label {
      display: block;
      font-size: .6rem; color: var(--blue); font-weight: 800;
      text-transform: uppercase; letter-spacing: .18em;
      font-family: var(--mono); margin-bottom: .6rem;
    }

    /* UPLOAD ZONE */
    .upload-zone {
      aspect-ratio: 1;
      border-radius: 1rem; border: 2px dashed rgba(255,255,255,0.12);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      cursor: pointer; overflow: hidden; position: relative;
      transition: border-color .2s; background: rgba(255,255,255,0.02);
      min-height: 90px;
    }
    .upload-zone:active { border-color: var(--blue); }
    .upload-zone img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; }
    .upload-ov {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.55);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity .2s;
    }
    .upload-zone:active .upload-ov,
    .upload-zone:hover  .upload-ov { opacity: 1; }

    /* RESULT CARD */
    .result-card { position: relative; border-radius: 1rem; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 16px 48px rgba(0,0,0,.5); }
    .result-card img { width: 100%; display: block; }
    .result-label {
      position: absolute; top: .75rem; left: .75rem;
      background: rgba(0,0,0,0.65); backdrop-filter: blur(6px);
      padding: .2rem .6rem; border-radius: 9999px;
      font-size: .55rem; font-weight: 700; color: var(--blue);
      text-transform: uppercase; letter-spacing: .1em;
      border: 1px solid rgba(255,255,255,0.1); font-family: var(--mono);
    }
    .result-dl {
      position: absolute; bottom: .75rem; right: .75rem;
      background: rgba(255,255,255,0.92); color: #000;
      border: none; border-radius: .65rem; padding: .5rem .9rem;
      font-size: .7rem; font-weight: 800; display: flex; align-items: center; gap: .35rem;
    }
    .result-dl:active { transform: scale(.95); }

    /* HEADER */
    .app-header {
      height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 1rem;
      padding-top: var(--st);
      height: calc(56px + var(--st));
      background: rgba(8,8,16,0.97);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }

    /* BOTTOM NAV */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
      background: rgba(8,8,16,0.97);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex;
      padding-bottom: var(--sb);
    }
    .bottom-nav-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: .2rem;
      padding: .65rem .5rem;
      background: none; border: none; color: #6b7280;
      font-size: .58rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .08em;
      font-family: var(--mono); transition: color .2s;
    }
    .bottom-nav-btn.active { color: var(--blue); }
    .bottom-nav-btn .nav-icon { font-size: 1.25rem; }

    /* DRAWER */
    .drawer-backdrop {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(4px);
    }
    .drawer {
      position: fixed; top: 0; left: 0; bottom: 0; z-index: 201;
      width: min(84vw, 300px);
      background: #0c0c18;
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      padding: 1rem;
      padding-top: calc(1rem + var(--st));
      padding-bottom: calc(1rem + var(--sb));
      overflow-y: auto;
      animation: slidein .3s cubic-bezier(.16,1,.3,1) forwards;
    }

    /* PROGRESS */
    .prog-bar  { height: 4px; background: rgba(255,255,255,.07); border-radius: 4px; overflow: hidden; }
    .prog-fill { height: 100%; background: var(--blue); border-radius: 4px; transition: width 1s ease-in-out; }

    /* AMBER NOTE */
    .amber-note {
      padding: .75rem 1rem;
      border-left: 2px solid rgba(245,158,11,.5);
      background: rgba(245,158,11,.05);
      border-radius: 0 .65rem .65rem 0;
    }

    /* DESKTOP OVERRIDES */
    @media (min-width: 768px) {
      .bottom-nav  { display: none; }
      .mobile-only { display: none !important; }

      .lab-shell {
        display: grid;
        grid-template-columns: 230px 1fr;
        height: calc(100vh - calc(56px + var(--st)));
        overflow: hidden;
      }
      .desktop-sidebar {
        border-right: 1px solid var(--border);
        overflow-y: auto;
        padding: 1rem;
        background: #0a0a0f;
        display: flex;
        flex-direction: column;
      }
      .desktop-main {
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        padding: 1.5rem;
      }
      .lab-grid {
        display: grid;
        grid-template-columns: 1fr 1.65fr;
        gap: 1.5rem;
        align-items: start;
      }
      .controls-scroll { max-height: calc(100vh - 160px); overflow-y: auto; }
      .results-min { min-height: 480px; }
    }

    @media (min-width: 1024px) {
      .lab-shell { grid-template-columns: 260px 1fr; }
    }
  </style>
</head>
<body>
<div id="app"></div>

<script>
/* ════════════════════════════════════════
   CONSTANTS
════════════════════════════════════════ */
const M = { PREGNANCY:'PREGNANCY', CHILD:'CHILD', SIBLING:'SIBLING', GRANDPARENT:'GRANDPARENT', UNCLE_AUNT:'UNCLE_AUNT', COUSIN:'COUSIN', EVOLUTION:'EVOLUTION' };
const MLABELS = { PREGNANCY:'Mode Grossesse', CHILD:'Enfant', SIBLING:'Frères & Sœurs', GRANDPARENT:'Grands-Parents', UNCLE_AUNT:'Oncles / Tantes', COUSIN:'Cousins / Cousines', EVOLUTION:'Évolution Temporelle' };
const MICONS  = { PREGNANCY:'🤰', CHILD:'👶', SIBLING:'👧👦', GRANDPARENT:'👵👴', UNCLE_AUNT:'👨‍👩‍👦', COUSIN:'🧑‍🤝‍🧑', EVOLUTION:'⏳' };
const EYES    = ['Marron','Noisette','Vert','Bleu','Gris','Ambre'];
const WMAP    = {1:.5,2:1,3:2.5,4:5,5:8,6:11,7:13,8:15,9:18};

/* ════════════════════════════════════════
   STATE
════════════════════════════════════════ */
let S = {
  apiKey: localStorage.getItem('sg_key')||'', apiOk: !!localStorage.getItem('sg_key'),
  screen: 'home', drawer: false, mode: M.PREGNANCY,
  p1: null, p2: null, results: [], generating: false, step: 0,
  sex: 'female', eye: 'Marron',
  sibC: {b:true,s:false}, sibA: {b:5,s:5},
  fSide: 'mother',
  gpA: {gp:70,gm:68},
  relC: {m:true,f:true}, relA: {m:30,f:30},
  resem: 50, dom: 50, cAge: 5,
  pregStep: 1, pregMo: 3, wGain: 2.5,
  iWt: 60, cup: 'B', iBust: 90, iThigh: 55,
  pelvis: 1, bVol: 1, bfPrep: false,
  strInt: 0, strZones: ['Ventre'],
  evoAge: '18 mois',
  isTwins: false,
  twinSexA: 'female',
  twinSexB: 'female',
  twinType: 'fraternels',
};

/* ════════════════════════════════════════
   HELPERS
════════════════════════════════════════ */
function el(tag, p={}, ...kids) {
  const e = document.createElement(tag);
  for (const [k,v] of Object.entries(p)) {
    if (k==='class') e.className = v;
    else if (k==='style') (typeof v==='string' ? e.style.cssText=v : Object.assign(e.style,v));
    else if (k==='html') e.innerHTML = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
    else e.setAttribute(k, v);
  }
  for (const c of kids.flat()) {
    if (c==null||c===false) continue;
    e.appendChild(typeof c==='string'||typeof c==='number' ? document.createTextNode(c) : c);
  }
  return e;
}

const $ = id => document.getElementById(id);
const div  = (cls, ...k) => el('div',  {class:cls}, ...k);
const span = (cls, ...k) => el('span', {class:cls}, ...k);

function render() {
  const app = $('app');
  app.innerHTML = '';
  if (!S.apiOk)          { app.append(pageApiKey()); return; }
  if (S.screen==='home') { app.append(pageHome());   return; }
  app.append(pageLab());
}

/* ════════════════════════════════════════
   PAGE: API KEY
════════════════════════════════════════ */
function pageApiKey() {
  const wrap = el('div',{style:'min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.25rem;background:radial-gradient(ellipse 80% 50% at 70% -10%,rgba(59,130,246,.08),transparent 60%),#080810'});
  const card = el('div',{class:'glass',style:'width:100%;max-width:430px;padding:2rem;border-radius:1.5rem'});

  const top = el('div',{style:'text-align:center;margin-bottom:1.75rem'});
  top.append(
    el('div',{style:'font-size:3rem;margin-bottom:.75rem'},'🧬'),
    el('h1',{style:'font-size:1.5rem;font-weight:800;text-transform:uppercase;letter-spacing:.18em;margin-bottom:.4rem'},'STUDIO GÉNÉTIQUE'),
    el('p',{style:'color:#6b7280;font-size:.85rem;line-height:1.5'},'Entrez votre clé API Google AI Studio')
  );

  const lbl = el('label',{style:'display:block;font-size:.6rem;color:var(--blue);font-weight:800;text-transform:uppercase;letter-spacing:.18em;margin-bottom:.5rem;font-family:var(--mono)'},'Clé API Google AI Studio');

  const inp = el('input',{type:'password', placeholder:'AIza...', value:S.apiKey,
    style:'width:100%;background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.1);border-radius:.85rem;padding:1rem;color:#fff;font-size:.95rem;outline:none;font-family:var(--mono);display:block;margin-bottom:1rem',
    onInput: e=>{ S.apiKey=e.target.value; },
    onFocus: e=>{ e.target.style.borderColor='var(--blue)'; },
    onBlur:  e=>{ e.target.style.borderColor='rgba(255,255,255,.1)'; }
  });

  const btn = el('button',{class:'btn-gen',style:'margin-bottom:.75rem'},"ACCÉDER À L'APPLICATION");
  btn.addEventListener('click', ()=>{
    const key = S.apiKey.trim();
    if (!key) { alert('Veuillez entrer une clé API.'); return; }
    if (!key.startsWith('AIza')) { alert('Format invalide. La clé doit commencer par "AIza".'); return; }
    S.apiKey = key;
    localStorage.setItem('sg_key', key);
    S.apiOk = true;
    render();
  });

  const note = el('p',{style:'color:#4b5563;font-size:.67rem;text-align:center;line-height:1.6;font-family:var(--mono)'},'🔒 Stockée localement, jamais partagée. Générations décomptées sur votre compte Google AI Studio.');

  card.append(top,lbl,inp,btn,note);
  wrap.append(card);
  return wrap;
}

/* ════════════════════════════════════════
   PAGE: HOME
════════════════════════════════════════ */
function pageHome() {
  const wrap = el('div',{style:'min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem 1.25rem;background:radial-gradient(ellipse 80% 50% at 70% -10%,rgba(59,130,246,.08),transparent 60%),#080810'});
  const inner = el('div',{style:'width:100%;max-width:860px;text-align:center'});

  inner.append(
    el('h1',{style:'font-size:clamp(2.2rem,9vw,5rem);font-weight:900;text-transform:uppercase;letter-spacing:.18em;line-height:1.05;margin-bottom:1.25rem'},'STUDIO\nGÉNÉTIQUE'),
    el('div',{style:'font-size:clamp(3rem,10vw,4.5rem);margin:1rem auto;animation:bounce-s 4s ease-in-out infinite'},'🧬'),
    el('p',{style:'color:#d1d5db;font-size:clamp(.85rem,2.5vw,1.05rem);font-weight:300;line-height:1.7;max-width:540px;margin:0 auto .85rem'},'Créez chaque membre de la famille en respectant les traits génétiques.'),
    el('p',{style:'color:#6b7280;font-size:.82rem;max-width:420px;margin:0 auto 1.75rem;line-height:1.6'},"À partir de photos et de paramètres, générez des visages cohérents, évolutifs et crédibles.")
  );

  const grid = el('div',{style:'display:grid;grid-template-columns:repeat(2,1fr);gap:.7rem;margin-bottom:1.75rem;max-width:500px;margin-left:auto;margin-right:auto'});
  [{i:'🧒',t:'Enfants & bébés',d:'Âge réel, morphologie crédible'},{i:'👨‍👩‍👧',t:'Fratrie & famille',d:'Ressemblance contrôlée'},{i:'🤰',t:'Grossesse',d:'Transformation mois par mois'},{i:'👵',t:'Générations',d:'Traits familiaux cohérents'}].forEach(f=>{
    const c = el('div',{class:'glass',style:'padding:1rem;border-radius:1.1rem;text-align:center'});
    c.append(el('div',{style:'font-size:1.65rem;margin-bottom:.4rem'},f.i), el('h3',{style:'font-size:.65rem;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:.07em;margin-bottom:.2rem'},f.t), el('p',{style:'font-size:.6rem;color:#6b7280'},f.d));
    grid.append(c);
  });
  inner.append(grid);

  const cta = el('button',{
    style:'padding:1.1rem 2.5rem;background:#f59e0b;color:#000;font-weight:900;text-transform:uppercase;letter-spacing:.18em;border-radius:1rem;border:none;font-size:.92rem;width:100%;max-width:320px;box-shadow:0 0 28px rgba(245,158,11,.2);font-family:var(--font)',
    onClick:()=>{ S.screen='lab'; S.results=[]; render(); }
  },'JE CRÉE MA FAMILLE');

  const keyBtn = el('button',{
    style:'display:block;margin:.85rem auto 0;color:#4b5563;font-size:.68rem;background:none;border:none;text-decoration:underline;font-family:var(--mono)',
    onClick:()=>{ localStorage.removeItem('sg_key'); S.apiKey=''; S.apiOk=false; render(); }
  },'🔑 Changer de clé API');

  inner.append(cta, keyBtn);
  wrap.append(inner);
  return wrap;
}

/* ════════════════════════════════════════
   PAGE: LAB
════════════════════════════════════════ */
function pageLab() {
  const root = el('div',{style:'display:flex;flex-direction:column;height:100vh;overflow:hidden'});
  root.append(buildHeader());

  // Shell: desktop = sidebar+main grid, mobile = single scroll column
  const shell = el('div',{id:'shell',style:'flex:1;overflow:hidden;display:flex'});

  // Desktop sidebar (hidden on mobile via class + JS)
  const dSide = el('div',{id:'dside',style:'display:none;flex-direction:column'});
  dSide.append(buildSidebarContent());
  shell.append(dSide);

  // Main area
  const main = el('div',{id:'main-area',style:'flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:1rem 1rem calc(72px + var(--sb));'});
  main.append(buildLabMain());
  shell.append(main);

  root.append(shell);

  // Drawer overlay (mobile)
  if (S.drawer) root.append(buildDrawer());

  // Bottom nav (mobile only)
  root.append(buildBottomNav());

  // Apply desktop layout after mount
  requestAnimationFrame(applyDesktopLayout);
  window.addEventListener('resize', applyDesktopLayout, {once:true});

  return root;
}

function applyDesktopLayout() {
  const shell=$('shell'), dside=$('dside'), main=$('main-area'), labGrid=$('lab-grid');
  if (!shell) return;
  if (window.innerWidth >= 768) {
    shell.className = 'lab-shell';
    if (dside) { dside.style.display='flex'; dside.className='desktop-sidebar'; }
    if (main)  { main.style.padding='1.5rem 1.5rem 2rem'; }
    if (labGrid) { labGrid.className='lab-grid'; labGrid.style.cssText=''; }
  } else {
    shell.className = '';
    shell.style.cssText = 'flex:1;overflow:hidden;display:flex';
    if (dside) dside.style.display = 'none';
    if (main)  main.style.padding = '1rem 1rem calc(72px + var(--sb))';
    if (labGrid) { labGrid.className=''; labGrid.style.cssText='display:flex;flex-direction:column;gap:1.1rem'; }
  }
}

window.addEventListener('resize', applyDesktopLayout);

function buildHeader() {
  const h = el('header',{class:'app-header'});

  // Left: hamburger + logo
  const left = el('div',{style:'display:flex;align-items:center;gap:.65rem'});
  const ham = el('button',{
    class:'mobile-only',
    style:'background:none;border:none;padding:.4rem;border-radius:.5rem;display:flex;flex-direction:column;gap:5px',
    onClick:()=>{ S.drawer=true; render(); }
  });
  [0,1,2].forEach(()=> ham.append(el('span',{style:'display:block;width:19px;height:2px;background:#9ca3af;border-radius:2px'})));

  const logo = el('div',{style:'display:flex;align-items:center;gap:.5rem'});
  logo.append(
    el('div',{style:'width:1.65rem;height:1.65rem;background:linear-gradient(135deg,#3b82f6,#6366f1);border-radius:.4rem;display:flex;align-items:center;justify-content:center;font-size:.85rem'},'🧬'),
    el('span',{style:'font-size:.95rem;font-weight:800;letter-spacing:.07em'},'STUDIO GÉNÉTIQUE')
  );
  left.append(ham, logo);

  if ([M.GRANDPARENT,M.UNCLE_AUNT,M.COUSIN].includes(m)) {

  if ([M.CHILD,M.PREGNANCY,M.COUSIN].includes(m)) pd.append(wSexSel());

  if (m===M.PREGNANCY && S.pregStep===2) {
    const b = el('button',{

function upZone(onUp, img, lbl) {
  const z = el('div',{class:'upload-zone'});
  const inp = el('input',{type:'file',accept:'image/*',style:'display:none'});
  inp.addEventListener('change',e=>{ const f=e.target.files?.[0]; if(!f)return; const r=new FileReader(); r.onload=ev=>{ onUp(ev.target.result); render(); }; r.readAsDataURL(f); });
  z.append(inp);
  if (img) {
    z.append(el('img',{src:img,alt:''}));
    const ov=el('div',{class:'upload-ov'}); ov.append(el('span',{style:'color:#fff;font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em'},'Changer')); z.append(ov);

    z.append(el('div',{style:'font-size:1.5rem;opacity:.4;margin-bottom:.25rem'},'📸'), el('span',{style:'font-size:.62rem;color:#6b7280;font-weight:700;text-transform:uppercase;font-family:var(--mono)'},lbl), el('span',{style:'font-size:.58rem;color:#374151;font-family:var(--mono);margin-top:.15rem'},'PNG / JPG'));
  }
  z.addEventListener('click',()=>inp.click());
  return z;
}

/* ─── SLIDERS ─── */
function mkSlider(lbl, val, min, max, onChange, opts={}) {
  const {suffix='',labels=null}=opts;
  const uid = 'sv_'+lbl.replace(/\W/g,'_');
  const w=el('div',{style:'display:flex;flex-direction:column;gap:.35rem'});
  const row=el('div',{style:'display:flex;justify-content:space-between;align-items:center'});
  row.append(
    el('label',{style:'font-size:.62rem;color:#6b7280;font-weight:800;text-transform:uppercase;letter-spacing:.1em;font-family:var(--mono)'},lbl),
    el('span',{id:uid,style:'font-size:.75rem;color:var(--blue);font-family:var(--mono)'},`${val}${suffix}`)
  );
  const inp=el('input',{type:'range',min,max,value:val});
  inp.addEventListener('input',e=>{ const v=parseInt(e.target.value); const sv=$(uid); if(sv)sv.textContent=v+suffix; onChange(v); });
  w.append(row,inp);
  if (labels) {
    const lr=el('div',{style:'display:flex;justify-content:space-between'});
    labels.forEach(l=>lr.append(el('span',{style:'font-size:.56rem;color:#4b5563;text-transform:uppercase;font-weight:800;font-family:var(--mono)'},l)));
    w.append(lr);
  }
  return w;
}

function getLabel(i) {
  const m=S.mode;
  if(m===M.SIBLING){if(i===0)return'FRATRIE';if(i===1)return'LE FRÈRE';return'LA SŒUR';}
  if(m===M.PREGNANCY&&S.pregStep===3){ if(S.isTwins){if(i===0)return'MÈRE + JUMEAUX';if(i===1)return'BÉBÉ A';return'BÉBÉ B';} return i===0?'MÈRE + BÉBÉ':'BÉBÉ SEUL'; }
  if([M.GRANDPARENT,M.UNCLE_AUNT,M.COUSIN].includes(m)){
    const rM=m===M.GRANDPARENT?'GRAND-PÈRE':m===M.UNCLE_AUNT?'ONCLE':'COUSIN';
    const rF=m===M.GRANDPARENT?'GRAND-MÈRE':m===M.UNCLE_AUNT?'TANTE':'COUSINE';
    const sel=[];if(S.relC.m)sel.push(rM);if(S.relC.f)sel.push(rF);
    if(sel.length===2){if(i===0)return sel[0];if(i===1)return sel[1];return'GROUPE';}
    return sel[0]||'ADN';
  }
  return `ADN #${i+1}`;
}

async function doGenerate() {
  const m=S.mode;
  if([M.SIBLING,M.CHILD].includes(m)&&(!S.p1||!S.p2))return alert("📸 Photos des deux parents obligatoires.");
  if([M.GRANDPARENT,M.UNCLE_AUNT,M.COUSIN].includes(m)&&!S.p1)return alert("📸 Photo du parent obligatoire.");
  if([M.PREGNANCY,M.EVOLUTION].includes(m)&&!S.p1)return alert("📸 Photo source obligatoire.");

  S.generating=true; S.results=[]; S.step=0;
  render();

  const iv=setInterval(()=>{ S.step=(S.step+1)%6; const pf=document.querySelector('.prog-fill'); if(pf)pf.style.width=`${((S.step+1)/6)*100}%`; },2500);

  try {
    const parts=[{text:buildPrompt()}];
    if(S.p1)parts.push({inlineData:{data:S.p1.split(',')[1],mimeType:'image/jpeg'}});
    if(S.p2)parts.push({inlineData:{data:S.p2.split(',')[1],mimeType:'image/jpeg'}});

    const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-image-preview:generateContent?key=${S.apiKey}`,
      {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts}],generationConfig:{responseModalities:["TEXT","IMAGE"]}})});

    if(!res.ok){
      const err=await res.json().catch(()=>({}));
      const msg=err.error?.message||'Erreur inconnue';
      if(res.status===401||res.status===403)throw new Error('API_KEY_ERROR');
      throw new Error('['+res.status+'] '+msg);
    }
    const data=await res.json();
    const imgs=[];
    for(const p of (data.candidates?.[0]?.content?.parts||[]))if(p.inlineData)imgs.push('data:image/png;base64,'+p.inlineData.data);
    if(!imgs.length)throw new Error('Aucune image retournée. Réessaie.');
    S.results=imgs;
    if(m===M.PREGNANCY&&S.pregStep===1)S.pregStep=2;
  } catch(err){
    if(err.message==='API_KEY_ERROR'){alert('Clé API invalide ou sans permission.');localStorage.removeItem('sg_key');S.apiOk=false;}
    else alert('Erreur : '+err.message);
  } finally {
    clearInterval(iv); S.generating=false; render();
  }
}

render();
</script>
</body>
</html>
