<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Vertex Express Mode — Modèles Image</title>
<style>
  body { font-family: Arial, sans-serif; max-width: 700px; margin: 40px auto; padding: 20px; background: #0f0f0f; color: #eee; }
  h1 { color: #fff; font-size: 1.3em; }
  input, textarea { width: 100%; padding: 10px; background: #1a1a1a; border: 1px solid #333; color: #eee; border-radius: 6px; box-sizing: border-box; margin-bottom: 12px; font-size: 0.95em; }
  button { padding: 10px 20px; background: #4285f4; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 0.95em; margin-right: 8px; margin-bottom: 8px; }
  button:hover { background: #3367d6; }
  .result { margin-top: 16px; padding: 14px; background: #1a1a1a; border-radius: 8px; border-left: 4px solid #333; font-size: 0.9em; }
  .result.success { border-left-color: #0f0; }
  .result.error { border-left-color: #f00; }
  .result.pending { border-left-color: #fa0; }
  img { max-width: 100%; margin-top: 12px; border-radius: 8px; }
  label { font-size: 0.85em; color: #aaa; display: block; margin-bottom: 4px; }
  .model-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.8em; background: #222; color: #fa0; margin-bottom: 8px; }
</style>
</head>
<body>

<h1>🧪 Test Vertex AI Express Mode — Modèles Image</h1>
<p style="color:#aaa; font-size:0.9em;">Colle ta clé API Vertex Express Mode ci-dessous, puis teste chaque modèle.</p>

<label>Clé API Vertex Express Mode</label>
<input type="password" id="apiKey" placeholder="AIza..." />

<label>Prompt de test</label>
<textarea id="prompt" rows="3">Portrait cinématique d'une femme de 35 ans, lumière naturelle, ultra-réaliste</textarea>

<hr style="border-color:#333; margin: 16px 0;">

<div class="model-tag">gemini-3-pro-image-preview — Nano Banana Pro</div><br>
<button onclick="testModel('gemini-3-pro-image-preview', 'result-pro')">Tester Nano Banana Pro</button>
<div id="result-pro" class="result" style="display:none"></div>

<hr style="border-color:#333; margin: 16px 0;">

<div class="model-tag">gemini-3.1-flash-image-preview — Nano Banana 2</div><br>
<button onclick="testModel('gemini-3.1-flash-image-preview', 'result-flash')">Tester Nano Banana 2</button>
<div id="result-flash" class="result" style="display:none"></div>

<hr style="border-color:#333; margin: 16px 0;">

<div class="model-tag">gemini-2.5-flash-image-preview — Nano Banana 1</div><br>
<button onclick="testModel('gemini-2.5-flash-image-preview', 'result-25')">Tester Nano Banana 1</button>
<div id="result-25" class="result" style="display:none"></div>

<script>
async function testModel(modelId, resultDivId) {
  const apiKey = document.getElementById('apiKey').value.trim();
  const prompt = document.getElementById('prompt').value.trim();
  const resultDiv = document.getElementById(resultDivId);

  if (!apiKey) {
    alert('Entre ta clé API d\'abord !');
    return;
  }

  resultDiv.style.display = 'block';
  resultDiv.className = 'result pending';
  resultDiv.innerHTML = `⏳ Test de <strong>${modelId}</strong> en cours...`;

  // Endpoint Vertex AI Express Mode — global, sans project ni location ni région
  const endpoint = `https://aiplatform.googleapis.com/v1beta1/publishers/google/models/${modelId}:generateContent?key=${apiKey}`;

  const body = {
    contents: [{
      role: "user",
      parts: [{ text: prompt }]
    }],
    generationConfig: {
      responseModalities: ["TEXT", "IMAGE"]
    }
  };

  try {
    const response = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    const data = await response.json();

    if (!response.ok) {
      resultDiv.className = 'result error';
      resultDiv.innerHTML = `❌ <strong>${modelId}</strong> — Erreur ${response.status}<br><code style="font-size:0.8em; color:#f88">${JSON.stringify(data.error || data, null, 2)}</code>`;
      return;
    }

    // Chercher une image dans la réponse
    const parts = data?.candidates?.[0]?.content?.parts || [];
    const imagePart = parts.find(p => p.inlineData?.mimeType?.startsWith('image/'));
    const textPart = parts.find(p => p.text);

    if (imagePart) {
      const imgSrc = `data:${imagePart.inlineData.mimeType};base64,${imagePart.inlineData.data}`;
      resultDiv.className = 'result success';
      resultDiv.innerHTML = `✅ <strong>${modelId}</strong> — Image générée avec succès !<br><img src="${imgSrc}" alt="image générée">`;
    } else if (textPart) {
      resultDiv.className = 'result success';
      resultDiv.innerHTML = `✅ <strong>${modelId}</strong> — Réponse texte reçue (pas d'image) :<br><em>${textPart.text}</em>`;
    } else {
      resultDiv.className = 'result error';
      resultDiv.innerHTML = `⚠️ <strong>${modelId}</strong> — Réponse inattendue :<br><code style="font-size:0.8em">${JSON.stringify(data, null, 2).substring(0, 500)}</code>`;
    }

  } catch (err) {
    resultDiv.className = 'result error';
    resultDiv.innerHTML = `❌ <strong>${modelId}</strong> — Erreur réseau :<br><code>${err.message}</code>`;
  }
}
</script>
</body>
</html>
