const ALLOWED_VOCAL_ACTIONS = Object.keys(VOCAL_ACTIONS);

/* =========================================================
   AUDIO UTILS (port direct de audioUtils.ts)
   ========================================================= */
function decode(base64) {
  const binaryString = atob(base64);
  const len = binaryString.length;
  const bytes = new Uint8Array(len);
  for (let i = 0; i < len; i++) bytes[i] = binaryString.charCodeAt(i);
  return bytes;
}

function createWavBlob(pcmData, sampleRate) {
  const buffer = new ArrayBuffer(44 + pcmData.length);
  const view = new DataView(buffer);
  const writeString = (offset, string) => { for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i)); };
  writeString(0, 'RIFF');
  view.setUint32(4, 36 + pcmData.length, true);
  writeString(8, 'WAVE');
  writeString(12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);
  view.setUint16(22, 1, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * 2, true);
  view.setUint16(32, 2, true);
  view.setUint16(34, 16, true);
  writeString(36, 'data');
  view.setUint32(40, pcmData.length, true);
  new Uint8Array(buffer, 44).set(pcmData);
  return new Blob([buffer], { type: 'audio/wav' });
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
  });
}

function blobToBase64(blob) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onloadend = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}

/* =========================================================
   VERTEX AI SERVICE (remplace geminiService.ts / @google/genai)
   Endpoint Express Mode : aiplatform.googleapis.com, clé AQ...
   ========================================================= */
const VERTEX_BASE = 'https://aiplatform.googleapis.com/v1/publishers/google/models';

async function vertexCall(model, body, apiKey) {
  const res = await fetch(`${VERTEX_BASE}/${model}:generateContent?key=${apiKey}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!res.ok) {
    const errText = await res.text();
    throw new Error(`Erreur Vertex (${res.status}) : ${errText.slice(0, 200)}`);
  }
  return res.json();
}

async function analyzeVoice(base64Data, mimeType, apiKey) {
  const body = {
    contents: {
      role: 'user',
      parts: [
        { inlineData: { mimeType, data: base64Data } },
        { text: `ANALYSE D'IDENTITÉ VOCALE CRITIQUE.
Examine l'échantillon pour extraire une empreinte biométrique vocale.

ATTENTION GENRE : Détermine avec certitude s'il s'agit d'une voix d'homme ou de femme en te basant sur la fréquence fondamentale (F0) et les résonances laryngées. Ne te laisse pas tromper par l'intonation.

TEXTURE : Identifie la signature granulaire (rugueuse, lisse, voilée, métallique).
PITCH : Positionne précisément la voix (grave, médium, aiguë).
MATURITÉ : Évalue l'âge perçu (jeune, adulte, mature, senior).

VOIX CIBLE : Sélectionne la voix native (Puck, Charon, Kore, Fenrir, Zephyr) la plus proche pour servir de base stable.

Renvoyez uniquement du JSON strict.` }
      ]
    },
    generationConfig: {
      responseMimeType: "application/json",
      responseSchema: {
        type: "OBJECT",
        properties: {
          gender: { type: "STRING", enum: ['féminin', 'masculin'] },
          cadence: { type: "STRING", enum: ['lente', 'normale', 'rapide'] },
          respiration: { type: "STRING", enum: ['audible', 'profonde', 'légère'] },
          silences: { type: "STRING", enum: ['fréquents', 'courts', 'longs'] },
          hesitations: { type: "STRING", enum: ['nombreuses', 'modérées', 'rares'] },
          pitch: { type: "STRING", enum: ['grave', 'médium', 'aiguë'] },
          warmth: { type: "STRING", enum: ['froide', 'neutre', 'chaleureuse'] },
          texture: { type: "STRING", enum: ['nette', 'douce', 'rugueuse'] },
          textureDetail: { type: "STRING" },
          organicFeel: { type: "STRING" },
          emotion: { type: "STRING", enum: ['neutre', 'calme', 'empathique', 'joyeux', 'déterminé', 'sensible', 'énervement', 'lassitude'] },
          maturity: { type: "STRING", enum: ['jeune', 'adulte', 'mature', 'senior'] },
          emotionalDensity: { type: "STRING" },
          presence: { type: "STRING" },
          voiceName: { type: "STRING", enum: ['Puck', 'Charon', 'Kore', 'Fenrir', 'Zephyr'] },
          summary: { type: "STRING" }
        },
        required: ['gender', 'pitch', 'voiceName', 'summary', 'maturity', 'textureDetail']
      }
    }
  };
  const data = await vertexCall('gemini-3-flash-preview', body, apiKey);
  const text = data.candidates?.[0]?.content?.parts?.find(p => p.text)?.text;
  if (!text) throw new Error("Échec de l'analyse vocale (aucune réponse texte).");
  return JSON.parse(text);
}

async function planSpeech(text, impactTarget, apiKey) {
  const body = {
    contents: {
      role: 'user',
      parts: [{ text: `Tu es un directeur artistique. Découpe ce script en segments cohérents pour une seule voix humaine stable : "${text}".

IMPACT RECHERCHÉ : "${impactTarget || 'éveiller'}".

Garantis que chaque segment contribue à une seule et même performance vocale unifiée.
Renvoyez uniquement du JSON.` }]
    },
    generationConfig: {
      responseMimeType: "application/json",
      responseSchema: {
        type: "OBJECT",
        properties: {
          emotional_impact_target: { type: "STRING", enum: Object.keys(IMPACT_MAP) },
          speech_tempo_global: { type: "STRING" },
          speech_plan: {
            type: "ARRAY",
            items: {
              type: "OBJECT",
              properties: {
                text: { type: "STRING" },
                vocal_action: { type: "STRING", enum: ALLOWED_VOCAL_ACTIONS },
                speech_tempo: { type: "STRING", enum: ['lent', 'normal', 'rapide'] }
              },
              required: ['text', 'vocal_action']
            }
          }
        },
        required: ['emotional_impact_target', 'speech_plan', 'speech_tempo_global']
      }
    }
  };
  try {
    const data = await vertexCall('gemini-3-flash-preview', body, apiKey);
    const text2 = data.candidates?.[0]?.content?.parts?.find(p => p.text)?.text;
    return JSON.parse(text2);
  } catch (err) {
    return { emotional_impact_target: impactTarget || 'confronter', speech_tempo_global: 'normal', speech_plan: [{ text, vocal_action: 'none' }] };
  }
}

async function synthesizeSpeech(plan, footprint, customEmotion, impactTarget, apiKey) {
  const cat = (customEmotion && customEmotion.category) || footprint.emotion;
  const sub = (customEmotion && customEmotion.sub) || EMOTION_MAP[cat].sub[0];

  let scriptText = "";
  if (typeof plan === 'string') {
    scriptText = plan;
  } else {
    scriptText = plan.map(s => {
      const actionData = s.vocal_action ? VOCAL_ACTIONS[s.vocal_action] : null;
      const trigger = actionData ? actionData.performanceTrigger : "";
      const tempo = s.speech_tempo ? `[tempo: ${s.speech_tempo}]` : "";
      return `${trigger} ${tempo} ${s.text}`;
    }).join(' ');
  }

  const impactInstruction = impactTarget ? `
  INTENTION PSYCHOLOGIQUE (CIBLE AUDITEUR) : ${impactTarget}.` : "";

  const fullPrompt = `DIRECTIVE DE STABILITÉ VOCALE ABSOLUE.
IDENTITÉ SOURCE : ${footprint.gender}, ${footprint.maturity}, pitch ${footprint.pitch}.
SIGNATURE TEXTURELLE : ${footprint.textureDetail}.
ÉTAT ÉMOTIONNEL CONSTANT : ${cat} (${sub}).
${impactInstruction}

RÈGLE D'OR : Garde rigoureusement le MÊME TIMBRE, la MÊME HAUTEUR DE VOIX et le MÊME GRAIN tout au long de la lecture.
Interdiction de varier la personnalité vocale d'un segment à l'autre. Tu es UNE SEULE ET MÊME PERSONNE.

Script à interpréter :
${scriptText}`;

  const body = {
    contents: [{ parts: [{ text: fullPrompt }] }],
    generationConfig: {
      responseModalities: ["AUDIO"],
      speechConfig: {
        voiceConfig: {
          prebuiltVoiceConfig: { voiceName: footprint.voiceName || 'Zephyr' }
        }
      }
    }
  };

  const data = await vertexCall('gemini-2.5-flash-preview-tts', body, apiKey);
  const base64Audio = data.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
  if (!base64Audio) throw new Error("Le moteur n'a pas renvoyé d'audio.");
  return base64Audio;
}

/* =========================================================
   COMPOSANT: ModeExtractor
   ========================================================= */
function ModeExtractor({ onFingerprintCreated, apiKey }) {
  const [isRecording, setIsRecording] = useState(false);
  const [isAnalyzing, setIsAnalyzing] = useState(false);
  const [error, setError] = useState(null);
  const [tempAnalysis, setTempAnalysis] = useState(null);
  const [originalAudio, setOriginalAudio] = useState(null);
  const [customName, setCustomName] = useState('Voix Studio');

  const mediaRecorderRef = useRef(null);
  const chunksRef = useRef([]);

  const startRecording = async () => {
    setError(null);
    setTempAnalysis(null);
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const mimeType = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/mp4';
      const recorder = new MediaRecorder(stream, { mimeType });
      mediaRecorderRef.current = recorder;
      chunksRef.current = [];
      recorder.ondataavailable = (e) => { if (e.data.size > 0) chunksRef.current.push(e.data); };
      recorder.onstop = async () => {
        const blob = new Blob(chunksRef.current, { type: mimeType });
        stream.getTracks().forEach(t => t.stop());
        setIsAnalyzing(true);
        try {
          const base64 = await blobToBase64(blob);
          setOriginalAudio({ base64, mime: mimeType });
          const analysis = await analyzeVoice(base64, mimeType, apiKey);
          setTempAnalysis(analysis);
        } catch (err) { setError(err.message); }
        finally { setIsAnalyzing(false); }
      };
      recorder.start();
      setIsRecording(true);
    } catch (err) { setError("Microphone inaccessible."); }
  };

  const handleFileUpload = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    if (file.size > 10 * 1024 * 1024) { setError("Fichier trop volumineux (Max 10Mo)."); return; }
    setIsAnalyzing(true);
    setError(null);
    try {
      const base64 = await fileToBase64(file);
      setOriginalAudio({ base64, mime: file.type });
      const res = await analyzeVoice(base64, file.type, apiKey);
      setTempAnalysis(res);
    } catch (err) {
      console.error(err);
      setError("Erreur lors de l'analyse du média. Assurez-vous qu'il contient une voix claire.");
    } finally { setIsAnalyzing(false); e.target.value = ''; }
  };

  const saveSignature = () => {
    if (!tempAnalysis || !originalAudio) return;
    try {
      onFingerprintCreated({
        id: 'fp_' + Date.now(),
        name: customName || 'Signature',
        timestamp: Date.now(),
        ...tempAnalysis,
        inflexion: EMOTION_MAP[tempAnalysis.emotion || 'neutre'].sub[0],
        analysisSummary: tempAnalysis.summary,
        originalAudioBase64: originalAudio.base64,
        mimeType: originalAudio.mime
      });
      setTempAnalysis(null);
    } catch (e) { setError("Stockage plein. Veuillez supprimer d'anciennes signatures."); }
  };

  return (
    <div className="flex flex-col gap-6 w-full">
      {error && (
        <div className="p-4 bg-red-500/10 border border-red-500/20 rounded-2xl text-red-400 text-xs text-center font-bold uppercase tracking-widest">
          <i className="fas fa-exclamation-triangle mr-2"></i>{error}
        </div>
      )}

      {!tempAnalysis ? (
        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div className={`p-10 rounded-[3rem] glass flex flex-col items-center justify-center border-2 transition-all duration-500 ${isRecording ? 'border-blue-500 shadow-[0_0_40px_rgba(59,130,246,0.2)]' : 'border-white/5 hover:border-white/10'}`}>
            <div className={`w-20 h-20 rounded-full flex items-center justify-center mb-6 transition-all ${isRecording ? 'bg-red-600 animate-pulse' : 'bg-blue-600/10 text-blue-400'}`}>
              <i className={`fas ${isRecording ? 'fa-stop' : 'fa-microphone'} text-2xl`}></i>
            </div>
            <h3 className="text-white font-black uppercase text-[10px] tracking-widest mb-6 italic">Capture Micro</h3>
            <button onClick={isRecording ? () => mediaRecorderRef.current?.stop() : startRecording} className={`w-full max-w-[200px] py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest transition-all ${isRecording ? 'bg-white text-black' : 'bg-blue-600 text-white shadow-lg shadow-blue-600/20'}`}>
              {isRecording ? 'ARRÊTER' : 'DÉMARRER'}
            </button>
          </div>

          <div className="p-10 rounded-[3rem] glass flex flex-col items-center justify-center border-2 border-white/5 hover:border-white/10 transition-all">
            <div className="w-20 h-20 rounded-full bg-white/5 text-gray-400 flex items-center justify-center mb-6">
              <i className="fas fa-file-video text-2xl"></i>
            </div>
            <h3 className="text-white font-black uppercase text-[10px] tracking-widest mb-6 italic">Import Vidéo/Audio</h3>
            <label className="w-full max-w-[200px] py-4 bg-white/5 text-white rounded-2xl font-black uppercase text-[10px] tracking-widest text-center cursor-pointer border border-white/10 hover:bg-white/10 transition-all">
              SÉLECTIONNER
              <input type="file" className="hidden" accept="audio/*,video/*" onChange={handleFileUpload} />
            </label>
            <p className="text-[8px] text-gray-600 uppercase font-bold mt-4 tracking-tighter">MP4, MOV, WAV, MP3... (Max 10Mo)</p>
          </div>
        </div>
      ) : (
        <div className="glass p-10 rounded-[4rem] border-blue-500/30">
          <div className="flex flex-col md:flex-row gap-12">
            <div className="flex-1 space-y-8">
              <div>
                <label className="text-[10px] font-black text-blue-400 uppercase tracking-widest block mb-4 italic">Nommer cette signature</label>
                <input type="text" value={customName} onChange={(e) => setCustomName(e.target.value)} className="bg-white/5 border border-white/10 rounded-2xl px-6 py-4 w-full text-white font-bold outline-none focus:border-blue-500 text-lg transition-all" />
              </div>
              <div className="grid grid-cols-2 gap-4">
                <div className="p-6 bg-white/[0.02] rounded-3xl border border-white/5">
                  <div className="text-[9px] text-gray-500 uppercase font-black mb-2">Identité</div>
                  <div className="text-md font-black text-white uppercase italic">{tempAnalysis.gender} • {tempAnalysis.maturity}</div>
                </div>
                <div className="p-6 bg-white/[0.02] rounded-3xl border border-white/5">
                  <div className="text-[9px] text-gray-500 uppercase font-black mb-2">Tessiture</div>
                  <div className="text-md font-black text-white uppercase italic">{tempAnalysis.pitch}</div>
                </div>
              </div>
            </div>
            <div className="md:w-1/3 flex flex-col justify-end">
              <button onClick={saveSignature} className="w-full py-8 bg-blue-600 text-white rounded-[2rem] font-black uppercase text-xs tracking-widest shadow-2xl shadow-blue-600/40 hover:scale-[1.02] active:scale-95 transition-all">
                SÉCURISER L'ADN
              </button>
            </div>
          </div>
        </div>
      )}

      {isAnalyzing && (
        <div className="fixed inset-0 z-[100] glass flex flex-col items-center justify-center backdrop-blur-2xl">
          <div className="relative">
            <div className="w-24 h-24 border-4 border-blue-500/10 border-t-blue-500 rounded-full animate-spin"></div>
            <div className="absolute inset-0 flex items-center justify-center"><i className="fas fa-dna text-blue-500 animate-pulse text-xl"></i></div>
          </div>
          <p className="mt-8 text-blue-400 font-black uppercase tracking-widest text-[11px] animate-pulse">Extraction de l'empreinte en cours...</p>
          <p className="mt-2 text-gray-600 font-bold uppercase text-[9px]">Analyse du flux audio-visuel</p>
        </div>
      )}
    </div>
  );
}

/* =========================================================
   COMPOSANT: ModeSynthesizer
   ========================================================= */
function ModeSynthesizer({ footprints, selectedId, onSelectId, persistedText, onTextChange, persistedPlan, onPlanChange, persistedCategory, onCategoryChange, persistedSub, onSubChange, persistedImpact, onImpactChange, apiKey }) {
  const [isPlanning, setIsPlanning] = useState(false);
  const [isGenerating, setIsGenerating] = useState(false);
  const [isPlaying, setIsPlaying] = useState(false);
  const [error, setError] = useState(null);
  const [downloadUrl, setDownloadUrl] = useState(null);
  const [loadingSegmentIdx, setLoadingSegmentIdx] = useState(null);
  const [history, setHistory] = useState([]);

  const audioRef = useRef(null);
  const segmentAudioRef = useRef(null);

  const selectedFootprint = footprints.find(f => f.id === selectedId);

  useEffect(() => {
    if (selectedFootprint && !persistedCategory) {
      onCategoryChange(selectedFootprint.emotion);
      onSubChange(EMOTION_MAP[selectedFootprint.emotion].sub[0]);
    }
  }, [selectedId]);

  const handlePlanSpeech = async () => {
    if (!persistedText.trim()) return;
    try {
      setIsPlanning(true);
      setError(null);
      const result = await planSpeech(persistedText, persistedImpact, apiKey);
      if (result && result.speech_plan && result.speech_plan.length > 0) {
        onPlanChange(result.speech_plan);
        if (result.emotional_impact_target) onImpactChange(result.emotional_impact_target);
      } else { throw new Error("Planification vide."); }
    } catch (err) {
      setError(`Analyse du flow indisponible: ${err.message || 'Erreur directe'}`);
      onPlanChange([{ text: persistedText, vocal_action: 'none' }]);
    } finally { setIsPlanning(false); }
  };

  const handleUpdateSegment = (index, action) => {
    if (!persistedPlan) return;
    const newPlan = [...persistedPlan];
    newPlan[index].vocal_action = action;
    onPlanChange(newPlan);
  };

  const previewSegment = async (idx) => {
    if (!selectedFootprint || !persistedPlan) return;
    const segment = persistedPlan[idx];
    try {
      setLoadingSegmentIdx(idx);
      setError(null);
      const base64 = await synthesizeSpeech([segment], selectedFootprint, { category: persistedCategory, sub: persistedSub }, persistedImpact, apiKey);
      const bytes = decode(base64);
      const wavBlob = createWavBlob(bytes, 24000);
      const url = URL.createObjectURL(wavBlob);
      if (!segmentAudioRef.current) segmentAudioRef.current = new Audio();
      segmentAudioRef.current.src = url;
      segmentAudioRef.current.play();
    } catch (err) { console.error(err); setError(`Erreur segment: ${err.message}`); }
    finally { setLoadingSegmentIdx(null); }
  };

  const downloadSegment = async (idx) => {
    if (!selectedFootprint || !persistedPlan) return;
    const segment = persistedPlan[idx];
    try {
      setLoadingSegmentIdx(idx);
      setError(null);
      const base64 = await synthesizeSpeech([segment], selectedFootprint, { category: persistedCategory, sub: persistedSub }, persistedImpact, apiKey);
      const bytes = decode(base64);
      const wavBlob = createWavBlob(bytes, 24000);
      const url = URL.createObjectURL(wavBlob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `SEGMENT_${idx + 1}_${selectedFootprint.name}.wav`;
      a.click();
      URL.revokeObjectURL(url);
    } catch (err) { console.error(err); setError(`Erreur téléchargement segment: ${err.message}`); }
    finally { setLoadingSegmentIdx(null); }
  };

  const handleSynthesize = async () => {
    if (!selectedFootprint) { setError("Veuillez sélectionner une signature vocale."); return; }
    const planToUse = persistedPlan || persistedText;
    try {
      setIsGenerating(true);
      setError(null);
      setIsPlaying(false);
      const base64 = await synthesizeSpeech(planToUse, selectedFootprint, { category: persistedCategory, sub: persistedSub }, persistedImpact, apiKey);
      const bytes = decode(base64);
      const wavBlob = createWavBlob(bytes, 24000);
      const url = URL.createObjectURL(wavBlob);
      setDownloadUrl(url);

      const newItem = { id: 'gen_' + Date.now(), url, text: persistedText.substring(0, 30) + '...', timestamp: Date.now() };
      setHistory(prev => [newItem, ...prev].slice(0, 5));

      if (!audioRef.current) audioRef.current = new Audio();
      audioRef.current.src = url;
      audioRef.current.onplay = () => setIsPlaying(true);
      audioRef.current.onpause = () => setIsPlaying(false);
      audioRef.current.onended = () => setIsPlaying(false);
      audioRef.current.play().catch(() => {});
    } catch (err) {
      console.error("Synthesis failed:", err);
      setError(`Échec de la vocalisation: ${err.message || 'Le service est temporairement surchargé.'}`);
    } finally { setIsGenerating(false); }
  };

  const togglePlayback = () => {
    if (!audioRef.current || !downloadUrl) return;
    if (isPlaying) audioRef.current.pause(); else audioRef.current.play();
  };

  if (footprints.length === 0) return null;

  return (
    <div className="flex flex-col gap-8">
      {error && (
        <div className="p-4 bg-red-500/10 border border-red-500/20 rounded-2xl text-red-400 text-[10px] text-center font-black uppercase tracking-widest">
          <i className="fas fa-exclamation-circle mr-2"></i>{error}
        </div>
      )}

      <div className="grid grid-cols-1 lg:grid-cols-4 gap-8">
        <div className="lg:col-span-1 space-y-6">
          <div className="space-y-4">
            <label className="block text-[10px] font-black text-gray-500 uppercase tracking-widest">SIGNATURES</label>
            <div className="flex flex-col gap-2 max-h-[200px] overflow-y-auto pr-2 custom-scrollbar">
              {footprints.map(fp => (
                <button key={fp.id} onClick={() => onSelectId(fp.id)} className={`p-4 rounded-2xl text-left border transition-all ${selectedId === fp.id ? 'bg-blue-600/10 border-blue-500/50 text-blue-100' : 'bg-white/5 border-white/5 text-gray-400'}`}>
                  <div className="font-black text-sm truncate italic uppercase">{fp.name}</div>
                </button>
              ))}
            </div>
          </div>

          <div className="space-y-4">
            <label className="block text-[10px] font-black text-blue-400 uppercase tracking-widest">IMPACT CIBLE (STRATÉGIQUE)</label>
            <div className="grid grid-cols-2 gap-2">
              {Object.entries(IMPACT_MAP).map(([key, info]) => (
                <button key={key} onClick={() => onImpactChange(key)} title={info.description}
                  className={`flex flex-col items-center justify-center p-3 rounded-xl transition-all border ${persistedImpact === key ? 'bg-blue-600 border-blue-500 text-white' : 'bg-white/5 border-white/5 text-gray-500 hover:border-white/20'}`}>
                  <i className={`fas ${info.icon} mb-1 text-xs`}></i>
                  <span className="text-[8px] font-black uppercase tracking-tighter text-center leading-none">{info.label}</span>
                </button>
              ))}
            </div>
          </div>

          <div className="space-y-4 pt-4 border-t border-white/5">
            <label className="block text-[10px] font-black text-gray-600 uppercase tracking-widest">HUMEUR</label>
            <div className="grid grid-cols-2 gap-2">
              {Object.keys(EMOTION_MAP).map(cat => (
                <button key={cat} onClick={() => { onCategoryChange(cat); onSubChange(EMOTION_MAP[cat].sub[0]); }}
                  className={`py-2 rounded-xl text-[9px] font-black uppercase tracking-widest transition-all border ${persistedCategory === cat ? 'bg-white/10 border-white/20 text-white' : 'bg-white/5 border-white/5 text-gray-500'}`}>
                  {EMOTION_MAP[cat].label}
                </button>
              ))}
            </div>
          </div>

          {history.length > 0 && (
            <div className="space-y-4 pt-4 border-t border-white/5">
              <label className="block text-[10px] font-black text-gray-600 uppercase tracking-widest">PRISES RÉCENTES</label>
              <div className="flex flex-col gap-2">
                {history.map(item => (
                  <div key={item.id} className="flex items-center justify-between p-3 bg-white/5 rounded-xl border border-white/5 group">
                    <div className="text-[9px] font-bold text-gray-500 truncate italic w-1/2">{item.text}</div>
                    <div className="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                      <button onClick={() => { if (audioRef.current) { audioRef.current.src = item.url; audioRef.current.play(); } }} className="w-6 h-6 flex items-center justify-center text-blue-400 hover:text-white"><i className="fas fa-play text-[8px]"></i></button>
                      <a href={item.url} download={`PRISE_${selectedFootprint?.name}.wav`} className="w-6 h-6 flex items-center justify-center text-gray-500 hover:text-white"><i className="fas fa-download text-[8px]"></i></a>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>

        <div className="lg:col-span-3 space-y-6">
          <div className="space-y-4">
            <label className="block text-[10px] font-black text-gray-500 uppercase tracking-widest">SCRIPT</label>
            <div className="glass rounded-[2rem] p-6 border border-white/10 relative">
              <textarea value={persistedText} onChange={(e) => { onTextChange(e.target.value); if (persistedPlan) onPlanChange(null); }} placeholder="Saisissez le script..." className="w-full h-32 bg-transparent border-none focus:ring-0 text-xl resize-none placeholder:text-gray-800 font-medium italic" />
              <div className="flex justify-end mt-4">
                <button onClick={handlePlanSpeech} disabled={isPlanning || !persistedText.trim()} className="px-6 py-3 bg-white/5 text-white rounded-xl text-[10px] font-black uppercase border border-white/10 hover:bg-white/10 transition-all flex items-center gap-2">
                  {isPlanning ? <i className="fas fa-spinner fa-spin text-blue-500"></i> : <i className="fas fa-magic text-blue-400"></i>} ANALYSER LE FLOW (INTENTION IA)
                </button>
              </div>
            </div>
          </div>

          {persistedPlan && (
            <div className="space-y-4">
              <label className="block text-[10px] font-black text-blue-400 uppercase tracking-widest">DIRECTION D'ACTEUR PAR SEGMENT</label>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                {persistedPlan.map((segment, idx) => (
                  <div key={idx} className="bg-white/5 border border-white/10 p-5 rounded-[2rem] flex flex-col gap-4 hover:border-blue-500/20 transition-all">
                    <div className="flex items-start justify-between">
                      <p className="text-sm text-gray-300 font-medium italic pr-4 leading-relaxed">"{segment.text}"</p>
                      <div className="flex gap-2">
                        <button onClick={() => previewSegment(idx)} disabled={loadingSegmentIdx === idx} className={`w-8 h-8 rounded-full flex items-center justify-center transition-all ${loadingSegmentIdx === idx ? 'bg-blue-600' : 'bg-white/5 text-gray-500 hover:text-white'}`}>
                          {loadingSegmentIdx === idx ? <i className="fas fa-circle-notch fa-spin"></i> : <i className="fas fa-play text-[10px]"></i>}
                        </button>
                        <button onClick={() => downloadSegment(idx)} disabled={loadingSegmentIdx === idx} className="w-8 h-8 rounded-full bg-white/5 text-gray-500 hover:text-white flex items-center justify-center">
                          <i className="fas fa-download text-[10px]"></i>
                        </button>
                      </div>
                    </div>
                    <div className="flex items-center gap-3 border-t border-white/5 pt-4">
                      <i className={`fas ${VOCAL_ACTIONS[segment.vocal_action || 'none'].icon} text-[10px] text-blue-500`}></i>
                      <select value={segment.vocal_action || 'none'} onChange={(e) => handleUpdateSegment(idx, e.target.value)} className="bg-transparent text-[10px] font-black uppercase text-gray-400 outline-none cursor-pointer hover:text-white">
                        {Object.entries(VOCAL_ACTIONS).map(([key, val]) => <option key={key} value={key} className="bg-[#0a0a0c]">{val.label}</option>)}
                      </select>
                      {segment.speech_tempo && <span className="text-[8px] bg-blue-600/20 text-blue-400 px-2 py-1 rounded-full uppercase font-black">{segment.speech_tempo}</span>}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          <div className="flex justify-center pt-8">
            <button onClick={handleSynthesize} disabled={isGenerating || !persistedText.trim()} className="bg-blue-600 hover:bg-blue-500 text-white font-black uppercase tracking-widest px-16 py-6 rounded-3xl flex items-center gap-4 transition-all shadow-2xl shadow-blue-600/40 group">
              {isGenerating ? <><i className="fas fa-dna fa-spin"></i> CALCUL DE L'HUMANITÉ...</> : <><i className="fas fa-microphone-alt group-hover:animate-bounce"></i> GÉNÉRER LA PRISE COMPLÈTE</>}
            </button>
          </div>

          {downloadUrl && !isGenerating && (
            <div className={`p-8 rounded-[3rem] border transition-all ${isPlaying ? 'bg-blue-600/10 border-blue-500/40' : 'bg-white/[0.02] border-white/10'}`}>
              <div className="flex flex-col md:flex-row items-center gap-8">
                <button onClick={togglePlayback} className={`w-20 h-20 rounded-full flex items-center justify-center text-2xl transition-all ${isPlaying ? 'bg-white text-blue-600 shadow-xl' : 'bg-blue-600 text-white'}`}>
                  <i className={`fas ${isPlaying ? 'fa-pause' : 'fa-play ml-1'}`}></i>
                </button>
                <div className="flex-1">
                  <div className="text-[10px] font-black text-blue-400 uppercase tracking-widest mb-1 italic">AUDIO HD PRÊT</div>
                  <div className="text-xs font-black text-white uppercase">{selectedFootprint?.name} • Impact: {persistedImpact}</div>
                </div>
                <a href={downloadUrl} download={`FINAL_${selectedFootprint?.name}.wav`} className="p-5 bg-blue-600 text-white rounded-3xl flex items-center gap-3 hover:scale-105 transition-all shadow-lg shadow-blue-600/20">
                  <i className="fas fa-download text-xl"></i>
                  <span className="text-[10px] font-black uppercase tracking-widest">TÉLÉCHARGER</span>
                </a>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* =========================================================
   APP RACINE
   ========================================================= */
function App() {
  const [apiKey, setApiKey] = useState(localStorage.getItem('studiolips_vertex_key') || '');
  const [keyInput, setKeyInput] = useState('');
  const [view, setView] = useState(apiKey ? 'landing' : 'setup');
  const [activeMode, setActiveMode] = useState('extract');
  const [footprints, setFootprints] = useState([]);
  const [selectedFootprintId, setSelectedFootprintId] = useState(null);
  const [playingOriginalId, setPlayingOriginalId] = useState(null);

  const [synthText, setSynthText] = useState('');
  const [synthPlan, setSynthPlan] = useState(null);
  const [synthCategory, setSynthCategory] = useState('neutre');
  const [synthSub, setSynthSub] = useState('Professionnel');
  const [synthImpact, setSynthImpact] = useState('confronter');

  const originalAudioRef = useRef(null);

  useEffect(() => {
    try {
      const saved = localStorage.getItem('voxprint_footprints');
      if (saved) {
        const parsed = JSON.parse(saved);
        setFootprints(parsed);
        if (parsed.length > 0) setSelectedFootprintId(parsed[0].id);
      }
    } catch (e) { localStorage.removeItem('voxprint_footprints'); }
  }, []);

  const saveApiKey = () => {
    if (!keyInput.trim().startsWith('AQ')) {
      alert("Ta clé Vertex Express Mode doit commencer par 'AQ'.");
      return;
    }
    localStorage.setItem('studiolips_vertex_key', keyInput.trim());
    setApiKey(keyInput.trim());
    setView('landing');
  };

  const handleFingerprintCreated = (fp) => {
    try {
      const updated = [fp, ...footprints].slice(0, 3);
      localStorage.setItem('voxprint_footprints', JSON.stringify(updated));
      setFootprints(updated);
      setSelectedFootprintId(fp.id);
      setActiveMode('synthesize');
    } catch (e) { alert("Erreur Stockage : Supprimez d'anciennes signatures pour enregistrer celle-ci."); }
  };

  const clearAll = () => {
    if (confirm("Effacer toutes les signatures ?")) {
      localStorage.removeItem('voxprint_footprints');
      setFootprints([]);
      setSelectedFootprintId(null);
      stopOriginalPlayback();
    }
  };

  const deleteFootprint = (id, e) => {
    e.stopPropagation();
    if (playingOriginalId === id) stopOriginalPlayback();
    const updated = footprints.filter(f => f.id !== id);
    setFootprints(updated);
    localStorage.setItem('voxprint_footprints', JSON.stringify(updated));
    if (selectedFootprintId === id) setSelectedFootprintId(updated.length > 0 ? updated[0].id : null);
  };

  const stopOriginalPlayback = () => {
    if (originalAudioRef.current) { originalAudioRef.current.pause(); originalAudioRef.current.src = ""; }
    setPlayingOriginalId(null);
  };

  const playOriginalSample = (fp, e) => {
    e.stopPropagation();
    if (playingOriginalId === fp.id) { stopOriginalPlayback(); return; }
    if (!fp.originalAudioBase64) return;
    stopOriginalPlayback();
    const audioUrl = `data:${fp.mimeType || 'audio/wav'};base64,${fp.originalAudioBase64}`;
    const audio = new Audio(audioUrl);
    originalAudioRef.current = audio;
    audio.onplay = () => setPlayingOriginalId(fp.id);
    audio.onended = () => setPlayingOriginalId(null);
    audio.play().catch(err => console.error("Playback failed", err));
  };

  if (view === 'setup') {
    return (
      <div className="min-h-screen flex flex-col items-center justify-center p-6 text-center bg-[#0a0a0c] relative overflow-hidden">
        <div className="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-600/10 rounded-full blur-[120px]"></div>
        <div className="max-w-md z-10">
          <div className="w-16 h-16 bg-gradient-to-br from-blue-600 to-indigo-700 rounded-2xl flex items-center justify-center shadow-2xl shadow-blue-900/40 mx-auto mb-8">
            <i className="fas fa-wave-square text-white text-xl"></i>
          </div>
          <h1 className="text-5xl md:text-6xl font-black tracking-tighter mb-3 bg-gradient-to-b from-white to-gray-500 bg-clip-text text-transparent uppercase italic">STUDIO LIPS</h1>
          <p className="text-lg md:text-xl text-white font-black uppercase tracking-widest mb-10">CRÉE TA SIGNATURE VOCALE</p>
          <input type="password" value={keyInput} onChange={(e) => setKeyInput(e.target.value)} placeholder="AQ..." className="bg-white/5 border border-white/10 rounded-2xl px-6 py-4 w-full text-white font-bold outline-none focus:border-blue-500 text-center mb-6" />
          <button onClick={saveApiKey} className="w-full py-4 bg-blue-600 text-white rounded-2xl font-black uppercase text-xs tracking-widest shadow-xl shadow-blue-600/30">
            VALIDER
          </button>
        </div>
      </div>
    );
  }

  if (view === 'landing') {
    return (
      <div className="min-h-screen flex flex-col items-center justify-center p-6 text-center bg-[#0a0a0c] relative overflow-hidden">
        <div className="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-600/10 rounded-full blur-[120px]"></div>
        <div className="absolute bottom-[-10%] right-[-10%] w-[30%] h-[30%] bg-indigo-600/5 rounded-full blur-[100px]"></div>
        <div className="max-w-4xl z-10">
          <div className="w-20 h-20 bg-gradient-to-br from-blue-600 to-indigo-700 rounded-2xl flex items-center justify-center shadow-2xl shadow-blue-900/40 mx-auto mb-10">
            <i className="fas fa-wave-square text-white text-3xl"></i>
          </div>
          <h1 className="text-6xl md:text-8xl font-black tracking-tighter mb-6 bg-gradient-to-b from-white to-gray-500 bg-clip-text text-transparent uppercase italic">STUDIO LIPS</h1>
          <p className="text-2xl md:text-3xl text-white font-black uppercase tracking-widest mb-14">CRÉE TA SIGNATURE VOCALE</p>
          <button onClick={() => setView('app')} className="group relative px-14 py-6 font-bold text-white bg-blue-600 rounded-full shadow-2xl shadow-blue-600/40 hover:scale-105 active:scale-95 transition-all uppercase tracking-widest text-sm overflow-hidden">
            <span className="relative z-10">COMMENCER L'EXPÉRIENCE</span>
          </button>
          <button onClick={() => setView('setup')} className="block mx-auto mt-6 text-[10px] text-gray-600 hover:text-gray-400 uppercase font-bold tracking-widest">
            Changer de clé Vertex
          </button>
        </div>
      </div>
    );
  }

  return (
    <div className="min-h-screen flex flex-col bg-[#0a0a0c]">
      <header className="border-b border-white/5 py-4 px-6 md:px-12 flex items-center justify-between sticky top-0 glass z-50">
        <div className="flex items-center gap-3 cursor-pointer" onClick={() => setView('landing')}>
          <div className="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center"><i className="fas fa-wave-square text-white text-xs"></i></div>
          <h1 className="text-lg font-bold tracking-tight">STUDIO <span className="text-blue-500 italic">LIPS</span></h1>
        </div>
        <nav className="flex items-center gap-1 bg-white/5 p-1 rounded-full border border-white/5">
          <button onClick={() => setActiveMode('extract')} className={`px-5 py-2 rounded-full text-[10px] font-black uppercase tracking-widest transition-all ${activeMode === 'extract' ? 'bg-blue-600 text-white' : 'text-gray-500'}`}>1. Capture</button>
          <button onClick={() => setActiveMode('synthesize')} className={`px-5 py-2 rounded-full text-[10px] font-black uppercase tracking-widest transition-all ${activeMode === 'synthesize' ? 'bg-blue-600 text-white' : 'text-gray-500'}`}>2. Synthèse</button>
        </nav>
        <button onClick={clearAll} className="text-[10px] font-black text-gray-600 hover:text-red-500 transition-colors uppercase tracking-widest">Réinitialiser</button>
      </header>

      <main className="flex-1 max-w-6xl w-full mx-auto px-6 py-12">
        {activeMode === 'extract' ? (
          <ModeExtractor onFingerprintCreated={handleFingerprintCreated} apiKey={apiKey} />
        ) : (
          <ModeSynthesizer
            footprints={footprints}
            selectedId={selectedFootprintId}
            onSelectId={setSelectedFootprintId}
            persistedText={synthText}
            onTextChange={setSynthText}
            persistedPlan={synthPlan}
            onPlanChange={setSynthPlan}
            persistedCategory={synthCategory}
            onCategoryChange={setSynthCategory}
            persistedSub={synthSub}
            onSubChange={setSynthSub}
            persistedImpact={synthImpact}
            onImpactChange={setSynthImpact}
            apiKey={apiKey}
          />
        )}

        {footprints.length > 0 && (
          <div className="mt-20 pt-12 border-t border-white/5">
            <h3 className="text-[10px] font-black text-gray-600 uppercase tracking-widest mb-8">BIBLIOTHÈQUE ({footprints.length}/3)</h3>
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
              {footprints.map(fp => (
                <div key={fp.id} onClick={() => { setSelectedFootprintId(fp.id); setActiveMode('synthesize'); }} className={`glass p-5 rounded-3xl border transition-all cursor-pointer relative group ${selectedFootprintId === fp.id ? 'border-blue-500 bg-blue-500/5' : 'border-white/5 hover:border-blue-500/20'}`}>
                  <div className="flex justify-between items-start mb-4">
                    <div className="flex gap-2">
                      <button onClick={(e) => playOriginalSample(fp, e)} className={`w-9 h-9 rounded-xl flex items-center justify-center transition-all ${playingOriginalId === fp.id ? 'bg-blue-600 text-white' : 'bg-blue-600/10 text-blue-400 hover:bg-blue-600/20'}`} title="Écouter l'échantillon">
                        <i className={`fas ${playingOriginalId === fp.id ? 'fa-stop' : 'fa-play ml-0.5'} text-[10px]`}></i>
                      </button>
                      <a href={`data:${fp.mimeType};base64,${fp.originalAudioBase64}`} download={`ADN_${fp.name}.wav`} onClick={(e) => e.stopPropagation()} className="w-9 h-9 rounded-xl bg-white/5 text-gray-400 flex items-center justify-center hover:bg-white/10 hover:text-white transition-all" title="Télécharger l'ADN">
                        <i className="fas fa-download text-[10px]"></i>
                      </a>
                    </div>
                    <button onClick={(e) => deleteFootprint(fp.id, e)} className="text-gray-700 hover:text-red-500 transition-colors opacity-0 group-hover:opacity-100"><i className="fas fa-times text-sm"></i></button>
                  </div>
                  <h4 className="font-black text-sm text-white truncate italic uppercase">{fp.name}</h4>
                  <p className="text-[9px] text-gray-500 uppercase font-bold mt-1">{fp.gender} • {fp.pitch}</p>
                </div>
              ))}
            </div>
          </div>
        )}
      </main>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
