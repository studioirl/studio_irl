// UTILS — Blob download (fix Safari)
// ============================================================
const sleep = ms => new Promise(r => setTimeout(r, ms));

function downloadBlob(dataUrl, filename) {
  try {
    const byteStr = atob(dataUrl.split(',')[1]);
    const mime = dataUrl.split(',')[0].split(':')[1].split(';')[0];
    const ab = new ArrayBuffer(byteStr.length);
    const ia = new Uint8Array(ab);
    for (let i = 0; i < byteStr.length; i++) ia[i] = byteStr.charCodeAt(i);
    const blob = new Blob([ab], { type: mime });
    const blobUrl = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = blobUrl; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(blobUrl), 5000);
  } catch(e) {
    const a = document.createElement('a');
    a.href = dataUrl; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  }
}

// ============================================================
// GENERATION — Vertex AI
// ============================================================
async function callVertexGenerate(apiKey, parts, model = 'gemini-3.1-flash-image-preview', allowReducedVariant = true, imageConfig = { aspectRatio: '16:9', imageSize: '4K' }) {
  const endpoint = `https://aiplatform.googleapis.com/v1/publishers/google/models/${model}:generateContent?key=${encodeURIComponent(apiKey)}`;

  const fetchWithTimeout = async (url, options, timeoutMs = 120000) => {
    const controller = new AbortController();
    const tid = setTimeout(() => controller.abort(), timeoutMs);
    try {
      return await fetch(url, { ...options, signal: controller.signal });
    } finally {
      clearTimeout(tid);
    }
  };

  const makeBody = (p) => ({
    contents: [{ role: 'user', parts: p }],
    generationConfig: {
      responseModalities: ['IMAGE'],
      ...(imageConfig ? { imageConfig } : {})
    }
  });

  // Variantes : full parts → si image absente, retente en gardant seulement la 1ère image (structure) + texte
  // NOTE: ce fallback n'a de sens que pour le flux décoration (1ère image = style ref à préserver).
  // En Mode Travaux, appeler avec allowReducedVariant=false pour ne pas risquer de perdre
  // l'objet ou le site de référence dans le fallback.
  const inlineCount = parts.filter(p => p.inlineData).length;
  const variants = [parts];
  if (allowReducedVariant && inlineCount >= 2) {
    // Garder uniquement la 1ère inlineData (structure béton) + tous les texts
    const reduced = [];
    let imgAdded = 0;
    for (const p of parts) {
      if (p.inlineData) { if (imgAdded === 0) { reduced.push(p); imgAdded++; } }
      else reduced.push(p);
    }
    variants.push(reduced);
  }

  const waitTimes = [6000, 12000, 25000, 50000];
  let lastErr;

  for (let v = 0; v < variants.length; v++) {
    const currentParts = variants[v];
    for (let attempt = 0; attempt <= waitTimes.length; attempt++) {
      try {
        const res = await fetchWithTimeout(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(makeBody(currentParts))
        }, 120000);

        let data = {}; try { data = await res.json(); } catch(_) {}

        if (!res.ok) {
          const msg = data?.error?.message || `HTTP ${res.status}`;
          if (res.status === 401) throw new Error('Clé API Vertex invalide (401).');
          if (res.status === 403) throw new Error('Accès refusé Vertex (403). Vérifie ta clé Express Mode.');
          if (res.status === 404) throw new Error(`Modèle introuvable (404): ${msg}`);
          throw Object.assign(new Error(`HTTP ${res.status}: ${msg}`), { status: res.status });
        }

        const candidate = data?.candidates?.[0];
        if (!candidate) throw new Error('Aucune réponse du modèle.');
        if (candidate.finishReason === 'SAFETY') throw new Error('Bloqué par les filtres de sécurité.');

        const imagePart = (candidate.content?.parts || []).find(p => p.inlineData?.data);
        if (!imagePart) {
          // Image absente : passer à la variante réduite si disponible
          if (v < variants.length - 1) { lastErr = new Error('image_absent'); break; }
          throw new Error(`Image absente de la réponse Vertex (finishReason: ${candidate.finishReason || 'inconnu'}). Réessayez.`);
        }
        return `data:image/png;base64,${imagePart.inlineData.data}`;

      } catch(err) {
        lastErr = err;
        if (err.message === 'image_absent') break;
        const msg = String(err.message || '').toLowerCase();
        const retryable = err.name === 'AbortError' || msg.includes('429') || msg.includes('503') || msg.includes('502') || msg.includes('overloaded');
        if (retryable && attempt < waitTimes.length) { await sleep(waitTimes[attempt]); continue; }
        if (!retryable) throw err;
      }
    }
  }
  throw lastErr?.message === 'image_absent'
    ? new Error('Image absente après plusieurs tentatives. Vertex a refusé silencieusement.')
    : (lastErr || new Error('Vertex génération échouée.'));
}

// ============================================================
// GENERATION — kie.ai (Nano Banana 2)
// ============================================================
async function uploadImageToKie(apiKey, base64DataUri) {
  const res = await fetch('https://kieai.redpandaai.co/api/file-base64-upload', {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ base64Data: base64DataUri, uploadPath: 'images/studio-architecte' })
  });
  let data = {}; try { data = await res.json(); } catch(_) {}
  if (!res.ok || !data.data?.downloadUrl) throw new Error(`Upload kie.ai échoué: ${data.msg || res.status}`);
  return data.data.downloadUrl;
}

async function callKieGenerate(apiKey, promptText, referenceImageDataUri, aspectRatio = '16:9') {
  let imageUrls = [];
  const failedUploads = [];
  const refs = Array.isArray(referenceImageDataUri) ? referenceImageDataUri.filter(Boolean) : (referenceImageDataUri ? [referenceImageDataUri] : []);
  for (let i = 0; i < refs.length; i++) {
    try { imageUrls.push(await uploadImageToKie(apiKey, refs[i])); } catch(e) { failedUploads.push(i); console.warn('Upload ref kie échoué:', e.message); }
  }
  if (failedUploads.length > 0) {
    throw new Error(`Échec upload de ${failedUploads.length} image(s) de référence (index: ${failedUploads.join(',')}). Génération annulée pour éviter un rendu incomplet. Réessayez.`);
  }
  const taskBody = {
    model: 'nano-banana-2',
    input: { prompt: promptText, ...(aspectRatio ? { aspect_ratio: aspectRatio } : {}), resolution: '4K', output_format: 'png', image_input: imageUrls }
  };
  const createRes = await fetch('https://api.kie.ai/api/v1/jobs/createTask', {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' },
    body: JSON.stringify(taskBody)
  });
  let createData = {}; try { createData = await createRes.json(); } catch(_) {}
  if (!createRes.ok || createData.code !== 200) {
    const msg = createData?.msg || createData?.message || `HTTP ${createRes.status}`;
    if (createRes.status === 401 || createData.code === 401) throw new Error('Clé kie.ai invalide.');
    if (createRes.status === 403 || createData.code === 403) throw new Error('Accès refusé kie.ai. Vérifiez vos crédits.');
    throw new Error(`Erreur kie.ai: ${msg}`);
  }
  const taskId = createData?.data?.taskId;
  if (!taskId) throw new Error('Aucun taskId retourné par kie.ai.');
  for (let i = 0; i < 60; i++) {
    await sleep(5000);
    let statusData = {}; try { const r = await fetch(`https://api.kie.ai/api/v1/jobs/recordInfo?taskId=${taskId}`, { headers: { 'Authorization': `Bearer ${apiKey}` } }); statusData = await r.json(); } catch(e) { continue; }
    const state = statusData?.data?.state;
    if (state === 'fail') throw new Error(`kie.ai échec: ${statusData?.data?.failMsg}`);
    if (state === 'success') {
      let imageUrl = null;
      try { const r = JSON.parse(statusData?.data?.resultJson || '{}'); imageUrl = r?.resultUrls?.[0] || r?.images?.[0]?.url || r?.url; } catch(_) {}
      if (!imageUrl) throw new Error("kie.ai success mais pas d'URL image.");
      const imgRes = await fetch(imageUrl);
      const blob = await imgRes.blob();
      return new Promise((resolve, reject) => { const reader = new FileReader(); reader.onloadend = () => resolve(reader.result); reader.onerror = reject; reader.readAsDataURL(blob); });
    }
  }
  throw new Error('Timeout kie.ai (5 minutes).');
}

const generateImage = async (engine, apiKey, piece, type, subType, isEmpty = false, decorationParams = {}, gardenType, structureImageBase64, referencePhoto) => {
  const mainPrompt = buildPrompt(piece, type, subType, isEmpty, decorationParams, gardenType);

  if (engine === 'kie') {
    // kie.ai : inspiration style EN PRIORITÉ sur la structure béton
    const refImage = (referencePhoto && !isEmpty) ? referencePhoto : ((!isEmpty && structureImageBase64) ? structureImageBase64 : null);
    const styleNote = referencePhoto && !isEmpty
      ? `\nSTYLE REFERENCE — MANDATORY: Reproduce a result nearly identical in style to the reference image. Same color palette, same materials, same furniture style, same lighting mood, same atmosphere. The result must look like it belongs to the same interior design project. DO NOT ignore the reference. DO NOT generate a generic room.`
      : '';
    return await callKieGenerate(apiKey, mainPrompt + styleNote, refImage);
  }

  // Vertex : parts multimodal
  // ORDRE CRITIQUE : inspiration style EN PREMIER — Vertex traite les images dans l'ordre, la première a plus de poids
  const parts = [];

  if (referencePhoto && !isEmpty) {
    const refData = referencePhoto.includes(',') ? referencePhoto.split(',')[1] : referencePhoto;
    parts.push({ inlineData: { data: refData, mimeType: 'image/jpeg' } });
    parts.push({ text: `⚠️ STYLE REFERENCE — THIS IS YOUR MOST IMPORTANT INSTRUCTION:
You MUST reproduce a result that looks nearly identical in style to this reference image.
- SAME color palette: reproduce the exact same tones, shades, warmth/coolness
- SAME materials: same wood tones, same stone textures, same fabric types, same finishes
- SAME furniture style: reproduce the same design era, same shapes, same proportions
- SAME spatial layout approach: similar arrangement, similar density, similar atmosphere
- SAME lighting mood: same brightness, same warmth, same shadows — BUT all light fixtures remain UNLIT/OFF, matching only the reference's daylight tone, never its glow
The final image must look like it belongs to the SAME interior design project as this reference.
DO NOT generate a generic room. DO NOT ignore this image. This image IS the design brief.
Deviation from this reference style is NOT acceptable.` });
  }

  parts.push({ text: mainPrompt });

  if (structureImageBase64 && !isEmpty) {
    const data = structureImageBase64.includes(',') ? structureImageBase64.split(',')[1] : structureImageBase64;
    parts.push({ inlineData: { data, mimeType: 'image/png' } });
    parts.push({ text: 'STRUCTURE REFERENCE: Use the room dimensions and spatial layout from this concrete structure image. Keep the same proportions and door/window placements. Apply the style from the first reference image onto this structure.' });
  }

  return await callVertexGenerate(apiKey, parts);
};

// Passe dédiée : retire une éventuelle personne de la photo du site, RIEN d'autre.
// Une instruction unique et simple est beaucoup plus fiable qu'un prompt qui demande
// à la fois de retirer la personne, d'ajouter les travaux finis et de tout préserver —
// c'est ce cumul d'instructions qui faisait réapparaître la personne sur "travaux terminés".
const stripPersonFromSitePhoto = async (engine, apiKey, sitePhoto) => {
  const prompt = `THIS IS A PHOTO EDIT TASK, NOT A NEW GENERATION. Your ONLY job: if there is a person anywhere in this photo (fully visible, partially visible, in the background, or reflected), remove them completely and fill in what would naturally be behind/under them — matching floor, wall, furniture, or background seamlessly, as if they were never there.
STRICTLY FORBIDDEN: do NOT change anything else — same furniture, same decor, same wall colors, same materials, same camera angle, same framing, same lighting, same everything except the removed person. This is a single, narrow edit: person removal only.
If there is no person anywhere in this photo, return the photo essentially unchanged.`;
  if (engine === 'kie') {
    return await callKieGenerate(apiKey, prompt, sitePhoto, null);
  }
  const d = sitePhoto.includes(',') ? sitePhoto.split(',')[1] : sitePhoto;
  const parts = [
    { inlineData: { data: d, mimeType: 'image/jpeg' } },
    { text: prompt }
  ];
  return await callVertexGenerate(apiKey, parts, 'gemini-3-pro-image-preview', false, { imageSize: '4K' });
};

const generateTravauxImage = async (engine, apiKey, sitePhoto, personPhotos, description, phase, objets) => {
  const people = (personPhotos || []).filter(Boolean).slice(0, 2);
  const objetsList = (objets || []).filter(o => o?.photo && o?.note?.trim());
  const mainPrompt = buildTravauxPrompt(description, phase, people.length, objetsList);

  // Pour "terminé" : on nettoie d'abord la photo source de toute personne, dans un appel séparé
  // et dédié, AVANT de lui appliquer l'édit "travaux finis". Ça évite de demander au modèle
  // de faire deux choses contradictoires (retirer une personne + tout préserver) en même temps.
  let effectiveSitePhoto = sitePhoto;
  if (phase === 'finished' && sitePhoto) {
    effectiveSitePhoto = await stripPersonFromSitePhoto(engine, apiKey, sitePhoto);
  }

  if (engine === 'kie') {
    // Mapping explicite : kie.ai n'a qu'un seul champ prompt texte (pas de texte par image
    // comme Vertex), donc sans ce mapping le modèle ne sait pas quelle image du tableau
    // image_input correspond à quel rôle et priorise souvent la photo du site par défaut.
    const orderedImages = [...objetsList.map(o => o.photo), effectiveSitePhoto, ...people];
    let mapping = 'IMAGE ORDER MAPPING (CRITICAL — the images are provided in this exact order, use each one for its designated role ONLY):\n';
    objetsList.forEach((o, i) => {
      mapping += `- IMAGE ${i + 1} = OBJECT REFERENCE for placement "${o.note.trim()}" — reproduce this exact object pixel-faithfully at the location described (replace an existing item if the description says so, or add it there if not).\n`;
    });
    mapping += `- IMAGE ${objetsList.length + 1} = SITE REFERENCE PHOTO — preserve everything in it exactly except the described work/replacements.\n`;
    people.forEach((_, i) => {
      mapping += `- IMAGE ${objetsList.length + 2 + i} = PERSON REFERENCE ${i + 1} — reproduce this exact person's identity in the scene.\n`;
    });
    return await callKieGenerate(apiKey, mapping + '\n' + mainPrompt, orderedImages, null);
  }

  // Vertex : ORDRE — objets de référence placés EN DERNIER, juste avant mainPrompt.
  // Raison : l'objet a besoin d'être la chose la plus "récente" vue par le modèle avant
  // la génération (proximité avec le prompt final), pas la première (l'ancien ordre
  // noyait l'instruction objet sous le site + les personnes placés après).
  const parts = [];

  if (effectiveSitePhoto) {
    const d = effectiveSitePhoto.includes(',') ? effectiveSitePhoto.split(',')[1] : effectiveSitePhoto;
    parts.push({ inlineData: { data: d, mimeType: 'image/jpeg' } });
    const siteLabel = phase === 'finished'
      ? '⚠️ SITE REFERENCE IMAGE — above: this is the exact real photo to edit (already cleaned of any person). Preserve every element of it exactly as shown — furniture, decor, walls, colors, camera angle — and add ONLY the finished version of the described work. If any OBJECT REFERENCE IMAGE(s) appear further below, the object(s) they replace must NOT be preserved — they are the one explicit exception. Do NOT add any person to the scene.'
      : '⚠️ SITE REFERENCE IMAGE — above: this is the exact real photo to edit. Preserve every element of it exactly as shown — furniture, decor, walls, colors, camera angle — and add ONLY the described work in progress. If any OBJECT REFERENCE IMAGE(s) appear further below, the object(s) they replace must NOT be preserved — they are the one explicit exception.';
    parts.push({ text: siteLabel });
  }
  people.forEach((personPhoto, idx) => {
    const d = personPhoto.includes(',') ? personPhoto.split(',')[1] : personPhoto;
    parts.push({ inlineData: { data: d, mimeType: 'image/jpeg' } });
    parts.push({ text: `⚠️ PERSON REFERENCE IMAGE #${idx + 1} — above: reproduce this EXACT person (face, identity, general appearance) present in the scene as a distinct individual.` });
  });
  objetsList.forEach((objet, idx) => {
    const d = objet.photo.includes(',') ? objet.photo.split(',')[1] : objet.photo;
    parts.push({ inlineData: { data: d, mimeType: 'image/jpeg' } });
    parts.push({ text: `⚠️⚠️ OBJECT REFERENCE IMAGE #${idx + 1} — YOUR HIGHEST PRIORITY VISUAL REFERENCE, TAKE PRECEDENCE OVER EVERYTHING ABOVE FOR THIS SPECIFIC ITEM. This is the EXACT physical object you MUST reproduce pixel-faithfully (same shape, same color, same material, same design — a literal copy of this object, not a reinterpretation), placed in the scene as described here: "${objet.note.trim()}". If this description says to replace an existing item, remove that item and put this one there instead. This object image takes priority over preserving whatever it replaces or the empty space it fills.` });
  });
  parts.push({ text: mainPrompt });

  // model = pro (meilleure adhérence aux instructions multi-images que flash) + fallback réducteur désactivé
  // (le fallback ne garderait que la 1ère image, ce qui n'a pas de sens ici)
  // imageConfig SANS aspectRatio forcé : c'est une édition de photo réelle, imposer un ratio
  // différent de la photo source oblige le modèle à recomposer toute la pièce pour remplir
  // un cadre étranger — c'est ce qui causait "la pièce n'est plus la même".
  return await callVertexGenerate(apiKey, parts, 'gemini-3-pro-image-preview', false, { imageSize: '4K' });
};
