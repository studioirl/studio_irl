<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Vertex AI Express</title>
<style>
body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; background: #f0f4ff; }
h1 { color: #2563eb; }
input { width: 100%; padding: 10px; margin: 10px 0; border: 2px solid #bfdbfe; border-radius: 8px; font-size: 14px; box-sizing: border-box; }
button { width: 100%; padding: 15px; background: #2563eb; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
button:hover { background: #1d4ed8; }
button:disabled { background: #94a3b8; cursor: not-allowed; }
#result { margin-top: 20px; padding: 15px; border-radius: 8px; }
#result img { max-width: 100%; border-radius: 8px; margin-top: 10px; }
.error { background: #fef2f2; border: 2px solid #fecaca; color: #b91c1c; }
.success { background: #f0fdf4; border: 2px solid #bbf7d0; color: #166534; }
.loading { background: #eff6ff; border: 2px solid #bfdbfe; color: #1d4ed8; }
label { font-weight: bold; color: #334155; font-size: 13px; display: block; margin-top: 10px; }
pre { white-space: pre-wrap; font-size: 11px; overflow-x: auto; }
</style>
</head>
<body>

<h1>🧪 Test Vertex AI Express</h1>
<p>Colle ta clé API Google Cloud (Express Mode).</p>

<label>Clé API Google Cloud :</label>
<input type="password" id="apiKey" placeholder="AIza..." />

<button id="testBtn" onclick="testVertexExpress()">⚡ TESTER</button>

<div id="result"></div>

<script>
async function testVertexExpress() {
  const apiKey = document.getElementById('apiKey').value.trim();
  const result = document.getElementById('result');
  const btn = document.getElementById('testBtn');

  if (!apiKey) { result.className = 'error'; result.innerHTML = '❌ Entre ta clé API.'; return; }

  btn.disabled = true;
  btn.textContent = '⏳ Test en cours...';
  result.className = 'loading';
  result.innerHTML = '⏳ Requête envoyée à Vertex AI Express...';

  // Vertex AI Express Mode endpoint - accepte les clés API simples
  const url = `https://aiplatform.googleapis.com/v1/projects/-/locations/global/publishers/google/models/gemini-3.1-flash-image-preview:generateContent?key=${apiKey}`;

  const body = {
    contents: [{
      parts: [{ text: "A simple red apple on a white background, photorealistic." }]
    }],
    generationConfig: {
      responseModalities: ["TEXT", "IMAGE"]
    }
  };

  try {
    const response = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    const data = await response.json();

    if (!response.ok) {
      result.className = 'error';
      result.innerHTML = `❌ Erreur ${response.status} :<br><pre>${JSON.stringify(data, null, 2)}</pre>`;
      return;
    }

    // Chercher l'image
    let imageFound = false;
    for (const part of data.candidates?.[0]?.content?.parts || []) {
      if (part.inlineData) {
        const imgSrc = `data:${part.inlineData.mimeType};base64,${part.inlineData.data}`;
        result.className = 'success';
        result.innerHTML = `✅ SUCCÈS ! Vertex AI Express fonctionne !<br><img src="${imgSrc}" alt="Image générée">`;
        imageFound = true;
        break;
      }
    }

    if (!imageFound) {
      result.className = 'error';
      result.innerHTML = `⚠️ Réponse reçue mais pas d'image :<br><pre>${JSON.stringify(data, null, 2)}</pre>`;
    }

  } catch (err) {
    result.className = 'error';
    result.innerHTML = `❌ Erreur réseau : ${err.message}`;
  } finally {
    btn.disabled = false;
    btn.textContent = '⚡ TESTER';
  }
}
</script>
</body>
</html>
