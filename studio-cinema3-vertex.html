<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio Cinema — Veo 3.1</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0b0f1a;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.box {
  width:320px;
  background:#111827;
  padding:20px;
  border-radius:12px;
}

input, textarea {
  width:100%;
  margin-top:10px;
  padding:10px;
  border-radius:8px;
  border:none;
}

button {
  margin-top:15px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

video {
  margin-top:20px;
  width:320px;
  border-radius:12px;
}
</style>
</head>

<body>

<div class="box">
  <h3>Studio Cinema</h3>

  <input id="apiKey" placeholder="Colle ta clé API Vertex (AQ...)" />

  <textarea id="prompt" placeholder="Décris ta scène..."></textarea>

  <input type="file" id="image" />

  <button onclick="generate()">Générer</button>
</div>

<video id="video" controls></video>

<script>

async function generate() {
  const key = document.getElementById("apiKey").value.trim()
  const prompt = document.getElementById("prompt").value.trim()
  const file = document.getElementById("image").files[0]

  if(!key || !prompt){
    alert("Remplis tout")
    return
  }

  let base64Image = null

  if(file){
    const reader = new FileReader()
    base64Image = await new Promise(res=>{
      reader.onload = () => res(reader.result.split(",")[1])
      reader.readAsDataURL(file)
    })
  }

  try {

    const res = await fetch(
      "https://generativelanguage.googleapis.com/v1beta/models/veo-3.1-generate-001:predictLongRunning",
      {
        method:"POST",
        headers:{
          "Content-Type":"application/json",
          "x-goog-api-key":key
        },
        body:JSON.stringify({
          instances:[
            {
              prompt:prompt,
              ...(base64Image && {
                image:{
                  bytesBase64Encoded:base64Image,
                  mimeType:"image/jpeg"
                }
              })
            }
          ],
          parameters:{
            durationSeconds:8
          }
        })
      }
    )

    const data = await res.json()

    if(!data.name){
      console.log(data)
      alert("Erreur génération")
      return
    }

    const op = data.name

    // polling
    let finished = false
    let finalData = null

    while(!finished){
      await new Promise(r=>setTimeout(r,5000))

      const check = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/${op}`,
        {
          headers:{
            "x-goog-api-key":key
          }
        }
      )

      const j = await check.json()

      if(j.done){
        finished = true
        finalData = j
      }
    }

    const uri = finalData.response.generateVideoResponse.generatedSamples[0].video.uri

    const videoRes = await fetch(uri)
    const blob = await videoRes.blob()

    const url = URL.createObjectURL(blob)

    document.getElementById("video").src = url

  } catch(e){
    console.error(e)
    alert("Erreur API")
  }
}

</script>

</body>
</html>
