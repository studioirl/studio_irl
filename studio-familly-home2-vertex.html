// ═══ HELPERS ═══
function h(str){
  var s=String(str);
  s=s.split('&').join('&amp;');
  s=s.split('<').join('&lt;');
  s=s.split('>').join('&gt;');
  s=s.split('"').join('&quot;');
  return s;
}

function upl(field, label, required, height) {
  var src = null;
  var fm = {mainAvatar:'mainAvatar',partner:'partner',babyRef:'babyRef',waPhoto:'waPhoto',babyCarrierImage:'babyCarrierImage',babyCarrierBabyRef:'babyCarrierBabyRef',tondeuseImage:'tondeuseImage',bbqPhoto:'bbqPhoto',strollerImage:'strollerImage',strollerBabyRef:'strollerBabyRef',interphonePortalImage:'interphonePortalImage',interphonePortalOpenImage:'interphonePortalOpenImage',interphoneVisitorImage:'interphoneVisitorImage',interphoneInteriorImage:'interphoneInteriorImage',roomImage:'roomImage',cleaningToolImage:'cleaningToolImage'};
  if(fm[field]) src = S[fm[field]];
  else if(field.indexOf('child-')===0){ var ci=parseInt(field.split('-')[1]); src=S.children[ci]; }
  else if(field.indexOf('guest-')===0){ var gi=parseInt(field.split('-')[1]); src=S.guests[gi]; }
  else if(field.indexOf('dressing-')===0){ var di=parseInt(field.split('-')[1]); src=S.dressingOutfits[di]&&S.dressingOutfits[di].image; }
  var uid='uz-'+field.replace(/[^a-zA-Z0-9]/g,'-');
  var out='<div class="space-y-2">';
  out+='<label class="text-sm font-medium text-gray-300">'+h(label)+(required?' <span style="color:#ef4444">*</span>':'')+'</label>';
  out+='<div id="'+uid+'" class="uz '+(height||'h-32')+' '+(src?'hi':'')+'" style="min-height:8rem">';
  if(src) out+='<img class="pv" src="'+src+'" alt="Preview"/>';
  out+='<div class="relative z-0 flex flex-col items-center justify-center '+(src?'hidden':'')+'">';
  out+='<span class="text-2xl mb-2 block">📸</span>';
  out+='<span class="text-xs text-gray-500">Cliquer pour uploader</span>';
  out+='</div>';
  out+='<div class="ov"><span class="text-xs text-white">Changer la photo</span></div>';
  out+='<input type="file" accept="image/*" onchange="handleUpload(\''+field+'\',this)">';
  out+='</div></div>';
  return out;
}

function tog(field, label, cls, id) {
  var labelColors = {tc:'text-cyan-400',tg:'text-green-400',to:'text-orange-400',tl:'text-lime-400',tb:'text-blue-400',ts:'text-sky-400',tp:'text-pink-400',ti:'text-indigo-400',tr:'text-red-400'};
  var lc = labelColors[cls] || 'text-white';
  return '<div class="flex items-center justify-between">' +
    '<span class="text-[8px] font-black uppercase '+lc+'">'+h(label)+'</span>' +
    '<label class="tw '+cls+'">' +
    '<input type="checkbox" id="'+id+'" '+(S[field]?'checked':'')+' onchange="toggleF(\''+field+'\',this.checked)">' +
    '<div class="tt"></div></label></div>';
}

function toggleF(field, val) { S[field]=val; if(field==='dressingModeEnabled'&&val) buildDressingOutfits(); render(); }

function getActions() {
  if(S.mirrorPresent && S.roomType && MIRROR_ROOMS.indexOf(S.roomType)>=0) return MIRROR_ACTIONS;
  if(S.strollerModeEnabled) return STROLLER_ACTIONS;
  if(S.babyCarrierEnabled) return PORTAGE_ACTIONS;
  if(S.interphoneModeEnabled) return [INTERPHONE_ACTIONS[S.interphoneStep-1]];
  if(S.bbqModeEnabled && S.roomType && BBQ_ROOMS.indexOf(S.roomType)>=0) return BBQ_ACTIONS;
  if(S.dressingModeEnabled) return DRESSING_ACTIONS_LIST;
  if(S.cleaningModeEnabled && S.roomType && MODE_MENAGE.forbidden.indexOf(S.roomType)<0) {
    return MODE_MENAGE.actions.map(function(a){return a.label;});
  }
  var acts = [];
  if(S.roomType==='cuisine'){
    if(S.roomSubtype==='cuisine_plan_travail') acts=CUISINE_PLAN.slice();
    else if(S.roomSubtype==='cuisine_plaques_cuisson') acts=CUISINE_PLAQUES.slice();
    else if(S.roomSubtype==='cuisine_a_table') acts=CUISINE_TABLE.slice();
    else acts=(ACTIONS['cuisine']||[]).slice();
  } else if(S.roomType==='dressing') {
    acts=DRESSING_ACTIONS_LIST.slice();
  } else {
    acts=((S.roomType&&ACTIONS[S.roomType])||[]).slice();
  }
  if(S.phoneModeEnabled){ acts.push("Passer un appel vidéo WhatsApp"); acts.push("Passer un appel audio WhatsApp"); }
  return acts;
}

function render() {
  var app=document.getElementById('app');

    var html='';
    if(S.screen==='login') html=renderLogin();
    else if(S.screen==='idle') html=renderIdle();
    else if(S.screen==='config') html=renderConfig();
    else html=renderMain();
    app.innerHTML=html;
  } catch(e) {
    app.innerHTML='<div style="color:red;padding:2rem;background:#111;min-height:100vh"><h2>ERREUR: '+e.message+'</h2><pre style="font-size:11px;white-space:pre-wrap">'+e.stack+'</pre></div>';
    console.error(e);
  }
}

function togglePartner(){ S.partnerEnabled=!S.partnerEnabled; if(!S.partnerEnabled) S.partner=null; render(); }
function toggleBaby(){ S.isBabyPresent=!S.isBabyPresent; render(); }
function changeChildCount(d){ S.childCount=Math.max(0,S.childCount+d); while(S.children.length<S.childCount) S.children.push(null); S.children=S.children.slice(0,S.childCount); render(); }
function changeGuestCount(d){ S.guestCount=Math.max(0,S.guestCount+d); while(S.guests.length<S.guestCount) S.guests.push(null); S.guests=S.guests.slice(0,S.guestCount); render(); }
function setDressingSource(i,src){ S.dressingOutfits[i].source=src; render(); }
function nextInterphoneStep(){ if(S.interphoneStep<3){ S.interphoneStep++; S.resultImage=null; S.error=null; render(); } }
function showDlMenu(){ var m=document.getElementById('dl-menu'); if(m) m.classList.toggle('hidden'); }

function buildDressingOutfits(){
  S.dressingOutfits=[];
  S.dressingOutfits.push({id:'avatar',label:'Tenue avatar principal',source:'text',text:'',image:null});
  if(S.partnerEnabled) S.dressingOutfits.push({id:'conjoint',label:'Tenue conjoint',source:'text',text:'',image:null});
  for(var i=0;i<S.children.length;i++) S.dressingOutfits.push({id:'enfant_'+(i+1),label:'Tenue enfant '+(i+1),source:'text',text:'',image:null});
  if(S.isBabyPresent) S.dressingOutfits.push({id:'bebe',label:'Tenue bébé',source:'text',text:'',image:null});
}

function validateConfig(){
  if(!S.mainAvatar){ S.error='Avatar DNA obligatoire!'; render(); return; }
  S.error=null; S.screen='main'; render();
}

function validateKey(){
  var k=document.getElementById('loginKey')?document.getElementById('loginKey').value.trim():'';
  if(!k||k.length<20){ S.loginError='Clé API invalide.'; render(); return; }
  S.apiKey=k; S.loginError=null; S.screen='idle'; render();
}

function handleUpload(field,input){
  var file=input.files[0];
  if(!file) return;
  var reader=new FileReader();
  reader.onloadend=function(){
    var src=reader.result;
    var fm={mainAvatar:1,partner:1,babyRef:1,waPhoto:1,babyCarrierImage:1,babyCarrierBabyRef:1,tondeuseImage:1,bbqPhoto:1,strollerImage:1,strollerBabyRef:1,interphonePortalImage:1,interphonePortalOpenImage:1,interphoneVisitorImage:1,interphoneInteriorImage:1,roomImage:1,cleaningToolImage:1};
    if(fm[field]) S[field]=src;
    else if(field.indexOf('child-')===0){ var ci=parseInt(field.split('-')[1]); S.children[ci]=src; }
    else if(field.indexOf('guest-')===0){ var gi=parseInt(field.split('-')[1]); S.guests[gi]=src; }
    else if(field.indexOf('dressing-')===0){ var di=parseInt(field.split('-')[1]); if(S.dressingOutfits[di]) S.dressingOutfits[di].image=src; }
    render();
  };
  reader.readAsDataURL(file);
}

function dlImg(format){
  if(!S.resultImage) return;
  var a=document.createElement('a');
  var mime=format==='png'?'image/png':'image/jpeg';
  a.href=S.resultImage.replace(/data:image\/[^;]+/,'data:'+mime);
  a.download='studio-family-home-'+Date.now()+'.'+format;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

function buildPrompt(){
  var lines=[];
  lines.push("FRESH HUMAN CAPTURE V11.");
  lines.push("Technical: RAW 4K, Matte skin, Clean sensor, NO BEAUTY FILTERS.");
  lines.push("ACTION : "+(S.action||'Scene de vie quotidienne, naturelle et spontanee'));
  lines.push("LIEU : "+S.roomLabel+" | AMBIANCE : "+S.season+" / "+S.weather+" / "+S.dayMoment);
  lines.push("ENERGIE : "+S.energy);
  var cameraMap={
    face:"Camera straight in front of the subject. Natural frontal view.",
    profil:"Camera on the side. Spontaneous side view.",
    trois_quarts:"Three-quarter angle, slightly offset. Realistic UGC angle.",
    plongee_legere:"Camera slightly above. Natural smartphone effect.",
    contre_plongee_legere:"Camera slightly below. Captured on the fly.",
    par_dessus_epaule:"Over-the-shoulder view. Part of shoulder visible.",
    pov_mains:"Immersive POV. Subject's hands interacting with objects.",
    immersive_organique:"Angle irregular, slightly off-center. Handheld perspective. Authentic, lived-in, unposed."
  };
  lines.push("ANGLE CAMERA : "+(cameraMap[S.cameraAngle]||cameraMap.immersive_organique));
  if(S.phoneModeEnabled) lines.push("MODE WHATSAPP - APPEL "+S.waCallType.toUpperCase()+" EN COURS. Interface WhatsApp active. Interlocuteur plein ecran. Timer visible. Bouton rouge raccrocher visible.");
  if(S.babyCarrierEnabled) lines.push("MODE PORTAGE BEBE PHYSIOLOGIQUE. Position grenouille. Mains du parent libres.");
  if(S.bbqModeEnabled) lines.push("MODE BARBECUE - Combustible : "+S.bbqFuel+". Reproduire EXACTEMENT le barbecue de la photo. Meme forme, meme couleur.");
  if(S.dressingModeEnabled&&S.dressingOutfits.length){
    lines.push("MODE DRESSING - TENUES A APPLIQUER :");
    for(var di=0;di<S.dressingOutfits.length;di++){
      var o=S.dressingOutfits[di];
      if(o.source==='text'&&o.text) lines.push("- ["+o.label.toUpperCase()+"] : Porter EXACTEMENT : "+o.text);
      else if(o.source==='image'&&o.image) lines.push("- ["+o.label.toUpperCase()+"] : Porter EXACTEMENT la tenue de la photo jointe.");
    }
    lines.push("FORCE_OUTFIT_REPLACEMENT = TRUE.");
  }
  if(S.fireplaceEnabled) lines.push("CHEMINEE ALLUMEE. Feu visible, flammes realistes, lumiere doree.");
  if(S.mirrorPresent) lines.push("MIROIR PRESENT dans la scene.");
  if(S.cleaningModeEnabled) lines.push("MODE MENAGE ACTIF. Action : "+S.action+". Outils visibles et utilises de maniere realiste.");
  if(S.energy==='chaos'){
    lines.push("MODE CHAOS - MAISON VIVANTE ET HABITEE. Desordre visible.");
    if(S.chaosEmotionAdult) lines.push("EMOTION ADULTE : "+S.chaosEmotionAdult);

    if(S.chaosEmotionBaby) lines.push("EMOTION BEBE : "+S.chaosEmotionBaby);

  lines.push("OBJECTIF : Realisme biologique BRUT. Teint mat, pores visibles, imperfections reelles.");
  lines.push("DEGRADATION VOLONTAIRE : Si l'image semble trop parfaite -> la degrader pour paraitre humaine.");
  if(S.freeText) lines.push("NOTES DE VERITE : "+S.freeText);
  return lines.join("\n");
}

async function generate(){
  if(!S.apiKey){ S.error='Cle API manquante!'; render(); return; }
  if(!S.mainAvatar){ S.error='Avatar DNA obligatoire!'; render(); return; }
  if(!S.roomImage&&!S.interphoneModeEnabled&&!S.strollerModeEnabled){ S.error='Photo de la piece obligatoire!'; render(); return; }
  S.loading=true; S.error=null; S.resultImage=null;
  var stepIdx=0; S.loadingStep=LOADING_STEPS[0]; render();
  var interval=setInterval(function(){
    stepIdx++;
    S.loadingStep=LOADING_STEPS[stepIdx%LOADING_STEPS.length];
    var lp=document.querySelector('.pulse');
    if(lp) lp.textContent=S.loadingStep;
  },2500);
  try {
    function toInline(b64){ return {inlineData:{data:b64.indexOf(',')>=0?b64.split(',')[1]:b64,mimeType:'image/png'}}; }
    var parts=[{text:buildPrompt()}];
    if(S.mainAvatar) parts.push(toInline(S.mainAvatar));
    if(S.roomImage&&!S.interphoneModeEnabled&&!S.strollerModeEnabled) parts.push(toInline(S.roomImage));
    if(S.partnerEnabled&&S.partner) parts.push(toInline(S.partner));
    for(var ci=0;ci<S.children.length;ci++){ if(S.children[ci]) parts.push(toInline(S.children[ci])); }
    if(S.isBabyPresent&&S.babyRef) parts.push(toInline(S.babyRef));
    if(S.phoneModeEnabled&&S.waPhoto) parts.push(toInline(S.waPhoto));
    if(S.babyCarrierEnabled&&S.babyCarrierBabyRef) parts.push(toInline(S.babyCarrierBabyRef));
    if(S.babyCarrierEnabled&&S.babyCarrierImage) parts.push(toInline(S.babyCarrierImage));
    if(S.bbqModeEnabled&&S.bbqPhoto) parts.push(toInline(S.bbqPhoto));
    if(S.tondeuseModeEnabled&&S.tondeuseImage) parts.push(toInline(S.tondeuseImage));
    if(S.strollerModeEnabled&&S.strollerImage) parts.push(toInline(S.strollerImage));
    if(S.strollerModeEnabled&&S.strollerBabyRef) parts.push(toInline(S.strollerBabyRef));
    if(S.cleaningModeEnabled&&S.cleaningToolImage) parts.push(toInline(S.cleaningToolImage));
    if(S.interphoneModeEnabled){
      var imgMap={1:S.interphonePortalImage,2:S.interphoneInteriorImage,3:S.interphonePortalOpenImage};
      var img=imgMap[S.interphoneStep];
      if(img) parts.push(toInline(img));
      if(S.interphoneVisitorImage) parts.push(toInline(S.interphoneVisitorImage));
    }
    for(var ddi=0;ddi<S.dressingOutfits.length;ddi++){
      var o=S.dressingOutfits[ddi];
      if(o.source==='image'&&o.image){ parts.push({text:'IMAGE TENUE POUR '+o.label.toUpperCase()+' :'}); parts.push(toInline(o.image)); }
    }
    var payload={
      contents:[{parts:parts}],
      generationConfig:{responseModalities:['TEXT','IMAGE'],temperature:0.4,topP:0.4,topK:32},
      systemInstruction:{parts:[{text:buildSystem()}]}
    };
    var res=await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-image-preview:generateContent?key='+S.apiKey,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    if(!res.ok){ var e=await res.json(); throw new Error(e.error?e.error.message:'Erreur API '+res.status); }
    var data=await res.json();
    var imgData=null;
    var cparts=(data.candidates&&data.candidates[0]&&data.candidates[0].content&&data.candidates[0].content.parts)||[];
    for(var pi=0;pi<cparts.length;pi++){ if(cparts[pi].inlineData){ imgData='data:'+cparts[pi].inlineData.mimeType+';base64,'+cparts[pi].inlineData.data; break; } }
    if(!imgData) throw new Error('Aucune image generee.');
    S.resultImage=imgData;
  } catch(err){
    S.error='Erreur : '+err.message;
  } finally {
    clearInterval(interval);
    S.loading=false;
    render();
  }
}

render();
