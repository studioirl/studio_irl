cursor: pointer;
transition: border-color 0.2s;

.no-scrollbar::-webkit-scrollbar { display: none; }

/* Uploader */
.uploader-zone {
position: relative; border: 2px dashed rgba(255,255,255,0.15);
border-radius: 12px; transition: all 0.2s; cursor: pointer; overflow: hidden;
display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.5rem;
}
.uploader-zone:hover { border-color: rgba(99,102,241,0.6); background: rgba(99,102,241,0.05); }
.uploader-zone.has-image { border-color: rgba(99,102,241,0.4); }
.uploader-zone input[type=“file”] { position: absolute; inset: 0; opacity: 0; cursor: pointer; z-index: 10; width: 100%; height: 100%; }
.uploader-zone img.preview { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }
.uploader-zone .upl-overlay {
position: absolute; inset: 0; background: rgba(0,0,0,0.5);
display: flex; align-items: center; justify-content: center;
opacity: 0; transition: opacity 0.2s; border-radius: 10px; z-index: 5;
}
.uploader-zone:hover .upl-overlay { opacity: 1; }

/* Toggle */
.toggle-wrap { position: relative; width: 40px; height: 20px; flex-shrink: 0; }
.toggle-wrap input { opacity: 0; width: 0; height: 0; position: absolute; }
.toggle-track {
position: absolute; inset: 0; background: rgba(255,255,255,0.1);
border-radius: 20px; cursor: pointer; transition: background 0.2s;
}
.toggle-track::before {
content: ‘’; position: absolute;
width: 16px; height: 16px; left: 2px; top: 2px;
background: white; border-radius: 50%; transition: transform 0.2s;
}
.toggle-wrap input:checked + .toggle-track { background: #6366f1; }
.toggle-wrap input:checked + .toggle-track::before { transform: translateX(20px); }

/* Specific toggle colors */
.toggle-cyan input:checked + .toggle-track { background: #06b6d4; box-shadow: 0 0 15px rgba(6,182,212,0.5); }
.toggle-green input:checked + .toggle-track { background: #16a34a; box-shadow: 0 0 15px rgba(22,163,74,0.5); }
.toggle-orange input:checked + .toggle-track { background: #ea580c; box-shadow: 0 0 15px rgba(234,88,12,0.5); }
.toggle-lime input:checked + .toggle-track { background: #65a30d; box-shadow: 0 0 15px rgba(101,163,13,0.5); }
.toggle-blue input:checked + .toggle-track { background: #2563eb; box-shadow: 0 0 15px rgba(37,99,235,0.5); }
.toggle-sky input:checked + .toggle-track { background: #0284c7; box-shadow: 0 0 15px rgba(2,132,199,0.5); }
.toggle-pink input:checked + .toggle-track { background: #db2777; box-shadow: 0 0 15px rgba(219,39,119,0.5); }
.toggle-indigo input:checked + .toggle-track { background: #6366f1; box-shadow: 0 0 15px rgba(99,102,241,0.5); }
.toggle-red input:checked + .toggle-track { background: #dc2626; box-shadow: 0 0 20px rgba(220,38,38,0.5); }

@keyframes spin { to { transform: rotate(360deg); } }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
.pulse { animation: pulse 2s ease-in-out infinite; }
@keyframes bounce { 0%,100%{transform:translateY(-5%)} 50%{transform:translateY(0)} }

function renderUploader(field, label, required, heightClass) {
let src = null;
if (field === ‘mainAvatar’) src = S.mainAvatar;
else if (field === ‘partner’) src = S.partner;
else if (field === ‘babyRef’) src = S.babyRef;
else if (field === ‘waPhoto’) src = S.waPhoto;
else if (field === ‘babyCarrierImage’) src = S.babyCarrierImage;
else if (field === ‘babyCarrierBabyRef’) src = S.babyCarrierBabyRef;
else if (field === ‘tondeuseImage’) src = S.tondeuseImage;
else if (field === ‘bbqPhoto’) src = S.bbqPhoto;
else if (field === ‘strollerImage’) src = S.strollerImage;
else if (field === ‘strollerBabyRef’) src = S.strollerBabyRef;
else if (field === ‘interphonePortalImage’) src = S.interphonePortalImage;
else if (field === ‘interphonePortalOpenImage’) src = S.interphonePortalOpenImage;
else if (field === ‘interphoneVisitorImage’) src = S.interphoneVisitorImage;
else if (field === ‘interphoneInteriorImage’) src = S.interphoneInteriorImage;
else if (field === ‘roomImage’) src = S.roomImage;
else if (field.startsWith(‘child-’)) { const i = parseInt(field.split(’-’)[1]); src = S.children[i]; }
else if (field.startsWith(‘guest-’)) { const i = parseInt(field.split(’-’)[1]); src = S.guests[i]; }
else if (field.startsWith(‘dressing-’)) { const i = parseInt(field.split(’-’)[1]); src = S.dressingOutfits[i]?.image; }

const uid = `upl-${field.replace(/[^a-zA-Z0-9]/g,'-')}`;
return `

  <div class="space-y-2">
    <label class="text-sm font-medium text-gray-300">${label}${required?' <span class="text-red-500">*</span>':''}</label>
    <div id="${uid}" class="uploader-zone ${heightClass} ${src?'has-image':''}" style="min-height:8rem">
      ${src ? `<img class="preview" src="${src}" alt="Preview"/>` : ''}
      <div class="relative z-0 flex flex-col items-center justify-center ${src?'hidden':''}">
        <span class="text-2xl mb-2 block">📸</span>
        <span class="text-xs text-gray-500">Cliquer pour uploader</span>
      </div>
      <div class="upl-overlay"><span class="text-xs text-white">Changer la photo</span></div>
      <input type="file" accept="image/*" onchange="handleUpload('${field}',this)">
    </div>
  </div>`;
}

function renderToggleRow(field, label, colorClass, id) {
return `

  <div class="flex items-center justify-between">
    <span class="text-[8px] font-black uppercase ${getToggleLabelColor(colorClass)}">${label}</span>
    <label class="toggle-wrap ${colorClass}">
      <input type="checkbox" id="${id}" ${S[field]?'checked':''}>
      <div class="toggle-track"></div>
    </label>
  </div>`;
}

function getToggleLabelColor(cls) {
const map = {‘toggle-cyan’:‘text-cyan-400’,‘toggle-green’:‘text-green-400’,‘toggle-orange’:‘text-orange-400’,‘toggle-lime’:‘text-lime-400’,‘toggle-blue’:‘text-blue-400’,‘toggle-sky’:‘text-sky-400’,‘toggle-pink’:‘text-pink-400’,‘toggle-indigo’:‘text-indigo-400’,‘toggle-red’:‘text-red-400’};
return map[cls] || ‘text-white’;
}

];

const BBQ_ACTIONS_LIST = [
“Allumer le barbecue”,“Attendre les braises”,“Faire griller des saucisses”,
“Faire griller des chipolatas”,“Faire griller de la viande rouge”,“Faire griller un steak haché”,
“Faire griller des ailes de poulet”,“Faire des brochettes viande”,“Faire des brochettes poulet”,

const FORBIDDEN_MENAGE_ROOMS = [‘jardin’,‘terrace’,‘garage_voiture’,‘atelier_bricolage’];

function getActions() {
// Mode Miroir
if (S.mirrorPresent && S.roomType && MIRROR_ROOMS.includes(S.roomType)) {
return MIRROR_ACTIONS_LIST;
}
// Mode Poussette
if (S.strollerModeEnabled) return STROLLER_ACTIONS_LIST;
// Mode Portage
if (S.babyCarrierEnabled) return PORTAGE_ACTIONS_LIST;
// Mode Interphone
if (S.interphoneModeEnabled) return [INTERPHONE_ACTIONS_LIST[S.interphoneStep - 1]];
// Mode BBQ
if (S.bbqModeEnabled && S.roomType && BBQ_ROOMS.includes(S.roomType)) return BBQ_ACTIONS_LIST;
// Mode Dressing
if (S.dressingModeEnabled) return DRESSING_ACTIONS_LIST;

let actions = [];

// Actions par pièce et sous-type
if (S.roomType === ‘cuisine’) {
if (S.roomSubtype === ‘cuisine_plan_travail’) actions = […CUISINE_PLAN_TRAVAIL];
else if (S.roomSubtype === ‘cuisine_plaques_cuisson’) actions = […CUISINE_PLAQUES];
else if (S.roomSubtype === ‘cuisine_a_table’) actions = […CUISINE_TABLE];
else actions = […(ACTIONS[‘cuisine’] || [])];
}
else if (S.roomType === ‘bureau’) actions = […OFFICE_ACTIONS_LIST];
else if (S.roomType === ‘dressing’) actions = […DRESSING_ACTIONS_LIST];
else actions = […(ACTIONS[S.roomType] || [])];

// Mode Ménage — remplace les actions si pièce autorisée
if (S.cleaningModeEnabled && S.roomType && !MODE_MENAGE.availability.forbidden_rooms.includes(S.roomType)) {
return […MENAGE_ACTIONS_LIST];
}

// Mode WhatsApp — ajoute les actions phone
if (S.phoneModeEnabled) {
actions = […actions, “Passer un appel vidéo WhatsApp”, “Passer un appel audio WhatsApp”];
}

return actions;
}

function handleUpload(field, input) {
const file = input.files[0];
if (!file) return;
const reader = new FileReader();
reader.onloadend = () => {
const src = reader.result;
if (field === ‘mainAvatar’) S.mainAvatar = src;
else if (field === ‘partner’) S.partner = src;
else if (field === ‘babyRef’) S.babyRef = src;
else if (field === ‘waPhoto’) S.waPhoto = src;
else if (field === ‘babyCarrierImage’) S.babyCarrierImage = src;
else if (field === ‘babyCarrierBabyRef’) S.babyCarrierBabyRef = src;
else if (field === ‘tondeuseImage’) S.tondeuseImage = src;
else if (field === ‘bbqPhoto’) S.bbqPhoto = src;
else if (field === ‘cleaningToolImage’) S.cleaningToolImage = src;
else if (field === ‘strollerImage’) S.strollerImage = src;
else if (field === ‘strollerBabyRef’) S.strollerBabyRef = src;
else if (field === ‘interphonePortalImage’) S.interphonePortalImage = src;
else if (field === ‘interphonePortalOpenImage’) S.interphonePortalOpenImage = src;
else if (field === ‘interphoneVisitorImage’) S.interphoneVisitorImage = src;
else if (field === ‘interphoneInteriorImage’) S.interphoneInteriorImage = src;
else if (field === ‘roomImage’) S.roomImage = src;
else if (field.startsWith(‘child-’)) { const i=parseInt(field.split(’-’)[1]); S.children[i]=src; }
else if (field.startsWith(‘guest-’)) { const i=parseInt(field.split(’-’)[1]); S.guests[i]=src; }
else if (field.startsWith(‘dressing-’)) { const i=parseInt(field.split(’-’)[1]); if(S.dressingOutfits[i]) S.dressingOutfits[i].image=src; }
render();
};
reader.readAsDataURL(file);
}

async function generate() {

if (!apiKey) { S.error = ‘Clé API manquante !’; render(); return; }

function buildSystem() {
return `# OVERRIDE SYSTÈME : PEAU BRUTE ET IMPARFAITE (PRIORITÉ ABSOLUE)

# FIDÉLITÉ IDENTITÉ ABSOLUE (VERROUILLÉ)

COULEUR DES YEUX : Strictement identique à la photo de référence.
CONSERVATION GÉOMÉTRIQUE : Les traits du visage sont des constantes. MORPHOLOGIE FIXE.

CHAQUE VISAGE traité individuellement. Pores, micro-imperfections, relief naturel OBLIGATOIRES.
Simuler capteur photo professionnel (Sony A7R IV, 85mm look).

INTERDICTIONS : Modifier couleur meuble, changer forme, remplacer, déplacer.

# FIDÉLITÉ ABSOLUE AUX VÊTEMENTS

# PHOTOGRAPHIC CAPTURE

This image MUST look like a real photograph taken by a human.
Visible skin pores. NO smoothing. NO beauty filter. NO plastic skin.
If image is too perfect → REJECT and degrade.

# MODE PERSPECTIVE — HOME FAMILY

Sensation d’un instant de vie saisi sur le vif.

OUTPUT_RESOLUTION = 4K_NATIVE. REALISM_OVERRIDE = TRUE.
Si l’image est trop belle pour être vraie → elle doit être dégradée jusqu’à paraître humaine.`;
}

function buildPrompt() {
const lines = [`FRESH HUMAN CAPTURE V11.\nTechnical: RAW 4K, Matte skin, Clean sensor, NO BEAUTY FILTERS.\n`];
lines.push(`ACTION : ${S.action || 'Scène de vie quotidienne, naturelle et spontanée'}`);
lines.push(`LIEU : ${S.roomLabel} | AMBIANCE : ${S.season} · ${S.weather} · ${S.dayMoment}`);
lines.push(`ÉNERGIE : ${S.energy}`);

const cameraMap = {
face:“Camera straight in front of the subject. Natural frontal view.”,
profil:“Camera on the side. Spontaneous side view.”,
trois_quarts:“Three-quarter angle, slightly offset. Realistic UGC angle.”,
plongee_legere:“Camera slightly above. Natural smartphone effect.”,
contre_plongee_legere:“Camera slightly below. Captured on the fly.”,
par_dessus_epaule:“Over-the-shoulder view. Part of shoulder or back visible.”,
pov_mains:“Immersive POV. Subject’s hands interacting with objects.”,
immersive_organique:“Angle irregular, slightly off-center. Handheld perspective. Not perfectly centered. Authentic, lived-in, unposed. Like a real-life moment captured casually.”
};
lines.push(`\n# ANGLE DE CAMÉRA\n${cameraMap[S.cameraAngle]||cameraMap.immersive_organique}`);

if (S.phoneModeEnabled) lines.push(`\n# MODE WHATSAPP — APPEL ${S.waCallType.toUpperCase()}\nInterface WhatsApp active. La personne interlocutrice occupe TOUT L'ÉCRAN. Personne tenant le téléphone en petit aperçu coin bas-droit. Timer d'appel visible. Bouton rouge raccrocher visible.`);
if (S.babyCarrierEnabled) lines.push(`\n# MODE PORTAGE BÉBÉ PHYSIOLOGIQUE\nBébé porté dans un porte-bébé physiologique. Position grenouille. Mains du parent libres.`);
if (S.bbqModeEnabled) lines.push(`\n# MODE BARBECUE — Combustible : ${S.bbqFuel}\nBarbecue reproduit EXACTEMENT d'après la photo de référence. Même forme, même couleur.`);
if (S.dressingModeEnabled && S.dressingOutfits.length) {
lines.push(’\n# MODE DRESSING : RÉFÉRENCES DE TENUES (OBLIGATOIRE)’);
S.dressingOutfits.forEach(o => {
if (o.source===‘text’ && o.text) lines.push(`- [${o.label.toUpperCase()}] : Porter EXACTEMENT : ${o.text}.`);
else if (o.source===‘image’ && o.image) lines.push(`- [${o.label.toUpperCase()}] : Porter EXACTEMENT la tenue de la photo jointe.`);
});
lines.push(‘FORCE_OUTFIT_REPLACEMENT = TRUE.’);
}
if (S.fireplaceEnabled) lines.push(`\n# CHEMINÉE ALLUMÉE\nFeu visible, flammes réalistes, lumière dorée.`);
if (S.mirrorPresent) lines.push(`\n# MIROIR PRÉSENT\nMiroir dans la scène reflétant de manière cohérente.`);
if (S.energy === ‘chaos’) {
lines.push(`\n# MODE CHAOS\nMAISON VIVANTE ET HABITÉE. Désordre visible.`);
if (S.chaosEmotionAdult) lines.push(`ÉMOTION ADULTE : ${S.chaosEmotionAdult}`);
if (S.chaosEmotionChild) lines.push(`ÉMOTION ENFANT : ${S.chaosEmotionChild}`);
if (S.chaosEmotionBaby) lines.push(`ÉMOTION BÉBÉ : ${S.chaosEmotionBaby}`);
}
lines.push(`\nOBJECTIF : Réalisme biologique BRUT. Teint mat, pores visibles, imperfections réelles.`);
lines.push(`DÉGRADATION VOLONTAIRE : Si l'image semble trop parfaite → la dégrader pour paraître humaine.`);
if (S.freeText) lines.push(`\nNOTES DE VÉRITÉ : ${S.freeText}`);
return lines.join(’\n’);
}

function downloadImage(format) {
if (!S.resultImage) return;
const a = document.createElement(‘a’);
const mime = format===‘png’?‘image/png’:‘image/jpeg’;
a.href = S.resultImage.replace(/data:image/[^;]+/, `data:${mime}`);
a.download = `studio-family-home-${Date.now()}.${format}`;
document.body.appendChild(a); a.click(); document.body.removeChild(a);
}
